<script>
// ── AUDIO ENGINE (Web Audio API, no files needed) ──────────────
window.SFX = (function(){
  let ctx = null;
  function getCtx(){
    if(!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)();
    if(ctx.state==='suspended') ctx.resume();
    return ctx;
  }

  // Slot machine coins: rapid cascading metallic coin clinks tumbling into a tray.
  // Each "coin" = two detuned sine partials + a high-freq metallic ping + noise burst.
  // Coins fall in a loose staggered cascade — not perfectly evenly spaced — for realism.
  function caChing(points){
    const ac = getCtx();
    const n = Math.max(1, Math.abs(Math.round(points)));

    // Master gain to prevent clipping when many coins overlap
    const master = ac.createGain();
    master.gain.value = 0.7;
    master.connect(ac.destination);

    // Coin frequencies — slight variety so each sounds distinct
    const coinFreqs = [1050, 1180, 980, 1120, 1060, 1200, 940, 1090];

    for(let rep=0; rep<n; rep++){
      // Stagger with small random jitter — coins don't fall perfectly evenly
      const jitter = (Math.random() - 0.5) * 0.04;
      const t0 = ac.currentTime + 0.08 + rep * 0.11 + jitter;
      const f  = coinFreqs[rep % coinFreqs.length];

      // --- Layer 1: Primary metallic ring (sine) ---
      const osc1 = ac.createOscillator();
      const g1   = ac.createGain();
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(f, t0);
      osc1.frequency.exponentialRampToValueAtTime(f * 0.88, t0 + 0.18);
      g1.gain.setValueAtTime(0, t0);
      g1.gain.linearRampToValueAtTime(0.55, t0 + 0.003);   // instant attack
      g1.gain.exponentialRampToValueAtTime(0.001, t0 + 0.22);
      osc1.connect(g1); g1.connect(master);
      osc1.start(t0); osc1.stop(t0 + 0.23);

      // --- Layer 2: Slightly detuned second partial (gives "coin" thickness) ---
      const osc2 = ac.createOscillator();
      const g2   = ac.createGain();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(f * 2.76, t0);   // inharmonic overtone
      osc2.frequency.exponentialRampToValueAtTime(f * 2.40, t0 + 0.10);
      g2.gain.setValueAtTime(0, t0);
      g2.gain.linearRampToValueAtTime(0.28, t0 + 0.003);
      g2.gain.exponentialRampToValueAtTime(0.001, t0 + 0.12);
      osc2.connect(g2); g2.connect(master);
      osc2.start(t0); osc2.stop(t0 + 0.13);

      // --- Layer 3: Click transient (coin hitting tray) — very short noise burst ---
      const clickLen = Math.ceil(ac.sampleRate * 0.008);
      const cBuf = ac.createBuffer(1, clickLen, ac.sampleRate);
      const cD   = cBuf.getChannelData(0);
      for(let i=0; i<clickLen; i++) cD[i] = (Math.random()*2-1) * (1 - i/clickLen);
      const cSrc = ac.createBufferSource();
      const cHp  = ac.createBiquadFilter();
      const cG   = ac.createGain();
      cSrc.buffer = cBuf;
      cHp.type = 'highpass'; cHp.frequency.value = 4000;
      cG.gain.setValueAtTime(0.35, t0);
      cG.gain.exponentialRampToValueAtTime(0.001, t0 + 0.008);
      cSrc.connect(cHp); cHp.connect(cG); cG.connect(master);
      cSrc.start(t0); cSrc.stop(t0 + 0.009);

      // --- Layer 4: Brief metallic shimmer (bandpass noise tail) ---
      const shimLen = Math.ceil(ac.sampleRate * 0.06);
      const sBuf = ac.createBuffer(1, shimLen, ac.sampleRate);
      const sD   = sBuf.getChannelData(0);
      for(let i=0; i<shimLen; i++) sD[i] = (Math.random()*2-1);
      const sSrc = ac.createBufferSource();
      const sBp  = ac.createBiquadFilter();
      const sG   = ac.createGain();
      sSrc.buffer = sBuf;
      sBp.type = 'bandpass'; sBp.frequency.value = 5500 + Math.random()*800; sBp.Q.value = 3;
      sG.gain.setValueAtTime(0.12, t0 + 0.002);
      sG.gain.exponentialRampToValueAtTime(0.001, t0 + 0.06);
      sSrc.connect(sBp); sBp.connect(sG); sG.connect(master);
      sSrc.start(t0 + 0.002); sSrc.stop(t0 + 0.065);
    }

    // Slot machine "jackpot" bass thud on the first coin — the machine dropping
    const thudOsc = ac.createOscillator();
    const thudG   = ac.createGain();
    thudOsc.type = 'sine';
    thudOsc.frequency.setValueAtTime(110, ac.currentTime + 0.06);
    thudOsc.frequency.exponentialRampToValueAtTime(45, ac.currentTime + 0.14);
    thudG.gain.setValueAtTime(0, ac.currentTime + 0.06);
    thudG.gain.linearRampToValueAtTime(0.45, ac.currentTime + 0.063);
    thudG.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
    thudOsc.connect(thudG); thudG.connect(master);
    thudOsc.start(ac.currentTime + 0.06); thudOsc.stop(ac.currentTime + 0.19);
  }

  // Rattlesnake: dry white-noise bursts with pitch envelope — classic rattle
  function rattlesnake(){
    const ac = getCtx();
    const rattleCount = 7;
    const rateHz = 18; // rattles per second
    for(let i=0; i<rattleCount; i++){
      const t0 = ac.currentTime + i*(1/rateHz);
      const dur = 0.03 + (i/rattleCount)*0.01; // slight crescendo in duration

      // White noise burst
      const samples = Math.ceil(ac.sampleRate * dur);
      const buf = ac.createBuffer(1, samples, ac.sampleRate);
      const d   = buf.getChannelData(0);
      for(let j=0;j<samples;j++) d[j]=(Math.random()*2-1);
      const src = ac.createBufferSource();

      // Bandpass centered around "rattlesnake" range ~3-6kHz
      const bp = ac.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 4000 + Math.random()*1200;
      bp.Q.value = 2.5;

      // Second bandpass for texture
      const bp2 = ac.createBiquadFilter();
      bp2.type = 'bandpass';
      bp2.frequency.value = 2200;
      bp2.Q.value = 1.8;

      const gn = ac.createGain();
      // Amplitude envelope: attack + decay per burst; overall envelope grows then fades
      const peakVol = 0.25 + (i<rattleCount/2 ? i/rattleCount : (rattleCount-i)/rattleCount)*0.35;
      gn.gain.setValueAtTime(0, t0);
      gn.gain.linearRampToValueAtTime(peakVol, t0+0.004);
      gn.gain.exponentialRampToValueAtTime(0.001, t0+dur);

      src.buffer = buf;
      src.connect(bp); bp.connect(bp2); bp2.connect(gn); gn.connect(ac.destination);
      src.start(t0); src.stop(t0+dur+0.002);
    }

    // Add a low "hiss" tail
    const hissDur = 0.4;
    const hBuf = ac.createBuffer(1, Math.ceil(ac.sampleRate*hissDur), ac.sampleRate);
    const hD   = hBuf.getChannelData(0);
    for(let i=0;i<hD.length;i++) hD[i]=(Math.random()*2-1);
    const hSrc = ac.createBufferSource();
    const hBp  = ac.createBiquadFilter();
    const hG   = ac.createGain();
    hSrc.buffer = hBuf;
    hBp.type = 'highpass'; hBp.frequency.value = 3000;
    hG.gain.setValueAtTime(0.12, ac.currentTime);
    hG.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+hissDur);
    hSrc.connect(hBp); hBp.connect(hG); hG.connect(ac.destination);
    hSrc.start(); hSrc.stop(ac.currentTime+hissDur);
  }

  return { caChing, rattlesnake };
})();
</script>

  const minH=Math.min(...keys.map(k=>PLAYERS[k].hcp));

  keys.forEach(k=>{
    const d=Math.round((PLAYERS[k].hcp-minH)*pct);

function calcMP(mid,hs,courseKey,r3P){
  const p=getP(mid,r3P);
  if(!p||p.type==="bonus"||!p.sideA.length||!p.sideB.length)return null;
  const course=COURSES[courseKey];
  const allK=[...p.sideA,...p.sideB];
  const pct=p.type==="singles"?1.00:0.90;
  const pops=calcPops(allK,course.holes,pct);
  let ud=0,played=0;const hr=[];
  for(let h=0;h<18;h++){
    const aS=p.sideA.map(k=>{const g=hs?.[k]?.[h];return(g==null||g==="")? null:Number(g)-(pops[k]?.[h]??0);}).filter(v=>v!==null);
    const bS=p.sideB.map(k=>{const g=hs?.[k]?.[h];return(g==null||g==="")? null:Number(g)-(pops[k]?.[h]??0);}).filter(v=>v!==null);
    if(!aS.length||!bS.length){hr.push(null);continue;}
    const aB=Math.min(...aS),bB=Math.min(...bS);
    played++;if(aB<bB)ud++;else if(bB<aB)ud--;hr.push(ud);
  }
  const rem=18-played,abs=Math.abs(ud);
  let status="AS",winner=null,isDormie=false,isClinched=false;
  if(abs>rem&&played>0){
    isClinched=true;winner=ud>0?"A":"B";
    status=ud>0?`🌵 ${abs}&${rem}`:`🌶️ ${abs}&${rem}`;
  }else if(played===18){
    if(ud>0){winner="A";status="🌵 1UP";}else if(ud<0){winner="B";status="🌶️ 1UP";}else{winner="halved";status="HALVED";}
  }else if(abs>0&&abs===rem&&played>0){isDormie=true;status=ud>0?`🌵 DORMIE ${abs}`:`🌶️ DORMIE ${abs}`;}
  else if(ud!==0&&played>0){status=ud>0?`🌵 ${abs}UP`:`🌶️ ${abs}UP`;}
  return{ud,played,rem,status,winner,hr,isDormie,isClinched,pops,p,pct};
}

// ─── NASSAU ──────────────────────────────────────────────────
function calcNassau(mid,hs,courseKey,r3P,bet){
  const p=getP(mid,r3P);
  if(!p||!p.sideA.length||!p.sideB.length)return null;
  const course=COURSES[courseKey];
  const allK=[...p.sideA,...p.sideB];
  const pct=p.type==="singles"?1.00:0.90;
  const pops=calcPops(allK,course.holes,pct);
  const net=(k,h)=>{const g=hs?.[k]?.[h];if(g==null||g==="")return null;return Number(g)-(pops[k]?.[h]??0);};
  const best=(side,h)=>{const v=side.map(k=>net(k,h)).filter(v=>v!==null);return v.length?Math.min(...v):null;};
  const hw=(h)=>{const a=best(p.sideA,h),b=best(p.sideB,h);if(a===null||b===null)return null;if(a<b)return"A";if(b<a)return"B";return"H";};
  let fU=0,fP=0,bU=0,bP=0;
  for(let h=0;h<9;h++){const w=hw(h);if(w===null)continue;fP++;if(w==="A")fU++;else if(w==="B")fU--;}
  for(let h=9;h<18;h++){const w=hw(h);if(w===null)continue;bP++;if(w==="A")bU++;else if(w==="B")bU--;}
  const seg=(u,pl,n)=>{
    const r=n-pl,ab=Math.abs(u);
    if(ab>r&&pl>0)return{w:u>0?"A":"B",s:u>0?`🌵 ${ab}&${r}`:`🌶️ ${ab}&${r}`,done:true};
    if(pl===n)return{w:u>0?"A":u<0?"B":"H",s:u>0?"🌵 1UP":u<0?"🌶️ 1UP":"HALVED",done:true};
    if(ab===r&&pl>0&&r>0)return{w:null,s:u>0?`🌵 DORMIE ${ab}`:`🌶️ DORMIE ${ab}`,done:false};
    if(u===0)return{w:null,s:"AS",done:false};
    return{w:null,s:u>0?`🌵 ${ab}UP`:`🌶️ ${ab}UP`,done:false};
  };
  const F=seg(fU,fP,9),B=seg(bU,bP,9),T=seg(fU+bU,fP+bP,18);
  const pay=(s,a)=>{if(!a||!s.done||s.w==="H")return 0;return s.w==="A"?Number(a):-Number(a);};
  return{F,B,T,net:pay(F,bet?.front)+pay(B,bet?.back)+pay(T,bet?.total)};
}

// ─── VEGAS ───────────────────────────────────────────────────
function calcVegas(mid,hs,courseKey,r3P,per){
  if(!per)return null;
  const p=getP(mid,r3P);
  if(!p||p.sideA.length!==2||p.sideB.length!==2)return null;
  const course=COURSES[courseKey];
  const allK=[...p.sideA,...p.sideB];
  const pops=calcPops(allK,course.holes,0.90);
  const netOf=(k,h)=>{const g=hs?.[k]?.[h];if(g==null||g==="")return null;return Number(g)-(pops[k]?.[h]??0);};
  const vegN=(side,h)=>{const sc=side.map(k=>netOf(k,h)).filter(v=>v!==null);if(sc.length<2)return null;const[lo,hi]=[...sc].sort((a,b)=>a-b);return lo*10+hi;};
  let tot=0;const holes=[];
  for(let h=0;h<18;h++){
    const a=vegN(p.sideA,h),b=vegN(p.sideB,h);
    if(a===null||b===null){holes.push(null);continue;}
    const d=b-a;tot+=d;holes.push({h,hNum:course.holes[h].h,a,b,d,cum:tot});
  }
  return{holes,tot,net:tot*Number(per),per:Number(per)};
}

// ─── SKINS ───────────────────────────────────────────────────
function calcSkins(allHS,courseKey){
  const course=COURSES[courseKey];
  const allK=Object.keys(PLAYERS);
  const pops=calcPops(allK,course.holes,0.90);
  const skins=[];
  for(let h=0;h<18;h++){
    const par=course.holes[h].par;
    const ns=allK.map(k=>{
      let g=null;Object.values(allHS||{}).forEach(ms=>{if(ms?.[k]?.[h]!=null)g=ms[k][h];});
      if(g==null)return null;return{k,net:Number(g)-(pops[k]?.[h]??0)};
    }).filter(Boolean);
    if(!ns.length)continue;
    const mn=Math.min(...ns.map(s=>s.net));
    if(mn>=par)continue;
    const w=ns.filter(s=>s.net===mn);
    if(w.length===1)skins.push({hIdx:h,hole:course.holes[h].h,player:w[0].k,net:mn,par});
  }
  return skins;
}

// ─── SNAKE STATE (fully computed from putts, no stored events) ─
// multiOrders = { holeIdx: [playerKey,...] } — stored ordering for multi-3-putt holes.
// On any hole, the snake changes hands ONCE PER 3-PUTTER in sequence order, doubling each time.
// The last player in the sequence ends up holding it. Deleting a putt auto-reverts everything.
// Returns { owner, amount, transfers:[{hole,owner,amount,fromPlayer,toPlayer}] }
function calcSnakeState(allKeys, puttData, initBet, multiOrders, mode="double") {
  const init = Number(initBet || 0);
  if (!init) return null;
  let owner = null;
  let amount = 0;
  const transfers = [];

  for (let h = 0; h < 18; h++) {
    const threePutters = allKeys.filter(k => Number(puttData?.[k]?.[h] || 0) >= 3);
    if (!threePutters.length) continue;

    // Determine the sequence of 3-putters this hole.
    // For a single player: sequence = [player].
    // For multiple: use stored drag order if set, else default to allKeys order (pending user input).
    let sequence;
    if (threePutters.length === 1) {
      sequence = threePutters;
    } else {
      const stored = multiOrders?.[h];
      if (stored && stored.length >= threePutters.length) {
        // Use stored order — user has confirmed the sequence
        sequence = stored;
      } else {
        // Order not yet set — use allKeys order as a placeholder
        sequence = [...threePutters].sort((a,b) => allKeys.indexOf(a) - allKeys.indexOf(b));
      }
    }

    // Snake changes hands once per player in the sequence.
    // mode "double" (default): bet doubles each transfer.
    // mode "increment": bet increases by init each transfer ($5→$10→$15...).
    sequence.forEach(player => {
      let newAmt;
      if(mode === "increment"){
        // Incremental: starts at init, adds init each transfer
        newAmt = init * (transfers.length + 1);
      } else {
        // Exponential doubling (default)
        newAmt = transfers.length === 0 ? init : transfers[transfers.length - 1].amount * 2;
      }
      owner = player;
      amount = newAmt;
      transfers.push({ hole: h, owner: player, amount: newAmt, players: threePutters, multi: threePutters.length > 1 });
    });
  }

  if (!transfers.length) return { owner: null, amount: 0, transfers: [] };
  return { owner, amount, transfers };
}

// ─── LEDGER ──────────────────────────────────────────────────
function buildLedger(holeScores,puttDataAll,sideBets,r3P,effResults){
  const L={};Object.keys(PLAYERS).forEach(k=>{L[k]={total:0,entries:[]};});
  const add=(k,e)=>{if(!L[k])return;L[k].total+=e.amount;L[k].entries.push(e);};

  ROUNDS.filter(r=>r.course).forEach(round=>{
    round.matches.forEach(m=>{
      const sb=sideBets?.[m.id]||{};
      const hs=holeScores?.[round.key]?.[m.id]||{};
      const p=getP(m.id,r3P);
      if(!p||!p.sideA.length||!p.sideB.length)return;
      const lbl=mLabel(m.id,r3P);
      const allK=[...p.sideA,...p.sideB];

      if(sb.nassauOn&&sb.nassau){
        const n=calcNassau(m.id,hs,round.course,r3P,sb.nassau);
        if(n){
          [{s:n.F,a:sb.nassau?.front,name:"Nassau Front"},{s:n.B,a:sb.nassau?.back,name:"Nassau Back"},{s:n.T,a:sb.nassau?.total,name:"Nassau Total"}].forEach(({s,a,name})=>{
            if(!a||!s.done||s.w==="H")return;
            const w=s.w==="A"?p.sideA:p.sideB,l=s.w==="A"?p.sideB:p.sideA;
            w.forEach(k=>add(k,{rl:round.label,lbl,bet:name,amount:Number(a)}));
            l.forEach(k=>add(k,{rl:round.label,lbl,bet:name,amount:-Number(a)}));
          });
        }
      }
      if(sb.vegasOn&&sb.vegas?.per){
        const v=calcVegas(m.id,hs,round.course,r3P,sb.vegas?.per);
        if(v&&v.net!==0){
          const w=v.net>0?p.sideA:p.sideB,l=v.net>0?p.sideB:p.sideA;
          const abs=Math.abs(v.net);
          w.forEach(k=>add(k,{rl:round.label,lbl,bet:"Vegas",amount:abs}));
          l.forEach(k=>add(k,{rl:round.label,lbl,bet:"Vegas",amount:-abs}));
        }
      }
      if(sb.snakeOn&&sb.snake?.bet){
        // Build per-player putt map from stored puttData: {roundKey:{matchId:{playerKey:{holeIdx:putts}}}}
        const matchPd={};
        allK.forEach(k=>{matchPd[k]=puttDataAll?.[round.key]?.[m.id]?.[k]||{};});
        const snakeSt=calcSnakeState(allK,matchPd,sb.snake?.bet,sb.snake?.multiOrders,sb.snake?.mode||'double');
        if(snakeSt&&snakeSt.owner&&snakeSt.amount>0){
          const others=allK.filter(k=>k!==snakeSt.owner);
          others.forEach(k=>add(k,{rl:round.label,lbl,bet:"Snake 🐍",amount:snakeSt.amount}));
          add(snakeSt.owner,{rl:round.label,lbl,bet:"Snake 🐍",amount:-(snakeSt.amount*others.length)});
        }
      }
    });

    // Skins — $160 pot, 8 players × $20 buy-in per round.
    // Each skin pays out (pot / numSkins) to the winner.
    // Accounting: deduct $20 buy-in from every player once per round,
    // then credit each skin winner with (pot / numSkins).
    const skins=calcSkins(holeScores?.[round.key]||{},round.course);
    if(skins.length){
      const buyIn=SKINS_POT/8;           // $20 per player
      const skinPay=SKINS_POT/skins.length; // payout per skin winner
      // Buy-in: every player pays once this round
      Object.keys(PLAYERS).forEach(k=>{
        add(k,{rl:round.label,lbl:`${round.label} Skins`,bet:"Buy-in",amount:-buyIn});
      });
      // Skin winnings: winner of each skin gets skinPay
      skins.forEach(s=>{
        add(s.player,{rl:round.label,lbl:`${round.label} Skins`,bet:`Skin H${s.hole} win`,amount:skinPay});
      });
    }
  });

  // Ryder Cup
  const tots=ALL_M.reduce((a,m)=>{const w=effResults?.[m.id];if(w==="A")a.A+=m.pts;else if(w==="B")a.B+=m.pts;else if(w==="halved"){a.A+=m.pts/2;a.B+=m.pts/2;}return a;},{A:0,B:0});
  const rW=tots.A>=11?"A":tots.B>=11?"B":null;
  if(rW){
    const wT=rW==="A"?A_KEYS:B_KEYS,lT=rW==="A"?B_KEYS:A_KEYS;
    wT.forEach(k=>add(k,{rl:"Overall",lbl:"Ryder Cup",bet:"Team Bet",amount:RYDER_BET}));
    lT.forEach(k=>add(k,{rl:"Overall",lbl:"Ryder Cup",bet:"Team Bet",amount:-RYDER_BET}));
  }
  return L;
}

// ─── SETTLEMENT ──────────────────────────────────────────────
function settle(L){
  const bal=Object.entries(L).map(([k,v])=>({k,b:v.total}));
  const cr=bal.filter(b=>b.b>0.005).sort((a,b)=>b.b-a.b);
  const db=bal.filter(b=>b.b<-0.005).sort((a,b)=>a.b-b.b);
  const txns=[];
  const cB=cr.map(c=>({...c,r:c.b})),dB=db.map(d=>({...d,r:Math.abs(d.b)}));
  let ci=0,di=0;
  while(ci<cB.length&&di<dB.length){
    const c=cB[ci],d=dB[di],amt=Math.min(c.r,d.r);
    if(amt>0.005)txns.push({from:d.k,to:c.k,amount:amt});
    c.r-=amt;d.r-=amt;if(c.r<0.005)ci++;if(d.r<0.005)di++;
  }
  return txns;
}



// ─── FIREBASE ────────────────────────────────────────────────
function useFirebase(){
  const [ready,setR]=useState(false);
  const [err,setErr]=useState(null);
  const db=useRef(null);
  useEffect(()=>{
    try{if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);else firebase.app();db.current=firebase.database();setR(true);}
    catch(e){setErr(e.message);}
  },[]);
  const listen=useCallback(cb=>{
    if(!db.current)return()=>{};
    const ref=db.current.ref(DB_PATH);
    const h=s=>{cb(s.val()||{});};ref.on("value",h);return()=>ref.off("value",h);
  },[ready]);
  const save=useCallback(async d=>{if(!db.current)throw new Error("not ready");await db.current.ref(DB_PATH).set(d);},[ready]);
  return{ready,err,listen,save};
}

        {(clinched||leader)&&<div style={{marginTop:10,padding:"7px 12px",background:clinched?"rgba(40,160,40,0.25)":"rgba(200,168,32,0.2)",borderRadius:10,textAlign:"center",fontSize:13,fontWeight:800,color:clinched?"#7ef07e":"#f0e870"}}>
          {clinched?`🏆 ${(leader==="A"?TEAM_A:TEAM_B).name} WINS! $100 each!`:`${(leader==="A"?TEAM_A:TEAM_B).name} leads by ${fmt(margin)}`}
        </div>}
      </div>

      {/* CONTENT */}
      <div className="content">
        {tab==="board"&&<BoardTab rounds={ROUNDS} effRes={effRes.current} setMR={setMR} hs={hs} r3P={r3P} sb={sb} totals={totals}/>}
        {["r1","r2","r3","r4","r5"].includes(tab)&&(
          <RoundTab rc={ROUND_MAP[tab]} effRes={effRes.current} setMR={setMR}
            hs={hs[tab]||{}} pd={pd[tab]||{}}
            onScore={(mid,pk,hi,v)=>setScore(tab,mid,pk,hi,v)}
            onPutts={(mid,pk,hi,v)=>setPutts(tab,mid,pk,hi,v)}
            r3P={r3P} setR3Pair={setR3Pair}
            sb={sb} updateSB={updateSB} updateSnakeOrder={updateSnakeOrder}
            ledger={ledger}/>
        )}
        {tab==="skins"&&<SkinsTab hs={hs}/>}
        {tab==="money"&&<MoneyTab ledger={ledger} txns={txns} totals={totals}/>}
        {tab==="info"&&<InfoTab r3P={r3P}/>}
      </div>

      {/* TAB BAR */}
      <div className="tab-bar">
        {TABS.map(t=>(
          <button key={t.id} className={`tab-btn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>
            <span className="tab-icon">{t.icon}</span>
            <span>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// ─── BOARD TAB ───────────────────────────────────────────────
function BoardTab({rounds,effRes,setMR,hs,r3P,sb,totals}){
  return(<>
    {rounds.map(round=>{
      const isBonus=round.id==="bonus";
      const rPts=round.matches.reduce((s,m)=>{const w=effRes[m.id];if(w==="A")return{...s,A:s.A+m.pts};if(w==="B")return{...s,B:s.B+m.pts};if(w==="halved")return{...s,A:s.A+m.pts/2,B:s.B+m.pts/2};return s;},{A:0,B:0});
      return(
        <div key={round.id} className="card">
          <div style={{padding:"10px 14px",background:isBonus?C.goldBg:C.cardAlt,borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:12,fontWeight:800,color:isBonus?C.gold:C.textMid}}>{isBonus?"🎯 NET SCORE BONUS":round.label}</div>
              {round.course&&<div style={{fontSize:11,color:C.textSoft,marginTop:1}}>{COURSES[round.course].name}</div>}
            </div>
            {Object.values(rPts).some(v=>v>0)&&<div style={{fontSize:16,fontWeight:800,color:C.textMid}}>{fmt(rPts.A)} – {fmt(rPts.B)}</div>}
          </div>
          {round.matches.map((m,mi)=>{
            const mp=!isBonus&&round.course?calcMP(m.id,hs?.[round.key]?.[m.id]||{},round.course,r3P):null;
            const res=effRes[m.id];
            const bets=[sb?.[m.id]?.nassauOn?"Nassau":null,sb?.[m.id]?.vegasOn?"Vegas":null,sb?.[m.id]?.snakeOn?"🐍":null].filter(Boolean);
            return(
              <div key={m.id} style={{borderTop:mi>0?`1px solid ${C.border}`:"none",padding:"10px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:C.text}}>{mLabel(m.id,r3P)}</div>
                    {bets.length>0&&<div style={{fontSize:10,color:C.purple,marginTop:1}}>{bets.join(" · ")}</div>}
                  </div>
                  {mp&&mp.played>0&&(
                    <div className="status-badge" style={{background:mp.isDormie?C.goldBg:mp.ud===0?C.goldBg:mp.ud>0?C.greenBg:C.redBg,color:mp.isDormie?C.gold:mp.ud===0?C.gold:mp.ud>0?C.green:C.red,border:`1.5px solid ${mp.isDormie?C.goldBdr:mp.ud===0?C.goldBdr:mp.ud>0?C.greenBdr:C.redBdr}`}}>
                      {mp.status}
                    </div>
                  )}
                </div>
                {mp?.winner&&<div style={{padding:"5px 10px",background:mp.winner==="A"?C.greenBg:mp.winner==="B"?C.redBg:C.goldBg,borderRadius:8,textAlign:"center",fontSize:12,fontWeight:800,color:mp.winner==="A"?C.green:mp.winner==="B"?C.red:C.gold,marginBottom:6}}>
                  {mp.winner==="A"?`✅ ${TEAM_A.name} WINS`:mp.winner==="B"?`✅ ${TEAM_B.name} WINS`:"🤝 HALVED"}
                </div>}
                <div style={{display:"grid",gridTemplateColumns:"1fr 48px 1fr",gap:6}}>
                  <button className="btn btn-sm" onClick={()=>setMR(m.id,"A")} style={{background:res==="A"?C.greenBg:"#f4f8f4",border:`2px solid ${res==="A"?C.greenBdr:C.border}`,color:res==="A"?C.green:C.textMid}}>
                    {res==="A"?"✓ WIN":TEAM_A.emoji+" "+TEAM_A.short}
                  </button>
                  <div style={{textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                    <div style={{fontSize:11,color:C.textSoft,fontWeight:700}}>{m.pts}pt</div>
                    <button onClick={()=>setMR(m.id,"halved")} style={{background:res==="halved"?C.goldBg:"transparent",border:`1px solid ${res==="halved"?C.goldBdr:C.border}`,borderRadius:6,padding:"3px 4px",fontSize:9,color:res==="halved"?C.gold:C.textSoft,fontWeight:700}}>½</button>
                  </div>
                  <button className="btn btn-sm" onClick={()=>setMR(m.id,"B")} style={{background:res==="B"?C.redBg:"#f4f8f4",border:`2px solid ${res==="B"?C.redBdr:C.border}`,color:res==="B"?C.red:C.textMid}}>
                    {res==="B"?"✓ WIN":TEAM_B.emoji+" "+TEAM_B.short}
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      );
    })}
  </>);
}

// ─── ROUND TAB ───────────────────────────────────────────────
function RoundTab({rc,effRes,setMR,hs,pd,onScore,onPutts,r3P,setR3Pair,sb,updateSB,updateSnakeOrder,ledger}){
  const [selMatch,setSelMatch]=useState(null);
  const course=COURSES[rc.course];
  const isR3=rc.key==="r3";

  return(<>
    {/* Course header */}
    <div className="card" style={{margin:0,marginBottom:12}}>
      <div style={{padding:"12px 14px",background:C.hdr}}>
        <div style={{fontSize:11,color:"#8a9a60",fontWeight:600,letterSpacing:2}}>{rc.label.toUpperCase()}</div>
        <div style={{fontSize:18,fontWeight:800,color:C.hdrText,marginTop:2}}>{course.full}</div>
        <div style={{fontSize:11,color:"#5a7a5a",marginTop:1}}>{course.subtitle} · Par {course.par}</div>
      </div>
    </div>

    {isR3&&<R3Setup r3P={r3P} setR3Pair={setR3Pair}/>}

    {rc.matches.map(m=>{
      const p=getP(m.id,r3P);
      const hasP=p&&p.sideA.length>0&&p.sideB.length>0;
      const mhs=hs?.[m.id]||{};
      const mpd=pd?.[m.id]||{};
      const mp=hasP?calcMP(m.id,mhs,rc.course,r3P):null;
      const res=effRes[m.id];
      const msb=sb?.[m.id]||{};
      const r3m=R3M.find(x=>x.id===m.id);
      const isOpen=selMatch===m.id;
      const isBonus=m.id==="r23net";

      // Nassau/Vegas live summary
      let nassLine=null,vegLine=null;
      if(msb.nassauOn&&hasP){
        const n=calcNassau(m.id,mhs,rc.course,r3P,msb.nassau);
        if(n)nassLine=`F:${n.F.s} B:${n.B.s} T:${n.T.s}${n.net!==0?" · "+(n.net>0?"🌵":"🌶️")+" "+$(Math.abs(n.net)):""}`;
      }
      if(msb.vegasOn&&hasP){
        const v=calcVegas(m.id,mhs,rc.course,r3P,msb.vegas?.per);
        if(v)vegLine=`Vegas: ${v.tot>0?"+":""}${v.tot}pts · ${v.net>0?"🌵":"🌶️"} ${$(Math.abs(v.net))}`;
      }

      return(
        <div key={m.id} className="card">
          {/* Match header */}
          <div style={{padding:"12px 14px",background:C.cardAlt,borderBottom:`1px solid ${C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:800,color:C.text}}>{mLabel(m.id,r3P)}</div>
                <div style={{fontSize:10,color:C.textSoft,marginTop:1}}>{r3m?r3m.label:rc.type==="pairs"?"2v2 Match":"Singles"} · {m.pts}pt</div>
                {nassLine&&<div style={{fontSize:10,color:C.gold,fontWeight:700,marginTop:3}}>{nassLine}</div>}
                {vegLine&&<div style={{fontSize:10,color:C.purple,fontWeight:700,marginTop:1}}>{vegLine}</div>}
              </div>
              {mp&&mp.played>0&&(
                <div className="match-pill" style={{background:mp.isDormie?C.goldBg:mp.ud===0?C.goldBg:mp.ud>0?C.greenBg:C.redBg,color:mp.isDormie?C.gold:mp.ud===0?C.gold:mp.ud>0?C.green:C.red,border:`2px solid ${mp.isDormie?C.goldBdr:mp.ud===0?C.goldBdr:mp.ud>0?C.greenBdr:C.redBdr}`,flexShrink:0}}>
                  {mp.status}
                </div>
              )}
            </div>
          </div>

          {/* Auto result */}
          {mp?.winner&&<div style={{padding:"8px 14px",background:mp.winner==="A"?C.greenBg:mp.winner==="B"?C.redBg:C.goldBg,textAlign:"center",fontSize:13,fontWeight:800,color:mp.winner==="A"?C.green:mp.winner==="B"?C.red:C.gold}}>
            {mp.winner==="A"?`✅ ${TEAM_A.name} WINS`:mp.winner==="B"?`✅ ${TEAM_B.name} WINS`:"🤝 HALVED — auto-scored"}
          </div>}

          {/* Result buttons */}
          <div style={{padding:"10px 14px",background:C.card}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 48px 1fr",gap:6}}>
              <button className="btn btn-sm" onClick={()=>setMR(m.id,"A")} style={{background:res==="A"?C.greenBg:C.cardAlt,border:`2px solid ${res==="A"?C.greenBdr:C.border}`,color:res==="A"?C.green:C.textMid}}>
                {TEAM_A.emoji} {res==="A"?"✓ WIN":TEAM_A.short}
              </button>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                <div style={{fontSize:11,fontWeight:700,color:C.textSoft}}>{m.pts}pt</div>
                <button onClick={()=>setMR(m.id,"halved")} style={{padding:"3px 6px",background:res==="halved"?C.goldBg:"transparent",border:`1px solid ${res==="halved"?C.goldBdr:C.border}`,borderRadius:6,fontSize:9,color:res==="halved"?C.gold:C.textSoft,fontWeight:700}}>½</button>
              </div>
              <button className="btn btn-sm" onClick={()=>setMR(m.id,"B")} style={{background:res==="B"?C.redBg:C.cardAlt,border:`2px solid ${res==="B"?C.redBdr:C.border}`,color:res==="B"?C.red:C.textMid}}>
                {TEAM_B.emoji} {res==="B"?"✓ WIN":TEAM_B.short}
              </button>
            </div>
          </div>

          {/* Side bets + scorecard toggle */}
          {!isBonus&&hasP&&(
            <div style={{padding:"8px 14px",borderTop:`1px solid ${C.border}`,display:"flex",gap:8}}>
              <button className="btn-xs btn" onClick={()=>setSelMatch(isOpen?null:m.id)} style={{flex:1,background:isOpen?"#e8f0e8":C.cardAlt,border:`1px solid ${C.border}`,color:C.textMid}}>
                {isOpen?"▲ Close":"📋 Scorecard"}
              </button>
            </div>
          )}
          {!isBonus&&hasP&&<SideBetPanel mid={m.id} type={p.type} sb={sb} updateSB={updateSB}/>}
          {msb.snakeOn&&hasP&&p.type==="pairs"&&(
            <SnakeTracker mid={m.id} allKeys={[...p.sideA,...p.sideB]} sb={sb} mpd={mpd} updateSnakeOrder={updateSnakeOrder}/>
          )}

          {/* Scorecard */}
          {isOpen&&hasP&&(
            <HoleScorecard mid={m.id} courseKey={rc.course} mhs={mhs} mpd={mpd}
              onScore={(pk,hi,v)=>onScore(m.id,pk,hi,v)}
              onPutts={(pk,hi,v)=>onPutts(m.id,pk,hi,v)}
              mp={mp} r3P={r3P} showPutts={msb.snakeOn}
              sb={sb} ledger={ledger}/>
          )}
        </div>
      );
    })}
  </>);
}

// ─── HOLE SCORECARD (mobile-first: hole by hole) ─────────────
function HoleScorecard({mid,courseKey,mhs,mpd,onScore,onPutts,mp,r3P,showPutts,sb,ledger}){
  const course=COURSES[courseKey];
  const p=getP(mid,r3P);
  if(!p||!p.sideA.length||!p.sideB.length)return null;
  const allK=[...p.sideA,...p.sideB];
  const pct=p.type==="singles"?1.00:0.90;
  const pops=calcPops(allK,course.holes,pct);
  const [viewMode,setViewMode]=useState("hole"); // "hole" | "card"
  const [curHole,setCurHole]=useState(0); // 0-17 index

  const getG=(k,h)=>mhs?.[k]?.[h]??"";
  const getP2=(k,h)=>mpd?.[k]?.[h]??"";
  const netOf=(k,h)=>{const g=getG(k,h);if(g===""||isNaN(g))return null;return Number(g)-(pops[k]?.[h]??0);};
  const popStr=allK.map(k=>{const d=Math.round((PLAYERS[k].hcp-Math.min(...allK.map(x=>PLAYERS[x].hcp)))*pct);return`${PLAYERS[k].short}:${d===0?"scratch":"+"+d}`;}).join(" · ");

  // Vegas + Snake
  const msb=sb?.[mid]||{};
  const vegasData=msb.vegasOn?calcVegas(mid,mhs,courseKey,r3P,msb.vegas?.per):null;
  // Snake: fully computed from mpd (match putt data) — reverts automatically when scores deleted
  const snakeState=msb.snakeOn?calcSnakeState(allK,mpd,Number(msb.snake?.bet||0),msb.snake?.multiOrders||{},msb.snake?.mode||'double'):null;
  const snakeOwner=snakeState?.owner||null;
  const snakeBet=snakeState?.amount||Number(msb.snake?.bet||0);
  const snakeTransferCount=snakeState?.transfers?.length||0;

  // ── AUDIO TRIGGERS ──────────────────────────────────────────
  // Track previous values to detect new changes
  const prevVegasTot = useRef(null);
  const prevSnakeCount = useRef(0);
  const prevSnakeOwner = useRef(null);

  // Vegas: play ca-ching when cumulative point diff increases (per point scored)
  useEffect(()=>{
    if(!vegasData) return;
    // Sum all completed hole diffs
    const completedHoles = vegasData.holes.filter(Boolean);
    if(!completedHoles.length) return;
    const latestTot = vegasData.tot;
    if(prevVegasTot.current !== null && latestTot !== prevVegasTot.current){
      const delta = Math.abs(latestTot) - Math.abs(prevVegasTot.current);
      if(delta > 0 && typeof window.SFX !== 'undefined'){
        // Play one ca-ching per point gained
        window.SFX.caChing(delta);
      }
    }
    prevVegasTot.current = latestTot;
  },[vegasData?.tot]);

  // Snake: play rattlesnake when a new transfer happens OR owner changes
  useEffect(()=>{
    if(!snakeState) return;
    const prevCount = prevSnakeCount.current;
    const prevOwner = prevSnakeOwner.current;
    const newTransfer = snakeTransferCount > prevCount;
    const ownerChanged = snakeOwner && snakeOwner !== prevOwner && prevOwner !== null;
    if((newTransfer || ownerChanged) && typeof window.SFX !== 'undefined'){
      window.SFX.rattlesnake();
    }
    prevSnakeCount.current = snakeTransferCount;
    prevSnakeOwner.current = snakeOwner;
  },[snakeTransferCount, snakeOwner]);

  const hole=course.holes[curHole];
  const hStatus=mp?.hr?.[curHole];

  return(
    <div style={{borderTop:`1px solid ${C.border}`}}>
      {/* Pops + mode toggle */}
      <div style={{padding:"8px 14px",background:"#f0f8f0",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:10,color:C.textSoft}}>🎯 {popStr}</div>
        <div style={{display:"flex",gap:4}}>
          <button onClick={()=>setViewMode("hole")} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:viewMode==="hole"?C.hdr:"transparent",color:viewMode==="hole"?C.hdrText:C.textSoft,fontSize:10,fontWeight:700}}>Hole</button>
          <button onClick={()=>setViewMode("card")} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:viewMode==="card"?C.hdr:"transparent",color:viewMode==="card"?C.hdrText:C.textSoft,fontSize:10,fontWeight:700}}>Card</button>
        </div>
      </div>

      {viewMode==="hole"&&(
        <div style={{padding:"14px"}}>
          {/* Hole navigator */}
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <button className="hole-btn" onClick={()=>setCurHole(h=>Math.max(0,h-1))} disabled={curHole===0}>‹</button>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:28,fontWeight:900,color:C.text}}>Hole {hole.h}</div>
              <div style={{fontSize:13,color:C.textSoft,marginTop:1}}>Par {hole.par} · Hcp {hole.hcp}</div>
              {hStatus!==null&&hStatus!==undefined&&<div style={{marginTop:6,display:"inline-flex",padding:"4px 14px",borderRadius:16,background:hStatus===0?C.goldBg:hStatus>0?C.greenBg:C.redBg,color:hStatus===0?C.gold:hStatus>0?C.green:C.red,fontSize:12,fontWeight:800}}>
                {hStatus===0?"All Square":hStatus>0?`🌵 ${Math.abs(hStatus)} UP`:`🌶️ ${Math.abs(hStatus)} UP`}
              </div>}
            </div>
            <button className="hole-btn" onClick={()=>setCurHole(h=>Math.min(17,h+1))} disabled={curHole===17}>›</button>
          </div>

          {/* Snake status banner */}
          {showPutts&&snakeOwner&&<div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",marginBottom:8,background:C.goldBg,borderRadius:10,border:`2px solid ${C.goldBdr}`}}>
            <span className="snake-icon">🐍</span>
            <div>
              <div style={{fontSize:13,fontWeight:800,color:C.gold}}>{PLAYERS[snakeOwner]?.name} holds the snake</div>
              <div style={{fontSize:11,color:C.textSoft}}>Current bet: <strong>${snakeBet.toFixed(2)}</strong> · Next 3-putt doubles to ${(snakeBet*2).toFixed(2)}</div>
            </div>
          </div>}
          {showPutts&&!snakeOwner&&msb.snakeOn&&<div style={{padding:"8px 14px",marginBottom:8,background:C.goldBg,borderRadius:10,border:`1px solid ${C.goldBdr}`,textAlign:"center"}}>
            <div style={{fontSize:12,color:C.gold,fontWeight:700}}>🐍 Snake active · Initial bet: ${Number(msb.snake?.bet||0).toFixed(2)} · First 3-putt takes it</div>
          </div>}

          {/* Score inputs for each player */}
          {[{keys:p.sideA,team:TEAM_A},{keys:p.sideB,team:TEAM_B}].map(({keys,team})=>(
            <div key={team.name} style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:800,color:team.color,marginBottom:8,letterSpacing:.5}}>{team.emoji} {team.name}</div>
              {keys.map(k=>{
                const g=getG(k,curHole),net=netOf(k,curHole),par=hole.par;
                const pop=pops[k]?.[curHole]??0;
                const putts=getP2(k,curHole);
                const is3=Number(putts)>=3;
                const col=net!==null?scoreColor(net,par):C.textSoft;
                const bg=net!==null?scoreBg(net,par):C.cardAlt;
                return(
                  <div key={k} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:700}}>{PLAYERS[k].short}</div>
                      {pop>0&&<div style={{fontSize:10,color:team.color}}>+{pop} pop{pop>1?"s":""}</div>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      {/* Gross */}
                      <div style={{textAlign:"center"}}>
                        <div style={{fontSize:9,color:C.textSoft,marginBottom:2}}>GROSS</div>
                        <input className="score-input" type="number" min="1" max="12" value={g}
                          onChange={e=>onScore(k,curHole,e.target.value===""?undefined:e.target.value)}
                          style={{borderColor:net!==null?col:C.border,background:bg,color:col}}/>
                      </div>
                      {/* Net */}
                      {net!==null&&<div style={{textAlign:"center"}}>
                        <div style={{fontSize:9,color:C.textSoft,marginBottom:2}}>NET</div>
                        <div style={{width:52,height:52,borderRadius:10,background:bg,border:`2px solid ${col}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:800,color:col}}>{net}</div>
                      </div>}
                      {/* Putts + snake indicator */}
                      {showPutts&&<div style={{textAlign:"center"}}>
                        <div style={{fontSize:9,color:is3?C.gold:C.textSoft,marginBottom:2,fontWeight:is3?800:400}}>PUTTS{is3?" 🐍":""}</div>
                        <input className={`putt-input${is3?" three-putt":""}`} type="number" min="1" max="6" value={putts}
                          onChange={e=>onPutts(k,curHole,e.target.value===""?undefined:e.target.value)}/>
                        {snakeOwner===k&&<div style={{fontSize:10,marginTop:3}} className="snake-icon">🐍</div>}
                      </div>}
                    </div>
                  </div>
                );
              })}
            </div>
          ))}

          {/* Vegas hole display */}
          {vegasData&&(()=>{
            const hd=vegasData.holes[curHole];
            return(
              <div style={{marginTop:10,borderRadius:12,border:`2px solid ${C.purple}`,overflow:"hidden",background:"rgba(106,42,154,0.04)"}}>
                <div style={{padding:"8px 14px",background:"rgba(106,42,154,0.12)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:13,fontWeight:800,color:C.purple}}>🎲 Vegas</div>
                  <div style={{fontSize:11,color:C.purple}}>Hole {hole.h} · ${vegasData.per}/pt</div>

// ─── SNAKE DRAG LIST ─────────────────────────────────────────
function SnakeDragList({players,onConfirm}){
  const [order,setOrder]=useState([...players]);
  const dragIdx=useRef(null);
  const itemRefs=useRef([]);

  const onDragStart=i=>{dragIdx.current=i;};
  const onDragOver=(e,i)=>{
    e.preventDefault();
    if(dragIdx.current===null||dragIdx.current===i)return;
    const arr=[...order];const item=arr.splice(dragIdx.current,1)[0];arr.splice(i,0,item);
    dragIdx.current=i;setOrder(arr);
  };

  const onTouchMove=e=>{
    e.preventDefault();
    if(dragIdx.current===null)return;
    const y=e.touches[0].clientY;
    itemRefs.current.forEach((el,i)=>{
      if(!el)return;const r=el.getBoundingClientRect();
      if(y>=r.top&&y<=r.bottom&&i!==dragIdx.current){
        const arr=[...order];const item=arr.splice(dragIdx.current,1)[0];arr.splice(i,0,item);
        dragIdx.current=i;setOrder(arr);
      }
    });
  };

  return(
    <div>
      <div style={{fontSize:12,color:C.textSoft,marginBottom:8}}>Drag to reorder — last player gets the 🐍</div>
      {order.map((pk,i)=>(
        <div key={pk} ref={el=>itemRefs.current[i]=el}
          draggable onDragStart={()=>onDragStart(i)} onDragOver={e=>onDragOver(e,i)} onDragEnd={()=>{dragIdx.current=null;}}
          onTouchStart={e=>{e.preventDefault();dragIdx.current=i;}}
          onTouchMove={onTouchMove} onTouchEnd={()=>{dragIdx.current=null;}}
          className="snake-drag-item"
          style={{display:"flex",alignItems:"center",gap:12,padding:"14px",marginBottom:6,background:i===order.length-1?C.goldBg:C.card,border:`2px solid ${i===order.length-1?C.goldBdr:C.border}`,borderRadius:12,fontSize:15,fontWeight:i===order.length-1?800:600,color:i===order.length-1?C.gold:C.text}}>
          <span style={{fontSize:22,cursor:"grab"}}>⠿</span>
          <span>{i+1}. {PLAYERS[pk]?.name}</span>
          {i===order.length-1&&<span className="snake-icon" style={{marginLeft:"auto"}}>🐍</span>}
        </div>
      ))}
      <button className="btn" onClick={()=>onConfirm(order)} style={{width:"100%",background:C.gold,color:"#fff",marginTop:4}}>
        Confirm — 🐍 → {PLAYERS[order[order.length-1]]?.short}
      </button>
    </div>
  );
}

// ─── SNAKE TRACKER ───────────────────────────────────────────
// Fully computed from puttData — deleting a putt score auto-reverts the snake.
// Only multiOrders (tie-break ordering for multi-3-putt holes) is stored.
function SnakeTracker({mid,allKeys,sb,mpd,updateSnakeOrder}){
  const msb=sb?.[mid]||{};
  const snake=msb.snake||{};
  const multiOrders=snake.multiOrders||{};
  const initBet=Number(snake.bet||0);
  const [pending,setPending]=useState(null);

  // Fully computed state from current putt data
  const state=calcSnakeState(allKeys,mpd,initBet,multiOrders,snake.mode||'double');
  const curOwner=state?.owner||null;
  const curAmt=state?.amount||0;
  const transfers=state?.transfers||[];

  // Multi-3-putt holes that need ordering (have >1 player, no stored order)
  // Dedupe by hole — one prompt per hole, not per transfer within a hole
  const multiHoles=[...new Set(transfers.filter(t=>t.multi).map(t=>t.hole))];
  const needsOrder=multiHoles.filter(h=>{
    const stored=multiOrders?.[h];
    const players=transfers.find(t=>t.hole===h)?.players||[];
    return !stored||stored.length<players.length;
  }).map(h=>({hole:h,players:transfers.find(t=>t.hole===h)?.players||[],amount:transfers.find(t=>t.hole===h)?.amount||0}));

  const setOrder=(holeIdx,orderedKeys)=>{
    updateSnakeOrder(mid,holeIdx,orderedKeys);
    setPending(null);
    // Play rattlesnake sound when order is confirmed for a multi-3-putt hole
    if(typeof window.SFX !== 'undefined') window.SFX.rattlesnake();
  };

  return(
    <div style={{borderTop:`1px solid ${C.goldBdr}`,background:C.goldBg}}>
      <div style={{padding:"12px 14px",borderBottom:`1px solid ${C.goldBdr}`,display:"flex",alignItems:"center",gap:10}}>
        <span className="snake-icon">🐍</span>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:800,color:C.gold}}>
            🐍 Snake · {snake.mode==="increment"?`+$${initBet.toFixed(2)} per transfer`:`$${initBet.toFixed(2)} doubling`}
          </div>
          {curOwner
            ?<div style={{fontSize:12,color:C.text,marginTop:1}}>🐍 <strong>{PLAYERS[curOwner]?.name}</strong> holds the snake · Bet: <strong>${curAmt.toFixed(2)}</strong></div>
            :<div style={{fontSize:11,color:C.textSoft,marginTop:1}}>No 3-putts yet — snake not in play</div>}
          <div style={{fontSize:10,color:C.textSoft,marginTop:2}}>Deleting a putt score automatically reverts snake ownership</div>
        </div>
      </div>

      {/* Multi-3-putt holes needing tie-break order */}
      {needsOrder.map(({hole:hIdx,players,amount:firstAmt})=>{
        const isPend=pending===hIdx;
        const snakeMode=snake.mode||'double';
        // Show what the bet will be after all transfers on this hole
        const finalAmt=snakeMode==='increment'
          ? firstAmt + (players.length-1)*init   // each subsequent adds init
          : firstAmt*Math.pow(2,players.length-1); // doubling
        return(
          <div key={hIdx} style={{padding:"12px 14px",borderBottom:`1px solid ${C.goldBdr}`,background:"rgba(200,168,32,0.10)"}}>
            <div style={{fontSize:13,fontWeight:700,color:C.gold,marginBottom:4}}>
              ⚠️ Hole {hIdx+1} — {players.length} players 3-putted
            </div>
            <div style={{fontSize:11,color:C.textSoft,marginBottom:4}}>
              Snake changes hands {players.length} time{players.length>1?"s":""}. Drag to set who 3-putted first → last. Bet doubles each transfer.
            </div>
            <div style={{fontSize:11,color:C.gold,fontWeight:700,marginBottom:8}}>

            {isPend

                Set 3-Putt Order for Hole {hIdx+1} — {players.map(k=>PLAYERS[k]?.short).join(", ")}
              </button>}
          </div>
        );
      })}

      {/* Transfer log — auto-computed, updates live */}
      {transfers.length>0&&(

            const sameHole=prev&&prev.hole===t.hole;
            return(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${C.goldBdr}`,background:sameHole?"rgba(200,168,32,0.05)":"transparent"}}>
                <div>
                  <div style={{fontSize:12}}>
                    {sameHole
                      ?<span style={{color:C.textSoft}}>  ↳ </span>
                      :<span>H{t.hole+1} </span>}
                    <span>→ <strong style={{color:C.gold}}>{PLAYERS[t.owner]?.short}</strong></span>
                    {t.multi&&<span style={{fontSize:10,color:C.textSoft,marginLeft:4}}>{sameHole?"(multi)":"(1st)"}</span>}
                  </div>
                </div>
                <span style={{fontSize:13,fontWeight:700,color:C.gold}}>${t.amount.toFixed(2)}</span>
              </div>
            );
          })}
          <div style={{marginTop:8,padding:"10px 12px",background:"rgba(200,168,32,0.15)",borderRadius:10,border:`1px solid ${C.goldBdr}`}}>
            <div style={{fontSize:12,fontWeight:800,color:C.gold,textAlign:"center"}}>
              End of round: {PLAYERS[curOwner]?.short} owes ${curAmt.toFixed(2)} to each other player
            </div>

              Total owed: ${(curAmt*(allKeys.length-1)).toFixed(2)}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── R3 SETUP ────────────────────────────────────────────────
function R3Setup({r3P,setR3Pair}){
  const [open,setOpen]=useState(true);
  const aOpts=A_KEYS.map(k=>({key:k,...PLAYERS[k]}));
  const bOpts=B_KEYS.map(k=>({key:k,...PLAYERS[k]}));
  const get=mid=>{const d=r3P?.[mid]||{};return{sideA:d.sideA||[],sideB:d.sideB||[]};};
  const setSlot=(mid,side,slot,pk)=>{const cur=get(mid);const arr=[...(cur[side]||[])];if(pk==="")arr.splice(slot,1);else arr[slot]=pk;setR3Pair(mid,side,arr);};

  return(
    <div className="card" style={{border:`2px solid ${C.goldBdr}`}}>
      <button onClick={()=>setOpen(!open)} style={{width:"100%",padding:"14px",background:C.goldBg,border:"none",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:15,fontWeight:800,color:C.gold}}>🎯 Set Round 3 Pairings</span>
        <span style={{fontSize:16,color:C.gold}}>{open?"▲":"▼"}</span>
      </button>
      {open&&R3M.map(m=>{
        const isPairs=m.type==="pairs",cur=get(m.id);
        const allK=[...cur.sideA,...cur.sideB].filter(Boolean);
        const pct=isPairs?0.90:1.00;
        const popStr=allK.length>=2?calcPops(allK,COURSES.wekopa.holes,pct)&&allK.map(k=>{const d=Math.round((PLAYERS[k].hcp-Math.min(...allK.map(x=>PLAYERS[x].hcp)))*pct);return`${PLAYERS[k].short}:${d===0?"scratch":"+"+d}`;}).join(" · "):"";
        return(
          <div key={m.id} style={{padding:"14px",borderTop:`1px solid ${C.goldBdr}`}}>
            <div style={{fontSize:13,fontWeight:800,color:C.gold,marginBottom:10}}>{m.label} · {m.pts}pt · {isPairs?"2v2 (90% pops)":"Singles (100% pops)"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {[{team:TEAM_A,side:"sideA",opts:aOpts},{team:TEAM_B,side:"sideB",opts:bOpts}].map(({team,side,opts})=>(
                <div key={team.name} style={{background:team.bg,borderRadius:10,padding:"10px",border:`1px solid ${team.bdr}`}}>
                  <div style={{fontSize:11,fontWeight:800,color:team.color,marginBottom:8}}>{team.emoji} {team.short}</div>
                  {[0,...(isPairs?[1]:[])].map(slot=>{
                    const val=cur[side]?.[slot]||"";
                    const used=(cur[side]||[]).filter((_,i)=>i!==slot);
                    const avail=opts.filter(o=>!used.includes(o.key));
                    return(<select key={slot} className="sel" value={val} onChange={e=>setSlot(m.id,side,slot,e.target.value)} style={{marginBottom:slot===0&&isPairs?6:0,borderColor:val?team.color:C.border,color:val?team.color:C.textSoft}}>
                      <option value="">— Pick player —</option>
                      {avail.map(o=><option key={o.key} value={o.key}>{o.name} ({o.hcp})</option>)}
                      {val&&!avail.find(o=>o.key===val)&&<option value={val}>{PLAYERS[val].name}</option>}
                    </select>);
                  })}
                </div>
              ))}
            </div>
            {popStr&&<div style={{marginTop:8,padding:"6px 10px",background:"rgba(255,255,255,0.7)",borderRadius:8,fontSize:11,color:C.textSoft}}>🎯 {popStr}</div>}
          </div>
        );
      })}
    </div>
  );
}

// ─── SKINS TAB ───────────────────────────────────────────────
function SkinsTab({hs}){
  const rSkins=ROUNDS.filter(r=>r.course).map(r=>{
    const skins=calcSkins(hs?.[r.key]||{},r.course);
    const val=skins.length>0?(SKINS_POT/skins.length).toFixed(2):null;
    return{round:r,course:COURSES[r.course],skins,val};

  const pTot={};
  rSkins.forEach(({skins,val})=>skins.forEach(s=>{if(!pTot[s.player])pTot[s.player]={n:0,w:0};pTot[s.player].n++;pTot[s.player].w+=val?parseFloat(val):0;}));
  const sorted=Object.entries(pTot).sort((a,b)=>b[1].w-a[1].w);

    <div className="card">

          <div key={k} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderTop:i>0?`1px solid ${C.border}`:"none"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:14,color:C.gold,fontWeight:800,minWidth:24}}>#{i+1}</span>
              <span style={{fontSize:18}}>{team.emoji}</span>
              <div><div style={{fontSize:14,fontWeight:700}}>{PLAYERS[k].name}</div><div style={{fontSize:11,color:team.color,fontWeight:700}}>{team.short}</div></div>
            </div>
            <div style={{textAlign:"right"}}><div style={{fontSize:20,fontWeight:900,color:C.gold}}>${d.w.toFixed(0)}</div><div style={{fontSize:10,color:C.textSoft}}>{d.n} skin{d.n!==1?"s":""}</div></div>
          </div>
        );})}
    </div>

      <div key={round.key} className="card">
        <div style={{padding:"10px 14px",background:C.hdr,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:12,fontWeight:800,color:"#c0a040"}}>{round.label}</div><div style={{fontSize:10,color:"#8a8060",marginTop:1}}>{course.full}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:12,fontWeight:700,color:"#c0a040"}}>${SKINS_POT}</div>{skins.length>0&&<div style={{fontSize:10,color:"#8a8060"}}>{skins.length} × ${parseFloat(val).toFixed(0)}</div>}</div>
        </div>
        {skins.length===0?<div style={{padding:"14px",textAlign:"center",color:C.textSoft,fontSize:12}}>No skins yet</div>
          :skins.map((s,si)=>{const team=PLAYERS[s.player].team==="A"?TEAM_A:TEAM_B;return(
            <div key={si} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderTop:si>0?`1px solid ${C.border}`:"none"}}>

          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:11,fontWeight:700,color:team.color}}>{team.short}</span>
            <span style={{fontSize:15,fontWeight:800,minWidth:30,textAlign:"right"}}>{p.hcp}</span>
          </div>
        </div>
      );})}
    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
