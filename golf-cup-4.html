// ─── POPS ───────────────────────────────────────────────────────
function calcPops(playerKeys,courseHoles,allowance){
  const minHcp=Math.min(...playerKeys.map(k=>PLAYERS[k].hcp));
  const res={};
  playerKeys.forEach(k=>{
    const diff=Math.round((PLAYERS[k].hcp-minHcp)*allowance);
    res[k]=courseHoles.map(hole=>diff<=0?0:diff<=18?(hole.hcp<=diff?1:0):(hole.hcp<=diff-18?2:1));
  });
  return res;
}

  if(STATIC_PAIRINGS[matchId]) return STATIC_PAIRINGS[matchId];

  if(!r3m) return null;
  const dyn=r3P?.[matchId]||{};

}

  if(!p||p.type==="bonus"||(!p.sideA.length&&!p.sideB.length)){

  const b=p.sideB.length?p.sideB.map(k=>PLAYERS[k]?.short||k).join(" & "):"TBD";
  return `${a}  vs  ${b}`;
}

// ══════════════════════════════════════════════════════════════
// MATCH PLAY CALC — auto-detects dormie, clinched, conceded
// upDown positive = sideA leads
// ══════════════════════════════════════════════════════════════
function calcMatchPlay(matchId,holeScores,courseKey,r3P){
  const p=resolvePairing(matchId,r3P);
  if(!p||p.type==="bonus"||!p.sideA.length||!p.sideB.length)return null;
  const course=COURSES[courseKey];
  const allKeys=[...p.sideA,...p.sideB];
  const allowance=p.type==="singles"?1.00:0.90;
  const pops=calcPops(allKeys,course.holes,allowance);
  let upDown=0,holesPlayed=0;
  const holeResults=[];
  for(let h=0;h<18;h++){
    const aS=p.sideA.map(k=>{const g=holeScores?.[k]?.[h];return(g==null||g==="")? null:Number(g)-(pops[k]?.[h]??0);}).filter(s=>s!==null);
    const bS=p.sideB.map(k=>{const g=holeScores?.[k]?.[h];return(g==null||g==="")? null:Number(g)-(pops[k]?.[h]??0);}).filter(s=>s!==null);
    if(!aS.length||!bS.length){holeResults.push(null);continue;}
    const aB=Math.min(...aS),bB=Math.min(...bS);
    holesPlayed++;
    if(aB<bB)upDown++;else if(bB<aB)upDown--;
    holeResults.push(upDown);
  }
  const rem=18-holesPlayed;
  let status="AS",winner=null,isDormie=false,isClinched=false;
  const abs=Math.abs(upDown);
  if(abs>rem&&holesPlayed>0){
    // clinched — more up than holes remaining
    isClinched=true;
    winner=upDown>0?"A":"B";
    status=upDown>0?`${TEAM_A.emoji} ${abs}&${rem}`:`${TEAM_B.emoji} ${abs}&${rem}`;
  }else if(holesPlayed===18){
    if(upDown>0){winner="A";status=`${TEAM_A.emoji} 1UP`;}
    else if(upDown<0){winner="B";status=`${TEAM_B.emoji} 1UP`;}
    else{winner="halved";status="HALVED";}
  }else if(abs>0&&abs===rem&&holesPlayed>0){
    // dormie — up by exactly holes remaining
    isDormie=true;
    status=upDown>0?`🌵 DORMIE ${abs}`:`🌶️ DORMIE ${abs}`;
  }else if(upDown!==0&&holesPlayed>0){
    status=upDown>0?`${TEAM_A.emoji} ${abs}UP`:`${TEAM_B.emoji} ${abs}UP`;
  }
  return{upDown,holesPlayed,holesRemaining:rem,status,winner,holeResults,isDormie,isClinched};
}

// ══════════════════════════════════════════════════════════════
// NASSAU CALC
// ══════════════════════════════════════════════════════════════
function calcNassau(matchId,holeScores,courseKey,r3P,nassauBet){
  // nassauBet = {front:$, back:$, total:$}
  if(!nassauBet) return null;
  const p=resolvePairing(matchId,r3P);
  if(!p||!p.sideA.length||!p.sideB.length)return null;
  const course=COURSES[courseKey];
  const allKeys=[...p.sideA,...p.sideB];
  const allowance=p.type==="singles"?1.00:0.90;
  const pops=calcPops(allKeys,course.holes,allowance);

  const netScore=(k,h)=>{
    const g=holeScores?.[k]?.[h];
    if(g==null||g==="")return null;
    return Number(g)-(pops[k]?.[h]??0);
  };
  const bestNet=(side,h)=>{
    const vals=side.map(k=>netScore(k,h)).filter(v=>v!==null);
    return vals.length?Math.min(...vals):null;
  };

  const holeWinner=(h)=>{
    const a=bestNet(p.sideA,h),b=bestNet(p.sideB,h);
    if(a===null||b===null)return null;
    if(a<b)return"A";if(b<a)return"B";return"H";
  };

  // front 9
  let fUp=0,fPlayed=0;
  for(let h=0;h<9;h++){const w=holeWinner(h);if(w===null)continue;fPlayed++;if(w==="A")fUp++;else if(w==="B")fUp--;}
  // back 9
  let bUp=0,bPlayed=0;
  for(let h=9;h<18;h++){const w=holeWinner(h);if(w===null)continue;bPlayed++;if(w==="A")bUp++;else if(w==="B")bUp--;}
  // total
  let tUp=fUp+bUp,tPlayed=fPlayed+bPlayed;

  const seg=(up,played,nine)=>{
    const rem=nine-played;
    const abs=Math.abs(up);
    if(abs>rem&&played>0)return{winner:up>0?"A":"B",status:up>0?`${TEAM_A.emoji} ${abs}&${rem}`:`${TEAM_B.emoji} ${abs}&${rem}`,done:true};
    if(played===nine)return{winner:up>0?"A":up<0?"B":"H",status:up>0?`${TEAM_A.emoji} 1UP`:up<0?`${TEAM_B.emoji} 1UP`:"HALVED",done:true};
    if(abs===rem&&played>0&&rem>0)return{winner:null,status:up>0?`🌵 DORMIE ${abs}`:`🌶️ DORMIE ${abs}`,done:false};
    if(up===0)return{winner:null,status:"AS",done:false};
    return{winner:null,status:up>0?`${TEAM_A.emoji} ${abs}UP`:`${TEAM_B.emoji} ${abs}UP`,done:false};
  };

  const front=seg(fUp,fPlayed,9);
  const back=seg(bUp,bPlayed,9);
  const total=seg(tUp,tPlayed,18);

  const pay=(seg,amt)=>{
    if(!amt||!seg.done||seg.winner==="H")return 0;
    return seg.winner==="A"?Number(amt):-Number(amt);
  };

  const net=pay(front,nassauBet.front)+pay(back,nassauBet.back)+pay(total,nassauBet.total);

  return{front,back,total,net};
}

// ══════════════════════════════════════════════════════════════
// VEGAS CALC
// ══════════════════════════════════════════════════════════════
function calcVegas(matchId,holeScores,courseKey,r3P,vegasPer){
  if(!vegasPer)return null;
  const p=resolvePairing(matchId,r3P);
  if(!p||p.sideA.length!==2||p.sideB.length!==2)return null;
  const course=COURSES[courseKey];
  const allKeys=[...p.sideA,...p.sideB];
  const pops=calcPops(allKeys,course.holes,0.90);
  const netOf=(k,h)=>{const g=holeScores?.[k]?.[h];if(g==null||g==="")return null;return Number(g)-(pops[k]?.[h]??0);};

  // Vegas: combine two net scores into a 2-digit number (lower first)
  const vegasNum=(side,h)=>{
    const scores=side.map(k=>netOf(k,h)).filter(v=>v!==null);
    if(scores.length<2)return null;
    const [lo,hi]=scores.sort((a,b)=>a-b);
    return lo*10+hi;
  };

  let totalDiff=0;
  const holeDetails=[];
  for(let h=0;h<18;h++){
    const a=vegasNum(p.sideA,h),b=vegasNum(p.sideB,h);
    if(a===null||b===null){holeDetails.push(null);continue;}
    const diff=b-a; // positive means A wins points
    totalDiff+=diff;
    holeDetails.push({a,b,diff});
  }
  const net=totalDiff*Number(vegasPer);
  return{holeDetails,totalDiff,net,per:Number(vegasPer)};
}

// ══════════════════════════════════════════════════════════════
// SNAKE CALC
// ══════════════════════════════════════════════════════════════
// snakeState = { initialBet, events:[{hole, owner, amount, reason}] }
// puttData = { [matchId]: { [playerKey]: { [holeIdx]: putts } } }
function calcSnake(matchId,puttData,snakeBet,snakeEvents){
  // snakeEvents is the authoritative ordered list of ownership changes
  // We just calculate what's owed at end from events
  if(!snakeBet||!snakeEvents||!snakeEvents.length)return null;
  const lastEvent=snakeEvents[snakeEvents.length-1];
  const finalOwner=lastEvent.owner;
  const finalAmount=lastEvent.amount;
  // All other players in the match each receive finalAmount
  const p=STATIC_PAIRINGS[matchId]||{};
  const allKeys=[...(p.sideA||[]),...(p.sideB||[])];
  if(!allKeys.length)return null;
  const others=allKeys.filter(k=>k!==finalOwner);
  return{owner:finalOwner,amount:finalAmount,others,payout:finalAmount,events:snakeEvents};
}

// ══════════════════════════════════════════════════════════════
// SKINS CALC
// ══════════════════════════════════════════════════════════════
function calcSkins(allHoleScores,courseKey){
  const course=COURSES[courseKey];
  const allKeys=Object.keys(PLAYERS);
  const pops=calcPops(allKeys,course.holes,0.90);
  const skins=[];
  for(let h=0;h<18;h++){
    const par=course.holes[h].par;
    const ns=allKeys.map(k=>{
      let gross=null;
      Object.values(allHoleScores||{}).forEach(ms=>{if(ms?.[k]?.[h]!=null)gross=ms[k][h];});
      if(gross==null)return null;
      return{k,net:Number(gross)-(pops[k]?.[h]??0)};
    }).filter(Boolean);
    if(!ns.length)continue;
    const mn=Math.min(...ns.map(s=>s.net));
    if(mn>=par)continue;
    const w=ns.filter(s=>s.net===mn);
    if(w.length===1)skins.push({holeIdx:h,hole:course.holes[h].h,player:w[0].k,net:mn,par});
  }
  return skins;
}

// FIREBASE
// ══════════════════════════════════════════════════════════════
function useFirebase(){
  const [ready,setReady]=useState(false);
  const [fbError,setFbError]=useState(null);
  const dbRef=useRef(null);
  useEffect(()=>{
    try{if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);else firebase.app();dbRef.current=firebase.database();setReady(true);}
    catch(e){setFbError("Firebase init failed: "+e.message);}
  },[]);
  const listen=useCallback((cb)=>{
    if(!dbRef.current)return()=>{};
    const ref=dbRef.current.ref(DB_PATH);
    const h=snap=>{cb(snap.val()||{});};
    ref.on("value",h);return()=>ref.off("value",h);
  },[ready]);
  const save=useCallback(async(data)=>{if(!dbRef.current)throw new Error("DB not ready");await dbRef.current.ref(DB_PATH).set(data);},[ready]);
  return{ready,fbError,listen,save};
}

  const [syncStatus,setSyncStatus]=useState("connecting");
  const {ready,fbError,listen,save}=useFirebase();
  const latestMR=useRef({}),latestHS=useRef({}),latestPD=useRef({}),latestR3P=useRef({}),latestSB=useRef({});
  const saveTimer=useRef(null),isSaving=useRef(false),lastSave=useRef(0);

  const scheduleSave=useCallback(()=>{
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      if(isSaving.current){scheduleSave();return;}
      isSaving.current=true;setSyncStatus("saving");
      try{
        await save({matchResults:latestMR.current,holeScores:latestHS.current,puttData:latestPD.current,r3Pairings:latestR3P.current,sideBets:latestSB.current,ts:Date.now()});
        lastSave.current=Date.now();setSyncStatus("saved");setTimeout(()=>setSyncStatus("live"),2000);
      }catch(e){setSyncStatus("error");}finally{isSaving.current=false;}
    },600);
  },[save]);

  useEffect(()=>{
    if(!ready)return;setSyncStatus("live");
    const unsub=listen(data=>{
      if(isSaving.current)return;
      const mr=data.matchResults||{},hs=data.holeScores||{},pd=data.puttData||{},r3p=data.r3Pairings||{},sb=data.sideBets||{};
      latestMR.current=mr;latestHS.current=hs;latestPD.current=pd;latestR3P.current=r3p;latestSB.current=sb;
      setMatchResults(mr);setHoleScores(hs);setPuttData(pd);setR3Pairings(r3p);setSideBets(sb);setSyncStatus("live");
    });
    return unsub;
  },[ready,listen]);

  const setMatchResult=useCallback((id,winner)=>{
    setMatchResults(prev=>{const next={...prev,[id]:winner===prev[id]?null:winner};latestMR.current=next;scheduleSave();return next;});
  },[scheduleSave]);
  const setHoleScore=useCallback((rk,mid,pk,hi,val)=>{
    setHoleScores(prev=>{const r={...(prev[rk]||{})},m={...(r[mid]||{})},p={...(m[pk]||{})};
      if(val===undefined||val==="")delete p[hi];else p[hi]=Number(val);
      m[pk]=p;r[mid]=m;const next={...prev,[rk]:r};latestHS.current=next;scheduleSave();return next;});
  },[scheduleSave]);
  const setPutts=useCallback((rk,mid,pk,hi,val)=>{
    setPuttData(prev=>{const r={...(prev[rk]||{})},m={...(r[mid]||{})},p={...(m[pk]||{})};
      if(val===undefined||val==="")delete p[hi];else p[hi]=Number(val);
      m[pk]=p;r[mid]=m;const next={...prev,[rk]:r};latestPD.current=next;scheduleSave();return next;});
  },[scheduleSave]);
  const setR3Pairing=useCallback((mid,side,players)=>{
    setR3Pairings(prev=>{const next={...prev,[mid]:{...(prev[mid]||{}),[side]:players}};latestR3P.current=next;scheduleSave();return next;});
  },[scheduleSave]);
  const updateSideBet=useCallback((mid,patch)=>{
    setSideBets(prev=>{const next={...prev,[mid]:{...(prev[mid]||{}),...patch}};latestSB.current=next;scheduleSave();return next;});
  },[scheduleSave]);
  const addSnakeEvent=useCallback((mid,event)=>{
    setSideBets(prev=>{
      const cur=prev[mid]||{};const snake=cur.snake||{bet:0,events:[]};
      const events=[...(snake.events||[]),event];
      const next={...prev,[mid]:{...cur,snake:{...snake,events}}};
      latestSB.current=next;scheduleSave();return next;
    });
  },[scheduleSave]);
  const updateSnakeEvents=useCallback((mid,events)=>{
    setSideBets(prev=>{
      const cur=prev[mid]||{};const snake=cur.snake||{bet:0,events:[]};
      const next={...prev,[mid]:{...cur,snake:{...snake,events}}};
      latestSB.current=next;scheduleSave();return next;
    });
  },[scheduleSave]);

  const totals=ALL_MATCHES.reduce((acc,m)=>{
    // use auto-detected winner from match play if available, else stored result
    const w=matchResults[m.id];
    if(w==="A")acc.A+=m.pts;else if(w==="B")acc.B+=m.pts;else if(w==="halved"){acc.A+=m.pts/2;acc.B+=m.pts/2;}
    return acc;
  },{A:0,B:0});
  const remaining=ALL_MATCHES.filter(m=>!matchResults[m.id]).reduce((s,m)=>s+m.pts,0);
  const leader=totals.A>totals.B?"A":totals.B>totals.A?"B":null;
  const margin=Math.abs(totals.A-totals.B);
  const clinched=leader&&margin>remaining;
  const leaderTeam=leader==="A"?TEAM_A:TEAM_B;

  const syncColor={connecting:"#8a7020",live:"#1a7a1a",saving:"#8a6000",saved:"#1a7a1a",error:"#c02020"}[syncStatus]||T.textSoft;
  const syncLabel={connecting:"⟳ CONNECTING",live:"● LIVE",saving:"⟳ SAVING",saved:"✓ SAVED",error:"✗ ERROR"}[syncStatus]||"";

  const TABS=[
    {id:"scoreboard",label:"⛳ Board"},
    {id:"r1",label:"R1"},{id:"r2",label:"R2"},{id:"r3",label:"R3"},
    {id:"r4",label:"R4"},{id:"r5",label:"R5"},
    {id:"skins",label:"💰 Skins"},{id:"bets",label:"🎰 Bets"},{id:"rosters",label:"👤 Teams"},
  ];

  if(fbError)return(<div style={{padding:40,textAlign:"center",color:T.bColor}}><div style={{fontSize:20,marginBottom:16}}>⚠️ Firebase Error</div><div style={{fontSize:13,color:T.textSoft}}>{fbError}</div></div>);

  return(
    <div style={{minHeight:"100vh",background:T.bg,fontFamily:"Georgia,serif",color:T.text}}>
      <div style={{background:T.hdr,borderBottom:"3px solid #8a7020",padding:"16px 16px 12px",textAlign:"center",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,backgroundImage:"repeating-linear-gradient(60deg,transparent,transparent 40px,rgba(255,255,255,0.02) 40px,rgba(255,255,255,0.02) 80px)"}}/>
        <div style={{fontSize:9,letterSpacing:6,color:"#a09050",marginBottom:3}}>✦ THE CUP ✦</div>
        <h1 style={{fontSize:"clamp(18px,5vw,36px)",fontWeight:400,margin:0,letterSpacing:4,color:T.hdrText}}>MATCH SCOREBOARD</h1>
        <div style={{fontSize:9,letterSpacing:3,color:"#8a8060",marginTop:3}}>5 ROUNDS · 22 PTS · FIRST TO 11 · $160 SKINS/ROUND</div>
        <div style={{position:"absolute",top:10,right:12,fontSize:8,color:syncColor,fontWeight:"bold"}}>{syncLabel}</div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",background:"#fff",borderBottom:`2px solid ${T.border}`}}>
        {[TEAM_A,TEAM_B].map((team,i)=>{
          const side=i===0?"A":"B",score=i===0?totals.A:totals.B,isLeader=leader===side;
          return(<div key={team.name} style={{padding:"12px 10px",textAlign:"center",background:isLeader?team.bg:"transparent",borderRight:i===0?`1px solid ${T.border}`:"none",borderLeft:i===1?`1px solid ${T.border}`:"none"}}>
            <div style={{fontSize:"clamp(9px,1.8vw,11px)",letterSpacing:1,color:isLeader?team.color:T.textSoft,fontWeight:"bold"}}>{team.emoji} {team.name}{isLeader&&clinched?" 🏆":""}</div>
            <div style={{fontSize:"clamp(32px,7vw,56px)",fontWeight:700,lineHeight:1,marginTop:3,color:isLeader?team.color:T.text}}>{fmt(score)}</div>
          </div>);
        })}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 8px"}}>
          <div style={{fontSize:9,letterSpacing:2,color:T.textSoft}}>VS</div>
          <div style={{fontSize:8,color:T.textSoft,marginTop:2}}>{remaining>0?`${fmt(remaining)} left`:"FINAL"}</div>
        </div>
      </div>

      <div style={{background:clinched?"#d4f0d4":leader?"#fffbe0":T.cardAlt,borderBottom:`1px solid ${T.border}`,padding:"5px 16px",textAlign:"center",fontSize:10,letterSpacing:2,fontWeight:"bold",color:clinched?T.aColor:leader?T.gold:T.textMid}}>
        {clinched?`🏆 ${leaderTeam.name} WINS`:leader?`${leaderTeam.name} LEADS BY ${fmt(margin)} · ${fmt(remaining)} LEFT`:`ALL SQUARE · ${fmt(remaining)} LEFT`}
      </div>
      <div style={{background:T.border,height:5,position:"relative"}}>
        <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${(totals.A/TOTAL_POINTS)*100}%`,background:`linear-gradient(90deg,#1a6a1a,${T.aColor})`,transition:"width 0.4s"}}/>
        <div style={{position:"absolute",right:0,top:0,height:"100%",width:`${(totals.B/TOTAL_POINTS)*100}%`,background:`linear-gradient(270deg,#901010,${T.bColor})`,transition:"width 0.4s"}}/>
        <div style={{position:"absolute",left:"50%",top:0,width:2,height:"100%",background:T.gold,transform:"translateX(-50%)"}}/>
      </div>

      <div style={{display:"flex",overflowX:"auto",background:T.tabBg,borderBottom:`1px solid ${T.border}`}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);setActiveMatch(null);}}
            style={{padding:"9px 11px",background:tab===t.id?T.tabAct:"transparent",border:"none",borderBottom:tab===t.id?`3px solid ${T.tabActBdr}`:"3px solid transparent",color:tab===t.id?T.tabActBdr:T.textSoft,cursor:"pointer",fontSize:9,letterSpacing:1,textTransform:"uppercase",whiteSpace:"nowrap",flexShrink:0,fontWeight:tab===t.id?"bold":"normal"}}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={{padding:"10px",maxWidth:920,margin:"0 auto"}}>
        {tab==="scoreboard"&&<ScoreboardTab rounds={ROUNDS_CONFIG} matchResults={matchResults} setMatchResult={setMatchResult} holeScores={holeScores} r3Pairings={r3Pairings} sideBets={sideBets}/>}
        {["r1","r2","r3","r4","r5"].includes(tab)&&(
          <RoundTab roundConfig={ROUND_BY_KEY[tab]} matchResults={matchResults} setMatchResult={setMatchResult}
            holeScores={holeScores[tab]||{}} puttData={puttData[tab]||{}}
            onScore={(mid,pk,hi,v)=>setHoleScore(tab,mid,pk,hi,v)}
            onPutts={(mid,pk,hi,v)=>setPutts(tab,mid,pk,hi,v)}
            activeMatch={activeMatch} setActiveMatch={setActiveMatch}
            r3Pairings={r3Pairings} setR3Pairing={setR3Pairing}
            sideBets={sideBets} updateSideBet={updateSideBet}
            addSnakeEvent={addSnakeEvent} updateSnakeEvents={updateSnakeEvents}/>
        )}
        {tab==="skins"&&<SkinsTab holeScores={holeScores}/>}
        {tab==="bets"&&<BetsSummaryTab rounds={ROUNDS_CONFIG} holeScores={holeScores} puttData={puttData} sideBets={sideBets} r3Pairings={r3Pairings}/>}
        {tab==="rosters"&&<RostersTab r3Pairings={r3Pairings}/>}
      </div>
    </div>
  );
}

// SCOREBOARD TAB
// ══════════════════════════════════════════════════════════════
function ScoreboardTab({rounds,matchResults,setMatchResult,holeScores,r3Pairings,sideBets}){
  return(<>
    {rounds.map(round=>{
      const isBonus=round.id==="23bonus";
      const rPts=round.matches.reduce((s,m)=>{const w=matchResults[m.id];if(w==="A")return{...s,A:s.A+m.pts};if(w==="B")return{...s,B:s.B+m.pts};if(w==="halved")return{...s,A:s.A+m.pts/2,B:s.B+m.pts/2};return s;},{A:0,B:0});
      const played=round.matches.filter(m=>matchResults[m.id]).length;
      const rTotal=round.matches.reduce((s,m)=>s+m.pts,0);
      return(
        <div key={round.id} style={{border:`1px solid ${isBonus?T.goldBdr:T.border}`,borderRadius:8,overflow:"hidden",marginBottom:10,background:T.card,boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 12px",background:isBonus?T.goldBg:T.cardAlt,borderBottom:`1px solid ${isBonus?T.goldBdr:T.border}`}}>
            <div>
              <div style={{fontSize:9,letterSpacing:2,color:isBonus?T.gold:T.textSoft,fontWeight:"bold"}}>{isBonus?"🎯 NET BONUS":`${round.label.toUpperCase()} · ${round.format.toUpperCase()}`}</div>
              {round.course&&<div style={{fontSize:10,color:T.textMid,marginTop:1}}>{COURSES[round.course].name}</div>}
              {isBonus&&<div style={{fontSize:9,color:T.gold,marginTop:1}}>Combined Net Score · Rounds 2 & 3</div>}
            </div>
            <div style={{fontWeight:"bold"}}>{played>0?<span style={{fontSize:13,color:T.textMid}}>{fmt(rPts.A)} – {fmt(rPts.B)}</span>:<span style={{fontSize:9,color:T.textSoft}}>{rTotal} pts</span>}</div>
          </div>
          {round.matches.map(m=>{
            let liveStatus=null;
            if(!isBonus&&round.course){
              const hs=holeScores?.[round.key]?.[m.id];
              if(hs){const mp=calcMatchPlay(m.id,hs,round.course,r3Pairings);if(mp&&mp.holesPlayed>0)liveStatus=mp.status;}
            }
            const sb=sideBets?.[m.id]||{};
            const betTags=[sb.nassau?"Nassau":null,sb.vegas?"Vegas":null,sb.snake?"🐍":null].filter(Boolean);
            return(
              <div key={m.id} style={{borderTop:`1px solid ${T.border}`}}>
                <div style={{padding:"5px 12px 2px",display:"flex",justifyContent:"space-between",alignItems:"center",background:T.card}}>
                  <div>
                    <div style={{fontSize:9,color:T.textMid,fontWeight:"bold"}}>{matchLabel(m.id,r3Pairings)}</div>
                    {betTags.length>0&&<div style={{fontSize:8,color:T.textSoft,marginTop:1}}>{betTags.join(" · ")}</div>}
                  </div>
                  {liveStatus&&<span style={{fontSize:10,color:T.gold,fontWeight:"bold"}}>▶ {liveStatus}</span>}
                </div>
                <MatchResultRow matchId={m.id} pts={m.pts} matchResults={matchResults} setMatchResult={setMatchResult} isBonus={isBonus}/>
              </div>
            );
          })}
        </div>
      );
    })}
    <div style={{padding:"10px",background:T.card,border:`1px solid ${T.border}`,borderRadius:8,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
      <div style={{fontSize:9,letterSpacing:3,color:T.textSoft,textAlign:"center",marginBottom:8,fontWeight:"bold"}}>POINTS STRUCTURE</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,textAlign:"center"}}>
        {[{l:"Rounds 1–3",v:7,n:"Match play"},{l:"Net Bonus",v:2,n:"R2+R3"},{l:"Rounds 4–5",v:12,n:"Singles day"}].map(s=>(
          <div key={s.l} style={{padding:"7px 4px",background:T.cardAlt,borderRadius:6,border:`1px solid ${T.border}`}}>
            <div style={{fontSize:18,color:T.text,fontWeight:"bold"}}>{s.v}</div>
            <div style={{fontSize:9,color:T.textMid,marginTop:1}}>{s.l}</div>
            <div style={{fontSize:8,color:T.textSoft,marginTop:1}}>{s.n}</div>
          </div>
        ))}
      </div>
    </div>
  </>);
}

    <span style={{fontSize:10,color:T.textSoft}}>{prefix}</span>
    <input type="number" min="0" step="0.01" value={val||""} onChange={e=>onChange(e.target.value)}

        <span style={{fontSize:10,color:T.purple}}>{open?"▲":"▼"}</span>
      </button>

        {/* NASSAU */}
        <div style={{border:`1px solid ${T.border}`,borderRadius:6,overflow:"hidden"}}>
          <label style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:T.cardAlt,cursor:"pointer"}}>
            <input type="checkbox" checked={!!sb.nassauOn} onChange={e=>updateSideBet(matchId,{nassauOn:e.target.checked})}/>
            <span style={{fontSize:10,fontWeight:"bold",color:T.textMid}}>Nassau</span>
          </label>
          {sb.nassauOn&&(
            <div style={{padding:"8px 10px",display:"flex",flexWrap:"wrap",gap:10}}>
              <div><div style={{fontSize:8,color:T.textSoft,marginBottom:2}}>FRONT 9</div>{inp(nassau.front,v=>updateSideBet(matchId,{nassau:{...nassau,front:v}}))}</div>
              <div><div style={{fontSize:8,color:T.textSoft,marginBottom:2}}>BACK 9</div>{inp(nassau.back,v=>updateSideBet(matchId,{nassau:{...nassau,back:v}}))}</div>
              <div><div style={{fontSize:8,color:T.textSoft,marginBottom:2}}>TOTAL</div>{inp(nassau.total,v=>updateSideBet(matchId,{nassau:{...nassau,total:v}}))}</div>
            </div>
          )}
        </div>

        {/* VEGAS (pairs only) */}
        {isPairs&&(
          <div style={{border:`1px solid ${T.border}`,borderRadius:6,overflow:"hidden"}}>
            <label style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:T.cardAlt,cursor:"pointer"}}>
              <input type="checkbox" checked={!!sb.vegasOn} onChange={e=>updateSideBet(matchId,{vegasOn:e.target.checked})}/>
              <span style={{fontSize:10,fontWeight:"bold",color:T.textMid}}>Vegas</span>
            </label>
            {sb.vegasOn&&(
              <div style={{padding:"8px 10px"}}>
                <div style={{fontSize:8,color:T.textSoft,marginBottom:2}}>$ PER POINT DIFFERENCE</div>
                {inp(vegas.per,v=>updateSideBet(matchId,{vegas:{...vegas,per:v}}))}
                <div style={{fontSize:8,color:T.textSoft,marginTop:4}}>Lower score+partner = 2-digit Vegas number. Difference × bet per point.</div>
              </div>
            )}
          </div>
        )}

        {/* SNAKE (pairs only) */}
        {isPairs&&(
          <div style={{border:`1px solid ${T.border}`,borderRadius:6,overflow:"hidden"}}>
            <label style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:T.cardAlt,cursor:"pointer"}}>
              <input type="checkbox" checked={!!sb.snakeOn} onChange={e=>updateSideBet(matchId,{snakeOn:e.target.checked})}/>
              <span style={{fontSize:10,fontWeight:"bold",color:T.textMid}}>🐍 Snake</span>
            </label>
            {sb.snakeOn&&(
              <div style={{padding:"8px 10px"}}>
                <div style={{fontSize:8,color:T.textSoft,marginBottom:2}}>INITIAL BET (doubles each transfer)</div>
                {inp(snake.bet,v=>updateSideBet(matchId,{snake:{...(snake||{}),bet:v,events:snake.events||[]}}))}
                <div style={{fontSize:8,color:T.textSoft,marginTop:4}}>On 3-putt → 🐍 moves to that player. Bet doubles each move. End of round, snake owner pays each other player.</div>
              </div>
            )}
          </div>
        )}
      </div>)}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// SNAKE TRACKER
// ══════════════════════════════════════════════════════════════
function SnakeTracker({matchId,allKeys,sideBets,puttData,addSnakeEvent,updateSnakeEvents}){
  const sb=sideBets?.[matchId]||{};
  const snake=sb.snake||{};
  const events=snake.events||[];
  const currentOwner=events.length?events[events.length-1].owner:null;
  const currentAmount=events.length?events[events.length-1].amount:Number(snake.bet||0);

  // Detect 3-putts from puttData
  const [dragOrder,setDragOrder]=useState(null);
  const [dragHole,setDragHole]=useState(null);
  const [dragOver,setDragOver]=useState(null);

  // Find all 3-putt occurrences per hole
  const threePutts={}; // {hIdx:[playerKey,...]}
  allKeys.forEach(k=>{
    Object.entries(puttData?.[k]||{}).forEach(([hi,putts])=>{
      if(Number(putts)>=3){
        if(!threePutts[hi])threePutts[hi]=[];
        if(!threePutts[hi].includes(k))threePutts[hi].push(k);
      }
    });
  });

  // Process 3-putts that haven't been resolved yet
  const resolvedHoles=new Set(events.map(e=>e.hole));

  const resolveHole=(hIdx,orderedKeys)=>{
    if(!orderedKeys||!orderedKeys.length)return;
    const newOwner=orderedKeys[orderedKeys.length-1]; // last in order = current owner
    const prevAmount=events.length?events[events.length-1].amount:Number(snake.bet||0);
    const newAmount=events.length?prevAmount*2:prevAmount;
    addSnakeEvent(matchId,{hole:Number(hIdx),owner:newOwner,amount:newAmount,order:orderedKeys,ts:Date.now()});
    setDragOrder(null);setDragHole(null);
  };

  const unresolvedHoles=Object.keys(threePutts).filter(h=>!resolvedHoles.has(Number(h)));

  return(
    <div style={{border:`1px solid ${T.gold}`,borderRadius:6,marginTop:8,overflow:"hidden"}}>
      <div style={{padding:"6px 10px",background:T.goldBg,borderBottom:`1px solid ${T.goldBdr}`,display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:14}}>🐍</span>
        <div>
          <div style={{fontSize:9,fontWeight:"bold",color:T.gold}}>SNAKE TRACKER</div>
          {currentOwner?<div style={{fontSize:10,color:T.text}}>Current owner: <strong>{PLAYERS[currentOwner]?.short}</strong> · ${typeof currentAmount==="number"?currentAmount.toFixed(2):"0.00"}</div>
            :<div style={{fontSize:9,color:T.textSoft}}>No 3-putts yet · Initial bet: ${Number(snake.bet||0).toFixed(2)}</div>}
        </div>
      </div>

      {/* Unresolved 3-putts */}
      {unresolvedHoles.map(hIdx=>{
        const players=threePutts[hIdx];
        const isMulti=players.length>1;
        const isDragging=dragHole===hIdx;
        if(!isMulti){
          return(
            <div key={hIdx} style={{padding:"7px 10px",borderTop:`1px solid ${T.goldBdr}`,background:"#fffbf0"}}>
              <div style={{fontSize:9,color:T.gold}}>Hole {Number(hIdx)+1} · 3-putt by <strong>{PLAYERS[players[0]]?.short}</strong></div>
              <button onClick={()=>resolveHole(hIdx,[players[0]])} style={{marginTop:4,padding:"4px 10px",background:T.gold,border:"none",borderRadius:4,color:"#fff",fontSize:9,fontWeight:"bold"}}>
                Confirm 🐍 → {PLAYERS[players[0]]?.short}
              </button>
            </div>
          );
        }
        // Multiple 3-putts — drag to order
        const order=isDragging?dragOrder:players;
        return(
          <div key={hIdx} style={{padding:"7px 10px",borderTop:`1px solid ${T.goldBdr}`,background:"#fffbf0"}}>
            <div style={{fontSize:9,color:T.gold,marginBottom:5}}>Hole {Number(hIdx)+1} · Multiple 3-putts — drag to set order (last = snake owner)</div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {order.map((pk,oi)=>(
                <div key={pk} draggable
                  onDragStart={()=>{setDragHole(hIdx);setDragOrder([...order]);}}
                  onDragOver={e=>{e.preventDefault();setDragOver(oi);}}
                  onDrop={e=>{
                    e.preventDefault();
                    const from=order.indexOf(pk);
                    if(dragOver!==null&&dragOver!==from){
                      const arr=[...order];arr.splice(from,1);arr.splice(dragOver,0,pk);
                      setDragOrder(arr);
                    }setDragOver(null);
                  }}
                  style={{padding:"6px 10px",background:oi===order.length-1?"#fff3c8":T.card,border:`1px solid ${oi===order.length-1?T.goldBdr:T.border}`,borderRadius:5,fontSize:10,fontWeight:oi===order.length-1?"bold":"normal",color:oi===order.length-1?T.gold:T.text,display:"flex",alignItems:"center",gap:6,cursor:"grab"}}>
                  <span style={{fontSize:12}}>⠿</span>
                  <span>{oi+1}. {PLAYERS[pk]?.short}</span>
                  {oi===order.length-1&&<span style={{fontSize:14,marginLeft:"auto"}}>🐍</span>}
                </div>
              ))}
            </div>
            <button onClick={()=>resolveHole(hIdx,isDragging?dragOrder:order)} style={{marginTop:6,padding:"4px 12px",background:T.gold,border:"none",borderRadius:4,color:"#fff",fontSize:9,fontWeight:"bold"}}>
              Confirm Order
            </button>
          </div>
        );
      })}

      {/* History */}
      {events.length>0&&(
        <div style={{padding:"6px 10px",borderTop:`1px solid ${T.goldBdr}`,background:T.cardAlt}}>
          <div style={{fontSize:8,color:T.textSoft,fontWeight:"bold",marginBottom:4}}>TRANSFER HISTORY</div>
          {events.map((e,i)=>(
            <div key={i} style={{fontSize:9,color:T.text,padding:"2px 0"}}>
              Hole {e.hole+1} → <strong>{PLAYERS[e.owner]?.short}</strong> · ${e.amount?.toFixed(2)}
            </div>
          ))}
        </div>
      )}

      {/* Player indicators */}
      <div style={{padding:"6px 10px",borderTop:`1px solid ${T.goldBdr}`,background:T.card,display:"flex",gap:8,flexWrap:"wrap"}}>
        {allKeys.map(k=>(
          <div key={k} style={{padding:"3px 8px",background:currentOwner===k?T.goldBg:T.cardAlt,border:`1px solid ${currentOwner===k?T.goldBdr:T.border}`,borderRadius:4,fontSize:9,color:currentOwner===k?T.gold:T.textSoft,fontWeight:currentOwner===k?"bold":"normal"}}>
            {currentOwner===k&&<span className="snake-icon">🐍</span>}{PLAYERS[k]?.short}
          </div>
        ))}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// R3 PAIRING SETUP
// ══════════════════════════════════════════════════════════════
function R3PairingSetup({r3Pairings,setR3Pairing}){
  const teamAOpts=TEAM_A_KEYS.map(k=>({key:k,...PLAYERS[k]}));
  const teamBOpts=TEAM_B_KEYS.map(k=>({key:k,...PLAYERS[k]}));
  const getPairing=mid=>{const dyn=r3Pairings?.[mid]||{};return{sideA:dyn.sideA||[],sideB:dyn.sideB||[]};};
  const setPlayer=(mid,side,slot,pk)=>{
    const cur=getPairing(mid);const arr=[...(cur[side]||[])];
    if(pk==="")arr.splice(slot,1);else arr[slot]=pk;
    setR3Pairing(mid,side,arr);
  };
  const renderSlot=(mid,side,slot,label,opts,color)=>{
    const cur=getPairing(mid),val=cur[side]?.[slot]||"";
    const used=(cur[side]||[]).filter((_,i)=>i!==slot);
    const avail=opts.filter(o=>!used.includes(o.key));
    return(<div style={{marginBottom:5}}>
      <div style={{fontSize:8,color,letterSpacing:1,marginBottom:2}}>{label}</div>
      <select value={val} onChange={e=>setPlayer(mid,side,slot,e.target.value)}
        style={{width:"100%",padding:"5px 6px",background:T.cardAlt,border:`1px solid ${val?color:T.border}`,borderRadius:5,color:val?color:T.textSoft,fontSize:11,outline:"none"}}>
        <option value="">— Select —</option>
        {avail.map(o=><option key={o.key} value={o.key}>{o.name} (hcp {o.hcp})</option>)}
        {val&&!avail.find(o=>o.key===val)&&<option value={val}>{PLAYERS[val].name} (hcp {PLAYERS[val].hcp})</option>}
      </select>
    </div>);
  };
  return(
    <div style={{border:`2px solid ${T.goldBdr}`,borderRadius:8,overflow:"hidden",marginBottom:10,background:T.goldBg}}>
      <div style={{padding:"7px 12px",background:T.hdr,borderBottom:`1px solid ${T.goldBdr}`}}>
        <div style={{fontSize:10,letterSpacing:2,color:"#c0a040",fontWeight:"bold"}}>🎯 ROUND 3 — SET PAIRINGS</div>
        <div style={{fontSize:9,color:"#8a8060",marginTop:1}}>Select players · pops & scoring auto-calculate</div>
      </div>
      {R3_MATCHES.map(match=>{
        const isPairs=match.type==="pairs",cur=getPairing(match.id);
        const allKeys=[...cur.sideA,...cur.sideB].filter(Boolean);
        let popsSummary=null;
        if(allKeys.length>=2){
          const a=match.type==="singles"?1.00:0.90;
          const pops=calcPops(allKeys,COURSES.wekopa.holes,a);
          popsSummary=allKeys.map(k=>{const d=Math.round((PLAYERS[k].hcp-Math.min(...allKeys.map(x=>PLAYERS[x].hcp)))*a);return`${PLAYERS[k].short}: ${d===0?"scratch":"+"+d}`;}).join("  ·  ");
        }
        return(
          <div key={match.id} style={{borderTop:`1px solid ${T.goldBdr}`,padding:"8px 10px"}}>
            <div style={{fontSize:9,color:T.gold,fontWeight:"bold",marginBottom:6}}>{match.label} · {match.pts}pt · {isPairs?"2v2 (90% pops)":"Singles (100% pops)"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div style={{background:T.aBg,border:`1px solid ${T.aBdr}`,borderRadius:6,padding:"7px"}}>
                <div style={{fontSize:8,color:T.aColor,fontWeight:"bold",marginBottom:4}}>{TEAM_A.emoji} {TEAM_A.name}</div>
                {renderSlot(match.id,"sideA",0,isPairs?"Player 1":"Player",teamAOpts,T.aColor)}
                {isPairs&&renderSlot(match.id,"sideA",1,"Player 2",teamAOpts,T.aColor)}
              </div>
              <div style={{background:T.bBg,border:`1px solid ${T.bBdr}`,borderRadius:6,padding:"7px"}}>
                <div style={{fontSize:8,color:T.bColor,fontWeight:"bold",marginBottom:4}}>{TEAM_B.emoji} {TEAM_B.name}</div>
                {renderSlot(match.id,"sideB",0,isPairs?"Player 1":"Player",teamBOpts,T.bColor)}
                {isPairs&&renderSlot(match.id,"sideB",1,"Player 2",teamBOpts,T.bColor)}
              </div>
            </div>
            {popsSummary&&<div style={{marginTop:5,padding:"3px 7px",background:"rgba(255,255,255,0.6)",borderRadius:4,fontSize:8,color:T.textSoft}}>🎯 Pops: {popsSummary}</div>}
          </div>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// ROUND TAB
// ══════════════════════════════════════════════════════════════
function RoundTab({roundConfig,matchResults,setMatchResult,holeScores,puttData,onScore,onPutts,activeMatch,setActiveMatch,r3Pairings,setR3Pairing,sideBets,updateSideBet,addSnakeEvent,updateSnakeEvents}){
  const course=COURSES[roundConfig.course];
  const isR3=roundConfig.key==="r3";
  const rPts=roundConfig.matches.reduce((s,m)=>{const w=matchResults[m.id];if(w==="A")return{...s,A:s.A+m.pts};if(w==="B")return{...s,B:s.B+m.pts};if(w==="halved")return{...s,A:s.A+m.pts/2,B:s.B+m.pts/2};return s;},{A:0,B:0});
  const played=roundConfig.matches.filter(m=>matchResults[m.id]).length;

  return(<>
    <div style={{padding:"9px 12px",background:T.card,border:`1px solid ${T.border}`,borderRadius:8,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
      <div>
        <div style={{fontSize:9,letterSpacing:2,color:T.textSoft,fontWeight:"bold"}}>{roundConfig.label.toUpperCase()} · {roundConfig.format.toUpperCase()}</div>
        <div style={{fontSize:14,color:T.text,fontWeight:"bold",marginTop:1}}>{course.name}</div>
        <div style={{fontSize:9,color:T.textSoft,marginTop:1}}>{course.subtitle} · Par {course.par}</div>
      </div>
      {played>0&&<div style={{textAlign:"right"}}><div style={{fontSize:8,color:T.textSoft}}>ROUND</div><div style={{fontSize:18,fontWeight:"bold"}}><span style={{color:T.aColor}}>{fmt(rPts.A)}</span><span style={{color:T.border,margin:"0 5px"}}>–</span><span style={{color:T.bColor}}>{fmt(rPts.B)}</span></div></div>}
    </div>

    {isR3&&<R3PairingSetup r3Pairings={r3Pairings} setR3Pairing={setR3Pairing}/>}

    {roundConfig.matches.map(m=>{
      const isBonus=m.id==="r23net",isOpen=activeMatch===m.id;
      const hs=holeScores?.[m.id]||{};
      const pd=puttData?.[m.id]||{};
      const mp=!isBonus?calcMatchPlay(m.id,hs,roundConfig.course,r3Pairings):null;
      const pairing=resolvePairing(m.id,r3Pairings);
      const hasPlayers=pairing&&pairing.sideA.length>0&&pairing.sideB.length>0;
      const r3m=R3_MATCHES.find(x=>x.id===m.id);
      const sb=sideBets?.[m.id]||{};

      // Auto-detect result from match play
      let autoStatus=null;
      if(mp&&mp.isClinched&&!matchResults[m.id]){
        autoStatus={label:`${mp.status} — Match Over`,color:mp.upDown>0?T.aColor:T.bColor};
      } else if(mp&&mp.isDormie){
        autoStatus={label:mp.status,color:T.gold};
      }

      // Nassau live display
      let nassauDisplay=null;
      if(sb.nassauOn&&hasPlayers){
        const n=calcNassau(m.id,hs,roundConfig.course,r3Pairings,sb.nassau);
        if(n){
          nassauDisplay=`Nassau: F[${n.front.status}] B[${n.back.status}] T[${n.total.status}]`;
          if(n.net!==0)nassauDisplay+=` | ${n.net>0?"🌵":"🌶️"} $${Math.abs(n.net).toFixed(2)}`;
        }
      }

      return(
        <div key={m.id} style={{border:`1px solid ${T.border}`,borderRadius:8,overflow:"hidden",marginBottom:10,background:T.card,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
          <div style={{background:T.cardAlt,padding:"7px 10px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:11,color:T.text,fontWeight:"bold"}}>{matchLabel(m.id,r3Pairings)}</div>
                <div style={{fontSize:8,color:T.textSoft,marginTop:1}}>{m.pts}pt · {r3m?r3m.label:roundConfig.format}</div>
                {nassauDisplay&&<div style={{fontSize:8,color:T.gold,marginTop:2,fontWeight:"bold"}}>{nassauDisplay}</div>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                {mp&&mp.holesPlayed>0&&(
                  <div style={{padding:"3px 8px",background:mp.isDormie?T.goldBg:mp.isClinched?(mp.upDown>0?T.aBg:T.bBg):mp.upDown===0?T.goldBg:mp.upDown>0?T.aBg:T.bBg,border:`2px solid ${mp.isDormie?T.goldBdr:mp.upDown===0?T.goldBdr:mp.upDown>0?T.aBdr:T.bBdr}`,borderRadius:6,fontSize:9,color:mp.isDormie?T.gold:mp.upDown===0?T.gold:mp.upDown>0?T.aColor:T.bColor,fontWeight:"bold"}}>
                    {mp.status}
                  </div>
                )}
                {!isBonus&&hasPlayers&&<button onClick={()=>setActiveMatch(isOpen?null:m.id)} style={{padding:"3px 8px",background:isOpen?T.cardAlt:T.card,border:`1px solid ${T.borderDk}`,borderRadius:5,color:T.textMid,fontSize:9,fontWeight:"bold"}}>
                  {isOpen?"▲ CLOSE":"▼ CARD"}
                </button>}
                {!isBonus&&!hasPlayers&&isR3&&<span style={{fontSize:8,color:T.gold,fontStyle:"italic"}}>Set pairings ↑</span>}
              </div>
            </div>
          </div>
          <MatchResultRow matchId={m.id} pts={m.pts} matchResults={matchResults} setMatchResult={setMatchResult} isBonus={isBonus} autoStatus={autoStatus}/>

          {!isBonus&&hasPlayers&&(
            <div style={{padding:"0 10px 8px",background:T.card}}>
              <SideBetPanel matchId={m.id} matchType={pairing.type} sideBets={sideBets} updateSideBet={updateSideBet}/>
              {sb.snakeOn&&pairing.type==="pairs"&&(
                <SnakeTracker matchId={m.id} allKeys={[...pairing.sideA,...pairing.sideB]} sideBets={sideBets} puttData={pd} addSnakeEvent={addSnakeEvent} updateSnakeEvents={updateSnakeEvents}/>
              )}
            </div>
          )}

          {isOpen&&!isBonus&&hasPlayers&&(
            <MatchScorecard matchId={m.id} courseKey={roundConfig.course} holeScores={hs} puttData={pd}
              onScore={(pk,hi,v)=>onScore(m.id,pk,hi,v)} onPutts={(pk,hi,v)=>onPutts(m.id,pk,hi,v)}
              mp={mp} r3Pairings={r3Pairings} showPutts={sb.snakeOn}/>
          )}
        </div>
      );
    })}
  </>);
}

// ══════════════════════════════════════════════════════════════
// MATCH SCORECARD
// ══════════════════════════════════════════════════════════════
function MatchScorecard({matchId,courseKey,holeScores,puttData,onScore,onPutts,mp,r3Pairings,showPutts}){
  const course=COURSES[courseKey];
  const pairing=resolvePairing(matchId,r3Pairings);
  if(!pairing||!pairing.sideA.length||!pairing.sideB.length)return null;
  const allKeys=[...pairing.sideA,...pairing.sideB];
  const allowance=pairing.type==="singles"?1.00:0.90;
  const pops=calcPops(allKeys,course.holes,allowance);

  const getG=(k,h)=>holeScores?.[k]?.[h]??"";
  const setG=(k,h,v)=>onScore(k,h,v===""?undefined:Number(v));
  const getP=(k,h)=>puttData?.[k]?.[h]??"";
  const setP=(k,h,v)=>onPutts(k,h,v===""?undefined:Number(v));
  const netOf=(k,h)=>{const g=getG(k,h);if(g===""||isNaN(g))return null;return Number(g)-(pops[k]?.[h]??0);};

  const renderNine=(holeIdxs,label)=>(
    <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:showPutts?620:560}}>
        <thead>
          <tr style={{background:T.hdr}}>
            <td style={{padding:"4px 5px",color:"#a09050",fontSize:8,letterSpacing:2,minWidth:66}}>HOLE</td>
            {holeIdxs.map(h=><td key={h} style={{padding:"4px 1px",textAlign:"center",color:T.hdrText,fontWeight:"bold",width:showPutts?22:26}}>{course.holes[h].h}</td>)}
            <td style={{padding:"4px 5px",textAlign:"center",color:"#a09050",fontSize:8,minWidth:34}}>{label}</td>
          </tr>
          <tr style={{background:T.cardAlt}}>
            <td style={{padding:"3px 5px",color:T.textSoft,fontSize:8,fontWeight:"bold"}}>Par</td>
            {holeIdxs.map(h=><td key={h} style={{padding:"3px 1px",textAlign:"center",color:T.textMid,fontSize:9,fontWeight:"bold"}}>{course.holes[h].par}</td>)}
            <td style={{padding:"3px 5px",textAlign:"center",color:T.textMid,fontSize:9,fontWeight:"bold"}}>{holeIdxs.reduce((s,h)=>s+course.holes[h].par,0)}</td>
          </tr>
          <tr style={{background:"#f4f8f4"}}>
            <td style={{padding:"2px 5px",color:T.textSoft,fontSize:7}}>Hcp</td>
            {holeIdxs.map(h=><td key={h} style={{padding:"2px 1px",textAlign:"center",color:T.textSoft,fontSize:7}}>{course.holes[h].hcp}</td>)}
            <td/>
          </tr>
          <tr style={{background:T.goldBg}}>
            <td style={{padding:"3px 5px",color:T.gold,fontSize:7,fontWeight:"bold"}}>MATCH</td>
            {holeIdxs.map(h=>{
              const st=mp?.holeResults?.[h];
              if(st==null)return<td key={h} style={{padding:"2px",textAlign:"center",color:T.textSoft,fontSize:7}}>—</td>;
              const col=st===0?T.gold:st>0?T.aColor:T.bColor;
              return<td key={h} style={{padding:"2px 0",textAlign:"center",color:col,fontSize:8,fontWeight:"bold"}}>{st===0?"AS":st>0?`🌵${Math.abs(st)}`:`🌶${Math.abs(st)}`}</td>;
            })}
            <td style={{padding:"3px 5px",textAlign:"center",fontSize:8,fontWeight:"bold",color:mp?.upDown===0?T.gold:mp?.upDown>0?T.aColor:T.bColor}}>
              {mp&&mp.holesPlayed>0?(mp.upDown===0?"AS":mp.upDown>0?`🌵${Math.abs(mp.upDown)}`:`🌶${Math.abs(mp.upDown)}`):"—"}
            </td>
          </tr>
        </thead>
        <tbody>
          {[{keys:pairing.sideA,team:TEAM_A},{keys:pairing.sideB,team:TEAM_B}].map(({keys,team})=>[
            <tr key={team.short+"hdr"}>
              <td colSpan={holeIdxs.length+2} style={{padding:"3px 7px",fontSize:8,letterSpacing:2,color:team.color,background:team.bg,fontWeight:"bold",borderTop:`1px solid ${T.border}`}}>{team.emoji} {team.name}</td>
            </tr>,
            ...keys.map((k,pi)=>{
              const totalPops=Math.round((PLAYERS[k].hcp-Math.min(...allKeys.map(x=>PLAYERS[x].hcp)))*allowance);
              const gOut=holeIdxs.reduce((s,h)=>{const g=getG(k,h);return g!==""&&!isNaN(g)?s+Number(g):s;},0);
              const nOut=holeIdxs.reduce((s,h)=>{const n=netOf(k,h);return n!==null?s+n:s;},0);
              const hasAny=holeIdxs.some(h=>getG(k,h)!=="");
              return(
                <tr key={k} style={{background:pi%2===0?T.card:T.cardAlt,borderTop:`1px solid ${T.border}`}}>
                  <td style={{padding:"3px 5px"}}>
                    <div style={{fontSize:9,color:T.text,fontWeight:"bold"}}>{PLAYERS[k].short}</div>
                    <div style={{fontSize:7,color:team.color}}>+{totalPops}</div>
                  </td>
                  {holeIdxs.map(h=>{
                    const g=getG(k,h),net=netOf(k,h),par=course.holes[h].par,pop=pops[k]?.[h]??0;
                    const col=net!==null?netScoreColor(net,par):T.textSoft;
                    const putts=getP(k,h);
                    const is3putt=Number(putts)>=3;
                    return(
                      <td key={h} style={{padding:"1px",textAlign:"center",verticalAlign:"top"}}>
                        <input type="number" min="1" max="12" value={g} onChange={e=>setG(k,h,e.target.value)}
                          style={{width:showPutts?22:26,height:24,textAlign:"center",background:net!==null?(net<=par-2?"#ddeeff":net===par-1?"#ddf5dd":net===par?"#f8f8f8":net===par+1?"#fff0ee":"#fde8e8"):T.cardAlt,border:`1px solid ${col}`,borderRadius:3,color:col,fontSize:11,fontWeight:"bold",outline:"none",padding:0}}/>
                        {pop>0&&net!==null&&<div style={{fontSize:5,color:col,textAlign:"center",fontWeight:"bold"}}>{net}</div>}
                        {showPutts&&(
                          <input type="number" min="1" max="6" value={putts} onChange={e=>setP(k,h,e.target.value)}
                            style={{width:showPutts?22:26,height:18,textAlign:"center",background:is3putt?"#fff3c8":T.cardAlt,border:`1px solid ${is3putt?T.goldBdr:T.border}`,borderRadius:3,color:is3putt?T.gold:T.textSoft,fontSize:9,outline:"none",padding:0,marginTop:1}}
                            placeholder="p"/>
                        )}
                        {showPutts&&is3putt&&<div style={{fontSize:7,textAlign:"center"}}>🐍</div>}
                      </td>
                    );
                  })}
                  <td style={{padding:"3px 5px",textAlign:"center"}}>
                    {hasAny&&<div><div style={{fontSize:10,color:T.text,fontWeight:"bold"}}>{gOut}</div><div style={{fontSize:8,color:team.color,fontWeight:"bold"}}>({nOut})</div></div>}
                  </td>
                </tr>
              );
            })
          ])}
        </tbody>
      </table>
    </div>
  );

  const popsSummary=allKeys.map(k=>{const d=Math.round((PLAYERS[k].hcp-Math.min(...allKeys.map(x=>PLAYERS[x].hcp)))*allowance);return`${PLAYERS[k].short}: ${d===0?"scratch":"+"+d}`;}).join("  ·  ");

  return(
    <div style={{borderTop:`1px solid ${T.border}`}}>
      <div style={{padding:"5px 10px",background:T.cardAlt,borderBottom:`1px solid ${T.border}`}}>
        <div style={{fontSize:8,color:T.textMid,fontWeight:"bold"}}>🎯 Pops ({allowance===1?"100%":"90%"} · {pairing.type==="singles"?"singles":"2v2"}): {popsSummary}</div>
        {showPutts&&<div style={{fontSize:7,color:T.textSoft,marginTop:1}}>Second row = putts · 🐍 on 3-putt · gold cell = 3-putt</div>}
      </div>
      <div style={{padding:"6px 0 4px"}}>
        <div style={{fontSize:7,letterSpacing:2,color:T.textSoft,padding:"0 7px 3px",fontWeight:"bold"}}>FRONT NINE</div>
        {renderNine(FRONT,"OUT")}
        <div style={{fontSize:7,letterSpacing:2,color:T.textSoft,padding:"6px 7px 3px",fontWeight:"bold"}}>BACK NINE</div>
        {renderNine(BACK,"IN")}
      </div>
      <div style={{padding:"4px 8px 7px",fontSize:7,color:T.textSoft,background:T.cardAlt}}>
        🔵 Eagle &nbsp;🟢 Birdie &nbsp;⚪ Par &nbsp;🟠 Bogey &nbsp;🔴 Double+ &nbsp;(NET score)
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// BETS SUMMARY TAB
// ══════════════════════════════════════════════════════════════
function BetsSummaryTab({rounds,holeScores,puttData,sideBets,r3Pairings}){
  const allBetMatches=rounds.filter(r=>r.course).flatMap(r=>
    r.matches.filter(m=>{const sb=sideBets?.[m.id];return sb&&(sb.nassauOn||sb.vegasOn||sb.snakeOn);}).map(m=>({...m,round:r}))
  );
  if(!allBetMatches.length)return(
    <div style={{padding:30,textAlign:"center",color:T.textSoft}}>
      <div style={{fontSize:24,marginBottom:8}}>🎰</div>
      <div style={{fontSize:12}}>No side bets set yet.</div>
      <div style={{fontSize:10,marginTop:4}}>Open a round tab, expand a match, and tap Side Bets to add Nassau, Vegas, or Snake.</div>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {allBetMatches.map(m=>{
        const sb=sideBets?.[m.id]||{};
        const hs=holeScores?.[m.round.key]?.[m.id]||{};
        const pd=puttData?.[m.round.key]?.[m.id]||{};
        const pairing=resolvePairing(m.id,r3Pairings);
        const courseKey=m.round.course;
        return(
          <div key={m.id} style={{border:`1px solid ${T.purple}`,borderRadius:8,overflow:"hidden",background:T.card,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
            <div style={{padding:"7px 12px",background:T.purpleBg,borderBottom:`1px solid ${T.purpleBdr}`}}>
              <div style={{fontSize:9,color:T.purple,fontWeight:"bold",letterSpacing:1}}>{m.round.label.toUpperCase()} · {matchLabel(m.id,r3Pairings)}</div>
            </div>

            {sb.nassauOn&&(()=>{
              const n=calcNassau(m.id,hs,courseKey,r3Pairings,sb.nassau);
              if(!n)return null;
              return(
                <div style={{padding:"8px 12px",borderBottom:`1px solid ${T.border}`}}>
                  <div style={{fontSize:9,fontWeight:"bold",color:T.textMid,marginBottom:5}}>Nassau</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,textAlign:"center"}}>
                    {[{label:"FRONT",seg:n.front,amt:sb.nassau?.front},{label:"BACK",seg:n.back,amt:sb.nassau?.back},{label:"TOTAL",seg:n.total,amt:sb.nassau?.total}].map(({label,seg,amt})=>(
                      <div key={label} style={{padding:"5px",background:seg.done?(seg.winner==="A"?T.aBg:seg.winner==="B"?T.bBg:T.goldBg):T.cardAlt,border:`1px solid ${seg.done?(seg.winner==="A"?T.aBdr:seg.winner==="B"?T.bBdr:T.goldBdr):T.border}`,borderRadius:5}}>
                        <div style={{fontSize:7,color:T.textSoft,fontWeight:"bold"}}>{label}</div>
                        <div style={{fontSize:10,fontWeight:"bold",color:seg.winner==="A"?T.aColor:seg.winner==="B"?T.bColor:T.gold,marginTop:2}}>{seg.status}</div>
                        <div style={{fontSize:9,color:T.textSoft}}>${Number(amt||0).toFixed(2)}</div>
                      </div>
                    ))}
                  </div>
                  {n.net!==0&&<div style={{marginTop:6,padding:"4px 8px",background:n.net>0?T.aBg:T.bBg,borderRadius:5,fontSize:10,color:n.net>0?T.aColor:T.bColor,fontWeight:"bold",textAlign:"center"}}>
                    {n.net>0?TEAM_A.name:TEAM_B.name} +${Math.abs(n.net).toFixed(2)}
                  </div>}
                </div>
              );
            })()}

            {sb.vegasOn&&(()=>{
              const v=calcVegas(m.id,hs,courseKey,r3Pairings,sb.vegas?.per);
              if(!v)return null;
              return(
                <div style={{padding:"8px 12px",borderBottom:`1px solid ${T.border}`}}>
                  <div style={{fontSize:9,fontWeight:"bold",color:T.textMid,marginBottom:4}}>Vegas · ${Number(sb.vegas?.per||0).toFixed(2)}/pt</div>
                  <div style={{fontSize:10,color:T.textMid}}>Point diff: {v.totalDiff>0?"+":""}{v.totalDiff}</div>
                  <div style={{fontSize:12,fontWeight:"bold",color:v.net>0?T.aColor:v.net<0?T.bColor:T.textSoft,marginTop:3}}>
                    {v.net===0?"Even":v.net>0?`${TEAM_A.name} +$${v.net.toFixed(2)}`:`${TEAM_B.name} +$${Math.abs(v.net).toFixed(2)}`}
                  </div>
                </div>
              );
            })()}

            {sb.snakeOn&&(()=>{
              const snake=sb.snake||{};
              const events=snake.events||[];
              if(!events.length)return(
                <div style={{padding:"8px 12px",borderBottom:`1px solid ${T.border}`}}>
                  <div style={{fontSize:9,fontWeight:"bold",color:T.textMid,marginBottom:3}}>🐍 Snake · Initial: ${Number(snake.bet||0).toFixed(2)}</div>
                  <div style={{fontSize:9,color:T.textSoft}}>No 3-putts yet</div>
                </div>
              );
              const lastEvent=events[events.length-1];
              const allKeys=pairing?[...pairing.sideA,...pairing.sideB]:[];
              const others=allKeys.filter(k=>k!==lastEvent.owner);
              return(
                <div style={{padding:"8px 12px"}}>
                  <div style={{fontSize:9,fontWeight:"bold",color:T.textMid,marginBottom:5}}>🐍 Snake History</div>
                  {events.map((e,i)=>(
                    <div key={i} style={{fontSize:9,color:T.text,padding:"2px 0"}}>Hole {e.hole+1} → <strong>{PLAYERS[e.owner]?.short}</strong> · ${e.amount?.toFixed(2)}</div>
                  ))}
                  <div style={{marginTop:6,padding:"5px 8px",background:T.goldBg,border:`1px solid ${T.goldBdr}`,borderRadius:5}}>
                    <div style={{fontSize:9,fontWeight:"bold",color:T.gold}}>End of round: {PLAYERS[lastEvent.owner]?.name} pays ${lastEvent.amount?.toFixed(2)} to each of:</div>
                    {others.map(k=><div key={k} style={{fontSize:9,color:T.textMid}}>· {PLAYERS[k]?.name}</div>)}
                    <div style={{fontSize:10,fontWeight:"bold",color:T.gold,marginTop:3}}>Total owed: ${(lastEvent.amount*others.length).toFixed(2)}</div>
                  </div>
                </div>
              );
            })()}
          </div>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// SKINS TAB
// ══════════════════════════════════════════════════════════════
function SkinsTab({holeScores}){
  const roundSkins=ROUNDS_CONFIG.filter(r=>r.course).map(r=>{
    const skins=calcSkins(holeScores?.[r.key]||{},r.course);
    const val=skins.length>0?(SKINS_POT/skins.length).toFixed(2):null;
    return{round:r,course:COURSES[r.course],skins,val};
  });
  const playerTotals={};
  roundSkins.forEach(({skins,val})=>skins.forEach(s=>{if(!playerTotals[s.player])playerTotals[s.player]={skins:0,winnings:0};playerTotals[s.player].skins++;playerTotals[s.player].winnings+=val?parseFloat(val):0;}));
  const sorted=Object.entries(playerTotals).sort((a,b)=>b[1].winnings-a[1].winnings);
  return(<div style={{display:"flex",flexDirection:"column",gap:10}}>
    <div style={{border:`2px solid ${T.goldBdr}`,borderRadius:8,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
      <div style={{padding:"8px 12px",background:T.hdr,textAlign:"center"}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#c0a040",fontWeight:"bold"}}>💰 SKINS LEADERBOARD</div>
        <div style={{fontSize:9,color:"#8a8060",marginTop:1}}>${SKINS_POT}/round · net birdie or better · outright only</div>
      </div>
      {sorted.length===0?<div style={{padding:"16px",textAlign:"center",color:T.textSoft,fontSize:10,background:T.goldBg}}>No skins yet</div>
        :<div style={{background:T.goldBg}}>
          {sorted.map(([k,d],i)=>{const team=PLAYERS[k].team==="A"?TEAM_A:TEAM_B;return(
            <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderTop:i>0?`1px solid ${T.goldBdr}`:"none"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:12,color:T.gold,minWidth:22,fontWeight:"bold"}}>#{i+1}</span>
                <span style={{fontSize:14}}>{team.emoji}</span>
                <div><div style={{fontSize:12,color:T.text,fontWeight:"bold"}}>{PLAYERS[k].name}</div><div style={{fontSize:8,color:team.color,fontWeight:"bold"}}>{team.short}</div></div>
              </div>
              <div style={{textAlign:"right"}}><div style={{fontSize:18,color:T.gold,fontWeight:"bold"}}>${d.winnings.toFixed(0)}</div><div style={{fontSize:8,color:T.textSoft}}>{d.skins} skin{d.skins!==1?"s":""}</div></div>
            </div>
          );})}
        </div>}
    </div>
    {roundSkins.map(({round,course,skins,val})=>(
      <div key={round.key} style={{border:`1px solid ${T.goldBdr}`,borderRadius:8,overflow:"hidden",background:T.card}}>
        <div style={{padding:"6px 12px",background:T.hdr,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:8,color:"#c0a040",fontWeight:"bold"}}>{round.label.toUpperCase()}</div><div style={{fontSize:9,color:"#8a8060",marginTop:1}}>{course.name}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:9,color:"#c0a040",fontWeight:"bold"}}>${SKINS_POT} pot</div>{skins.length>0&&<div style={{fontSize:8,color:"#8a8060"}}>{skins.length} skins · ${parseFloat(val).toFixed(0)} ea</div>}</div>
        </div>
        {skins.length===0?<div style={{padding:"10px",textAlign:"center",color:T.textSoft,fontSize:9}}>No skins</div>
          :<div>
            <div style={{display:"grid",gridTemplateColumns:"40px 1fr 44px 44px 52px",padding:"4px 10px",fontSize:7,color:T.textSoft,fontWeight:"bold",background:T.cardAlt,borderBottom:`1px solid ${T.border}`}}>
              <span>HOLE</span><span>PLAYER</span><span style={{textAlign:"center"}}>PAR</span><span style={{textAlign:"center"}}>NET</span><span style={{textAlign:"right"}}>WIN</span>
            </div>
            {skins.map((s,si)=>{const team=PLAYERS[s.player].team==="A"?TEAM_A:TEAM_B;return(
              <div key={si} style={{display:"grid",gridTemplateColumns:"40px 1fr 44px 44px 52px",alignItems:"center",padding:"7px 10px",borderTop:si>0?`1px solid ${T.border}`:"none",background:si%2===0?T.card:T.cardAlt}}>
                <span style={{fontSize:12,color:T.gold,fontWeight:"bold"}}>#{s.hole}</span>
                <div><div style={{fontSize:11,color:team.color,fontWeight:"bold"}}>{team.emoji} {PLAYERS[s.player].short}</div></div>
                <span style={{textAlign:"center",fontSize:10,color:T.textMid,fontWeight:"bold"}}>{s.par}</span>
                <span style={{textAlign:"center",fontSize:11,color:s.net-s.par<=-2?T.eagle:T.birdie,fontWeight:"bold"}}>{s.net} {s.net-s.par<=-2?"🦅":"🐦"}</span>
                <span style={{textAlign:"right",fontSize:12,color:T.gold,fontWeight:"bold"}}>${parseFloat(val).toFixed(0)}</span>
              </div>
            );})}
            <div style={{padding:"4px 10px",textAlign:"right",fontSize:8,color:T.textSoft,background:T.cardAlt,borderTop:`1px solid ${T.border}`}}>${SKINS_POT} ÷ {skins.length} = ${parseFloat(val).toFixed(2)}/skin</div>
          </div>}
      </div>
    ))}
  </div>);
}

// ══════════════════════════════════════════════════════════════
// ROSTERS TAB
// ══════════════════════════════════════════════════════════════
function RostersTab({r3Pairings}){
  const aKeys=TEAM_A_KEYS,bKeys=TEAM_B_KEYS;
  const allSorted=Object.entries(PLAYERS).sort((a,b)=>a[1].hcp-b[1].hcp);
  return(<div style={{display:"flex",flexDirection:"column",gap:10}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      {[{team:TEAM_A,keys:aKeys},{team:TEAM_B,keys:bKeys}].map(({team,keys})=>(
        <div key={team.name} style={{border:`2px solid ${team.color}`,borderRadius:8,overflow:"hidden"}}>
          <div style={{padding:"9px 8px",background:team.bg,borderBottom:`2px solid ${team.color}`,textAlign:"center"}}>
            <div style={{fontSize:22,marginBottom:2}}>{team.emoji}</div>
            <div style={{fontSize:"clamp(9px,2vw,12px)",letterSpacing:1,color:team.color,fontWeight:"bold"}}>{team.name}</div>
            <div style={{fontSize:8,color:T.textSoft,marginTop:1}}>AVG HCP: {(keys.reduce((s,k)=>s+PLAYERS[k].hcp,0)/keys.length).toFixed(1)}</div>
          </div>
          <div style={{padding:"6px",display:"flex",flexDirection:"column",gap:3,background:T.card}}>
            {keys.map(k=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"5px 7px",background:T.cardAlt,borderRadius:5,borderLeft:`3px solid ${team.color}`}}>
                <span style={{fontSize:11,color:T.text,fontWeight:"bold"}}>{PLAYERS[k].name}</span>
                <span style={{fontSize:11,color:team.color,fontWeight:"bold"}}>{PLAYERS[k].hcp}</span>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
    <div style={{border:`1px solid ${T.goldBdr}`,borderRadius:8,overflow:"hidden",background:T.card}}>
      <div style={{padding:"7px 12px",background:T.hdr,textAlign:"center"}}><div style={{fontSize:8,letterSpacing:2,color:"#c0a040",fontWeight:"bold"}}>ROUND 3 PAIRINGS (DYNAMIC)</div></div>
      <div style={{padding:"8px 12px",background:T.goldBg}}>
        {R3_MATCHES.map(m=>{
          const p=resolvePairing(m.id,r3Pairings);
          const aStr=p?.sideA?.length?p.sideA.map(k=>`${PLAYERS[k].short}(${PLAYERS[k].hcp})`).join(" & "):"TBD";
          const bStr=p?.sideB?.length?p.sideB.map(k=>`${PLAYERS[k].short}(${PLAYERS[k].hcp})`).join(" & "):"TBD";
          return(<div key={m.id} style={{marginBottom:7,paddingBottom:7,borderBottom:`1px solid ${T.goldBdr}`}}>
            <div style={{fontSize:8,color:T.gold,fontWeight:"bold",marginBottom:3}}>{m.label} · {m.pts}pt</div>
            <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
              <span style={{fontSize:10,color:T.aColor,fontWeight:"bold"}}>{TEAM_A.emoji} {aStr}</span>
              <span style={{fontSize:9,color:T.textSoft}}>vs</span>
              <span style={{fontSize:10,color:T.bColor,fontWeight:"bold"}}>{TEAM_B.emoji} {bStr}</span>
            </div>
          </div>);
        })}
      </div>
    </div>
    <div style={{border:`1px solid ${T.border}`,borderRadius:8,overflow:"hidden",background:T.card}}>
      <div style={{padding:"7px 12px",background:T.cardAlt,textAlign:"center"}}><div style={{fontSize:8,letterSpacing:2,color:T.textSoft,fontWeight:"bold"}}>ALL MATCH PAIRINGS</div></div>
      {[
        {round:"R1 · Wildfire — 2v2",mids:["r1m1","r1m2"]},
        {round:"R2 · We-Ko-Pa — 2v2",mids:["r2m1","r2m2"]},
        {round:"R4 · Grayhawk — Singles",mids:["r4m1","r4m2","r4m3","r4m4"]},
        {round:"R5 · Grayhawk — Singles",mids:["r5m1","r5m2","r5m3","r5m4"]},
      ].map((row,ri)=>(
        <div key={ri} style={{padding:"7px 12px",borderTop:ri>0?`1px solid ${T.border}`:"none"}}>
          <div style={{fontSize:8,color:T.textSoft,marginBottom:4,fontWeight:"bold"}}>{row.round}</div>
          {row.mids.map(mid=>{const p=STATIC_PAIRINGS[mid];if(!p||p.type==="bonus")return null;return(
            <div key={mid} style={{display:"flex",alignItems:"center",gap:5,marginBottom:3,flexWrap:"wrap"}}>
              <span style={{fontSize:10,color:T.aColor,fontWeight:"bold"}}>{TEAM_A.emoji} {p.sideA.map(k=>`${PLAYERS[k].short}(${PLAYERS[k].hcp})`).join(" & ")}</span>
              <span style={{fontSize:9,color:T.textSoft}}>vs</span>
              <span style={{fontSize:10,color:T.bColor,fontWeight:"bold"}}>{TEAM_B.emoji} {p.sideB.map(k=>`${PLAYERS[k].short}(${PLAYERS[k].hcp})`).join(" & ")}</span>
            </div>
          );})}
        </div>
      ))}
    </div>
    <div style={{border:`1px solid ${T.border}`,borderRadius:8,overflow:"hidden",background:T.card}}>
      <div style={{padding:"7px 12px",background:T.cardAlt,textAlign:"center"}}><div style={{fontSize:8,letterSpacing:2,color:T.textSoft,fontWeight:"bold"}}>ALL PLAYERS · BY HANDICAP</div></div>
      {allSorted.map(([k,p],i)=>{const team=p.team==="A"?TEAM_A:TEAM_B;return(
        <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 12px",borderTop:i>0?`1px solid ${T.border}`:"none",background:i%2===0?T.card:T.cardAlt}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:9,color:T.textSoft,minWidth:20,fontWeight:"bold"}}>#{i+1}</span>
            <span style={{fontSize:13}}>{team.emoji}</span>
            <span style={{fontSize:12,color:T.text,fontWeight:"bold"}}>{p.name}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:9,color:team.color,fontWeight:"bold"}}>{team.short}</span>
            <span style={{fontSize:12,color:T.textMid,fontWeight:"bold",minWidth:28,textAlign:"right"}}>{p.hcp}</span>
          </div>
        </div>
      );})}
    </div>
    <div style={{border:`1px solid ${T.border}`,borderRadius:8,overflow:"hidden",background:T.card}}>
      <div style={{padding:"7px 12px",background:T.cardAlt,textAlign:"center"}}><div style={{fontSize:8,letterSpacing:2,color:T.textSoft,fontWeight:"bold"}}>COURSE SCHEDULE</div></div>
      {[{r:"Round 1",c:"Wildfire Golf Club — Faldo Course",l:"Phoenix, AZ",p:71},{r:"Rounds 2 & 3",c:"We-Ko-Pa Golf Club — Saguaro",l:"Fort McDowell, AZ",p:71},{r:"Rounds 4 & 5",c:"Grayhawk Golf Club — Raptor",l:"Scottsdale, AZ",p:72}].map((row,i)=>(
        <div key={i} style={{padding:"8px 12px",borderTop:i>0?`1px solid ${T.border}`:"none",background:i%2===0?T.card:T.cardAlt}}>
          <div style={{fontSize:8,color:T.textSoft,marginBottom:1,fontWeight:"bold"}}>{row.r}</div>
          <div style={{fontSize:12,color:T.text,fontWeight:"bold"}}>{row.c}</div>
          <div style={{fontSize:9,color:T.textSoft,marginTop:1}}>{row.l} · Par {row.p}</div>
        </div>
      ))}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
