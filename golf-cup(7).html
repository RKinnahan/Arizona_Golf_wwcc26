// Course slope & rating for course handicap calculation
const COURSE_RATINGS={
  wildfire:{slope:135,rating:73.8},
  wekopa:  {slope:140,rating:74.1},
  grayhawk:{slope:138,rating:74.5},
};
// Compute official USGA course handicap
// CH = Index × (Slope/113) + (Rating - Par)
function courseHandicap(playerKey,courseKey){
  const idx=PLAYERS[playerKey].hcp;
  const{slope,rating}=COURSE_RATINGS[courseKey];
  const par=COURSES[courseKey].par;
  return Math.round(idx*(slope/113)+(rating-par));
}

// Get effective holes array, merging editable hcp overrides
// courseHcps is {courseKey: [hcp1..hcp18]}  (from app state, passed where needed)
function getEffHoles(courseKey,courseHcps){
  const base=COURSES[courseKey].holes;
  const overrides=courseHcps?.[courseKey];
  if(!overrides) return base;
  return base.map((h,i)=>({...h,hcp:overrides[i]??h.hcp}));
}

const TOTAL_POINTS=22, SKINS_POT=160, RYDER_BET=100;
const fmt=n=>n%1===0?String(n):n.toFixed(1);
const $=n=>`$${Math.abs(n).toFixed(2)}`;
const scoreColor=(net,par)=>net==null?C.textSoft:net<=par-2?C.blue:net===par-1?C.green:net===par?C.textMid:net===par+1?"#c04020":"#901010";
const scoreBg=(net,par)=>net==null?C.cardAlt:net<=par-2?"#ddeeff":net===par-1?"#ddf5dd":net===par?C.card:net===par+1?"#fff0ee":"#fde8e8";

// ─── POPS ────────────────────────────────────────────────────
function calcPops(keys,holes,pct){
  const minH=Math.min(...keys.map(k=>PLAYERS[k].hcp));
  const res={};
  keys.forEach(k=>{
    const d=Math.round((PLAYERS[k].hcp-minH)*pct);
    res[k]=holes.map(h=>d<=0?0:d<=18?(h.hcp<=d?1:0):(h.hcp<=d-18?2:1));
  });
  return res;
}

}

  return`${p.sideA.map(k=>PLAYERS[k]?.short||k).join(" & ")} vs ${p.sideB.map(k=>PLAYERS[k]?.short||k).join(" & ")}`;
}

// ─── MATCH PLAY ──────────────────────────────────────────────
function calcMP(mid,hs,courseKey,r3P){
  const p=getP(mid,r3P);
  if(!p||p.type==="bonus"||!p.sideA.length||!p.sideB.length)return null;
  const course=COURSES[courseKey];
  const allK=[...p.sideA,...p.sideB];
  const pct=p.type==="singles"?1.00:0.90;
  const pops=calcPops(allK,course.holes,pct);
  let ud=0,played=0;const hr=[];
  for(let h=0;h<18;h++){
    const aS=p.sideA.map(k=>{const g=hs?.[k]?.[h];return(g==null||g==="")? null:Number(g)-(pops[k]?.[h]??0);}).filter(v=>v!==null);
    const bS=p.sideB.map(k=>{const g=hs?.[k]?.[h];return(g==null||g==="")? null:Number(g)-(pops[k]?.[h]??0);}).filter(v=>v!==null);
    if(!aS.length||!bS.length){hr.push(null);continue;}
    const aB=Math.min(...aS),bB=Math.min(...bS);
    played++;if(aB<bB)ud++;else if(bB<aB)ud--;hr.push(ud);
  }
  const rem=18-played,abs=Math.abs(ud);
  let status="AS",winner=null,isDormie=false,isClinched=false;
  if(abs>rem&&played>0){
    isClinched=true;winner=ud>0?"A":"B";
    status=ud>0?`🌵 ${abs}&${rem}`:`🌶️ ${abs}&${rem}`;
  }else if(played===18){
    if(ud>0){winner="A";status="🌵 1UP";}else if(ud<0){winner="B";status="🌶️ 1UP";}else{winner="halved";status="HALVED";}
  }else if(abs>0&&abs===rem&&played>0){isDormie=true;status=ud>0?`🌵 DORMIE ${abs}`:`🌶️ DORMIE ${abs}`;}
  else if(ud!==0&&played>0){status=ud>0?`🌵 ${abs}UP`:`🌶️ ${abs}UP`;}
  return{ud,played,rem,status,winner,hr,isDormie,isClinched,pops,p,pct};
}

// ─── NASSAU ──────────────────────────────────────────────────
function calcNassau(mid,hs,courseKey,r3P,bet){
  const p=getP(mid,r3P);
  if(!p||!p.sideA.length||!p.sideB.length)return null;
  const course=COURSES[courseKey];
  const allK=[...p.sideA,...p.sideB];
  const pct=p.type==="singles"?1.00:0.90;
  const pops=calcPops(allK,course.holes,pct);
  const net=(k,h)=>{const g=hs?.[k]?.[h];if(g==null||g==="")return null;return Number(g)-(pops[k]?.[h]??0);};
  const best=(side,h)=>{const v=side.map(k=>net(k,h)).filter(v=>v!==null);return v.length?Math.min(...v):null;};
  const hw=(h)=>{const a=best(p.sideA,h),b=best(p.sideB,h);if(a===null||b===null)return null;if(a<b)return"A";if(b<a)return"B";return"H";};
  let fU=0,fP=0,bU=0,bP=0;
  for(let h=0;h<9;h++){const w=hw(h);if(w===null)continue;fP++;if(w==="A")fU++;else if(w==="B")fU--;}
  for(let h=9;h<18;h++){const w=hw(h);if(w===null)continue;bP++;if(w==="A")bU++;else if(w==="B")bU--;}
  const seg=(u,pl,n)=>{
    const r=n-pl,ab=Math.abs(u);
    if(ab>r&&pl>0)return{w:u>0?"A":"B",s:u>0?`🌵 ${ab}&${r}`:`🌶️ ${ab}&${r}`,done:true};
    if(pl===n)return{w:u>0?"A":u<0?"B":"H",s:u>0?"🌵 1UP":u<0?"🌶️ 1UP":"HALVED",done:true};
    if(ab===r&&pl>0&&r>0)return{w:null,s:u>0?`🌵 DORMIE ${ab}`:`🌶️ DORMIE ${ab}`,done:false};
    if(u===0)return{w:null,s:"AS",done:false};
    return{w:null,s:u>0?`🌵 ${ab}UP`:`🌶️ ${ab}UP`,done:false};
  };
  const F=seg(fU,fP,9),B=seg(bU,bP,9),T=seg(fU+bU,fP+bP,18);
  const pay=(s,a)=>{if(!a||!s.done||s.w==="H")return 0;return s.w==="A"?Number(a):-Number(a);};
  return{F,B,T,net:pay(F,bet?.front)+pay(B,bet?.back)+pay(T,bet?.total)};
}

// ─── VEGAS ───────────────────────────────────────────────────
function calcVegas(mid,hs,courseKey,r3P,per){
  if(!per)return null;
  const p=getP(mid,r3P);
  if(!p||p.sideA.length!==2||p.sideB.length!==2)return null;
  const course=COURSES[courseKey];
  const allK=[...p.sideA,...p.sideB];
  const pops=calcPops(allK,course.holes,0.90);
  const netOf=(k,h)=>{const g=hs?.[k]?.[h];if(g==null||g==="")return null;return Number(g)-(pops[k]?.[h]??0);};
  const vegN=(side,h)=>{const sc=side.map(k=>netOf(k,h)).filter(v=>v!==null);if(sc.length<2)return null;const[lo,hi]=[...sc].sort((a,b)=>a-b);return lo*10+hi;};
  let tot=0;const holes=[];
  for(let h=0;h<18;h++){
    const a=vegN(p.sideA,h),b=vegN(p.sideB,h);
    if(a===null||b===null){holes.push(null);continue;}
    const d=b-a;tot+=d;holes.push({h,hNum:course.holes[h].h,a,b,d,cum:tot});
  }
  return{holes,tot,net:tot*Number(per),per:Number(per)};
}

// ─── SKINS ───────────────────────────────────────────────────
function calcSkins(allHS,courseKey){
  const course=COURSES[courseKey];
  const allK=Object.keys(PLAYERS);
  const pops=calcPops(allK,course.holes,0.90);
  const skins=[];
  for(let h=0;h<18;h++){
    const par=course.holes[h].par;
    const ns=allK.map(k=>{
      let g=null;Object.values(allHS||{}).forEach(ms=>{if(ms?.[k]?.[h]!=null)g=ms[k][h];});
      if(g==null)return null;return{k,net:Number(g)-(pops[k]?.[h]??0)};
    }).filter(Boolean);
    if(!ns.length)continue;
    const mn=Math.min(...ns.map(s=>s.net));
    if(mn>=par)continue;
    const w=ns.filter(s=>s.net===mn);
    if(w.length===1)skins.push({hIdx:h,hole:course.holes[h].h,player:w[0].k,net:mn,par});
  }
  return skins;
}

// ─── SNAKE STATE (fully computed from putts, no stored events) ─
// multiOrders = { holeIdx: [playerKey,...] } — stored ordering for multi-3-putt holes.
// On any hole, the snake changes hands ONCE PER 3-PUTTER in sequence order, doubling each time.
// The last player in the sequence ends up holding it. Deleting a putt auto-reverts everything.
// Returns { owner, amount, transfers:[{hole,owner,amount,fromPlayer,toPlayer}] }
function calcSnakeState(allKeys, puttData, initBet, multiOrders, mode="double") {
  const init = Number(initBet || 0);
  if (!init) return null;
  let owner = null;
  let amount = 0;
  const transfers = [];

  for (let h = 0; h < 18; h++) {
    const threePutters = allKeys.filter(k => Number(puttData?.[k]?.[h] || 0) >= 3);
    if (!threePutters.length) continue;

    // Determine the sequence of 3-putters this hole.
    // For a single player: sequence = [player].
    // For multiple: use stored drag order if set, else default to allKeys order (pending user input).
    let sequence;
    if (threePutters.length === 1) {
      sequence = threePutters;
    } else {
      const stored = multiOrders?.[h];
      if (stored && stored.length >= threePutters.length) {
        // Use stored order — user has confirmed the sequence
        sequence = stored;
      } else {
        // Order not yet set — use allKeys order as a placeholder
        sequence = [...threePutters].sort((a,b) => allKeys.indexOf(a) - allKeys.indexOf(b));
      }
    }

    // The bet only increases when the snake changes hands — i.e. the new player is
    // different from whoever currently holds it. If the current owner 3-putts again,
    // they already have the snake so nothing changes for that entry in the sequence.
    sequence.forEach(player => {
      if (player === owner) return; // already holding it — no transfer, no increase
      let newAmt;
      if (transfers.length === 0) {
        // First ever transfer: use initial bet
        newAmt = init;
      } else if (mode === "increment") {
        // Incremental: each ownership change adds one increment
        newAmt = amount + init;
      } else {
        // Doubling (default): each ownership change doubles
        newAmt = amount * 2;
      }
      owner = player;
      amount = newAmt;
      transfers.push({ hole: h, owner: player, amount: newAmt, players: threePutters, multi: threePutters.length > 1 });
    });
  }

  if (!transfers.length) return { owner: null, amount: 0, transfers: [] };
  return { owner, amount, transfers };
}

// ─── LEDGER ──────────────────────────────────────────────────
function buildLedger(holeScores,puttDataAll,sideBets,r3P,effResults){
  const L={};Object.keys(PLAYERS).forEach(k=>{L[k]={total:0,entries:[]};});
  const add=(k,e)=>{if(!L[k])return;L[k].total+=e.amount;L[k].entries.push(e);};

  ROUNDS.filter(r=>r.course).forEach(round=>{
    round.matches.forEach(m=>{
      const sb=sideBets?.[m.id]||{};
      const hs=holeScores?.[round.key]?.[m.id]||{};
      const p=getP(m.id,r3P);
      if(!p||!p.sideA.length||!p.sideB.length)return;
      const lbl=mLabel(m.id,r3P);
      const allK=[...p.sideA,...p.sideB];

      if(sb.nassauOn&&sb.nassau){
        const n=calcNassau(m.id,hs,round.course,r3P,sb.nassau);
        if(n){
          [{s:n.F,a:sb.nassau?.front,name:"Nassau Front"},{s:n.B,a:sb.nassau?.back,name:"Nassau Back"},{s:n.T,a:sb.nassau?.total,name:"Nassau Total"}].forEach(({s,a,name})=>{
            if(!a||!s.done||s.w==="H")return;
            const w=s.w==="A"?p.sideA:p.sideB,l=s.w==="A"?p.sideB:p.sideA;
            w.forEach(k=>add(k,{rl:round.label,lbl,bet:name,amount:Number(a)}));
            l.forEach(k=>add(k,{rl:round.label,lbl,bet:name,amount:-Number(a)}));
          });
        }
      }
      if(sb.vegasOn&&sb.vegas?.per){
        const v=calcVegas(m.id,hs,round.course,r3P,sb.vegas?.per);
        if(v&&v.net!==0){
          const w=v.net>0?p.sideA:p.sideB,l=v.net>0?p.sideB:p.sideA;
          const abs=Math.abs(v.net);
          w.forEach(k=>add(k,{rl:round.label,lbl,bet:"Vegas",amount:abs}));
          l.forEach(k=>add(k,{rl:round.label,lbl,bet:"Vegas",amount:-abs}));
        }
      }
      if(sb.snakeOn&&sb.snake?.bet){
        // Build per-player putt map from stored puttData: {roundKey:{matchId:{playerKey:{holeIdx:putts}}}}
        const matchPd={};
        allK.forEach(k=>{matchPd[k]=puttDataAll?.[round.key]?.[m.id]?.[k]||{};});
        const snakeSt=calcSnakeState(allK,matchPd,sb.snake?.bet,sb.snake?.multiOrders,sb.snake?.mode||'double');
        if(snakeSt&&snakeSt.owner&&snakeSt.amount>0){
          const others=allK.filter(k=>k!==snakeSt.owner);
          others.forEach(k=>add(k,{rl:round.label,lbl,bet:"Snake 🐍",amount:snakeSt.amount}));
          add(snakeSt.owner,{rl:round.label,lbl,bet:"Snake 🐍",amount:-(snakeSt.amount*others.length)});
        }
      }
    });

    // Skins — $160 pot, 8 players × $20 buy-in per round.
    // Each skin pays out (pot / numSkins) to the winner.
    // Accounting: deduct $20 buy-in from every player once per round,
    // then credit each skin winner with (pot / numSkins).
    const skins=calcSkins(holeScores?.[round.key]||{},round.course);
    if(skins.length){
      const buyIn=SKINS_POT/8;           // $20 per player
      const skinPay=SKINS_POT/skins.length; // payout per skin winner
      // Buy-in: every player pays once this round
      Object.keys(PLAYERS).forEach(k=>{
        add(k,{rl:round.label,lbl:`${round.label} Skins`,bet:"Buy-in",amount:-buyIn});
      });
      // Skin winnings: winner of each skin gets skinPay
      skins.forEach(s=>{
        add(s.player,{rl:round.label,lbl:`${round.label} Skins`,bet:`Skin H${s.hole} win`,amount:skinPay});
      });
    }
  });

  // Ryder Cup
  const tots=ALL_M.reduce((a,m)=>{const w=effResults?.[m.id];if(w==="A")a.A+=m.pts;else if(w==="B")a.B+=m.pts;else if(w==="halved"){a.A+=m.pts/2;a.B+=m.pts/2;}return a;},{A:0,B:0});
  const rW=tots.A>=11?"A":tots.B>=11?"B":null;
  if(rW){
    const wT=rW==="A"?A_KEYS:B_KEYS,lT=rW==="A"?B_KEYS:A_KEYS;
    wT.forEach(k=>add(k,{rl:"Overall",lbl:"Ryder Cup",bet:"Team Bet",amount:RYDER_BET}));
    lT.forEach(k=>add(k,{rl:"Overall",lbl:"Ryder Cup",bet:"Team Bet",amount:-RYDER_BET}));
  }
  return L;
}

// ─── SETTLEMENT ──────────────────────────────────────────────
function settle(L){
  const bal=Object.entries(L).map(([k,v])=>({k,b:v.total}));
  const cr=bal.filter(b=>b.b>0.005).sort((a,b)=>b.b-a.b);
  const db=bal.filter(b=>b.b<-0.005).sort((a,b)=>a.b-b.b);
  const txns=[];
  const cB=cr.map(c=>({...c,r:c.b})),dB=db.map(d=>({...d,r:Math.abs(d.b)}));
  let ci=0,di=0;
  while(ci<cB.length&&di<dB.length){
    const c=cB[ci],d=dB[di],amt=Math.min(c.r,d.r);
    if(amt>0.005)txns.push({from:d.k,to:c.k,amount:amt});
    c.r-=amt;d.r-=amt;if(c.r<0.005)ci++;if(d.r<0.005)di++;
  }
  return txns;
}



// ─── FIREBASE ────────────────────────────────────────────────
function useFirebase(){
  const [ready,setR]=useState(false);
  const [err,setErr]=useState(null);
  const db=useRef(null);
  useEffect(()=>{
    try{if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);else firebase.app();db.current=firebase.database();setR(true);}
    catch(e){setErr(e.message);}
  },[]);
  const listen=useCallback(cb=>{
    if(!db.current)return()=>{};
    const ref=db.current.ref(DB_PATH);
    const h=s=>{cb(s.val()||{});};ref.on("value",h);return()=>ref.off("value",h);
  },[ready]);
  const save=useCallback(async d=>{if(!db.current)throw new Error("not ready");await db.current.ref(DB_PATH).set(d);},[ready]);
  return{ready,err,listen,save};
}

    if(tmr.current)clearTimeout(tmr.current);

      try{await save({mr:R.mr.current,hs:R.hs.current,pd:R.pd.current,r3p:R.r3p.current,sb:R.sb.current,ch:R.ch.current,ts:Date.now()});setSync("✓");setTimeout(()=>setSync("●"),2000);}
      catch{setSync("!");}finally{saving.current=false;}
    },700);
  },[save]);

  useEffect(()=>{
    if(!ready)return;setSync("●");
    return listen(data=>{
      if(saving.current)return;
      const mr=data.mr||{},hsd=data.hs||{},pdd=data.pd||{},r3pd=data.r3p||{},sbd=data.sb||{},chd=data.ch||{};
      R.mr.current=mr;R.hs.current=hsd;R.pd.current=pdd;R.r3p.current=r3pd;R.sb.current=sbd;R.ch.current=chd;
      setMatchResState(mr);setHs(hsd);setPd(pdd);setR3P(r3pd);setSb(sbd);setSync("●");
      if(Object.keys(chd).length>0){setCourseHcps(prev=>{const n={...prev};Object.entries(chd).forEach(([k,v])=>{n[k]=v;});return n;});}
    });
  },[ready,listen]);

  // Auto-compute match winners from hole scores
  const effRes=useRef({});
  const [totals,setTotals]=useState({A:0,B:0});
  useEffect(()=>{
    const auto={};
    ROUNDS.filter(r=>r.course).forEach(round=>{
      round.matches.forEach(m=>{

        if(mp?.winner)auto[m.id]=mp.winner;
      });
    });
    const merged={...auto,...matchRes};
    effRes.current=merged;
    const t=ALL_M.reduce((a,m)=>{const w=merged[m.id];if(w==="A")a.A+=m.pts;else if(w==="B")a.B+=m.pts;else if(w==="halved"){a.A+=m.pts/2;a.B+=m.pts/2;}return a;},{A:0,B:0});
    setTotals(t);
  },[hs,r3P,matchRes]);

  const setMR=useCallback((id,w)=>{
    setMatchResState(prev=>{const n={...prev,[id]:w===prev[id]?null:w};R.mr.current=n;sched();return n;});
  },[sched]);
  const setScore=useCallback((rk,mid,pk,hi,v)=>{
    setHs(prev=>{const r={...(prev[rk]||{})},m={...(r[mid]||{})},p={...(m[pk]||{})};
      if(v===undefined||v==="")delete p[hi];else p[hi]=Number(v);
      m[pk]=p;r[mid]=m;const n={...prev,[rk]:r};R.hs.current=n;sched();return n;});
  },[sched]);
  const setPutts=useCallback((rk,mid,pk,hi,v)=>{
    setPd(prev=>{const r={...(prev[rk]||{})},m={...(r[mid]||{})},p={...(m[pk]||{})};
      if(v===undefined||v==="")delete p[hi];else p[hi]=Number(v);
      m[pk]=p;r[mid]=m;const n={...prev,[rk]:r};R.pd.current=n;sched();return n;});
  },[sched]);
  const setR3Pair=useCallback((mid,side,pl)=>{
    setR3P(prev=>{const n={...prev,[mid]:{...(prev[mid]||{}),[side]:pl}};R.r3p.current=n;sched();return n;});
  },[sched]);
  const updateSB=useCallback((mid,patch)=>{
    setSb(prev=>{const n={...prev,[mid]:{...(prev[mid]||{}),...patch}};R.sb.current=n;sched();return n;});
  },[sched]);
  const updateCourseHcp=useCallback((courseKey,holeIdx,val)=>{
    setCourseHcps(prev=>{
      const arr=[...( prev[courseKey]||COURSES[courseKey].holes.map(h=>h.hcp))];
      arr[holeIdx]=Number(val);
      const next={...prev,[courseKey]:arr};
      R.ch.current=next;sched();return next;
    });
  },[sched]);

  // Snake only stores multiOrders (tie-breaking) — all state derived live from puttData
  const updateSnakeOrder=useCallback((mid,holeIdx,orderedKeys)=>{
    setSb(prev=>{
      const cur=prev[mid]||{},snake=cur.snake||{};
      const multiOrders={...(snake.multiOrders||{}),[holeIdx]:orderedKeys};
      const n={...prev,[mid]:{...cur,snake:{...snake,multiOrders}}};
      R.sb.current=n;sched();return n;
    });
  },[sched]);

  const rem=ALL_M.filter(m=>!effRes.current[m.id]).reduce((s,m)=>s+m.pts,0);
  const leader=totals.A>totals.B?"A":totals.B>totals.A?"B":null;

            <div style={{fontSize:22,fontWeight:800,color:C.hdrText,letterSpacing:1,marginTop:2}}>SCOREBOARD</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:11,color:sync==="●"?"#4a9a4a":sync==="⟳"?"#c8a820":"#c04020",fontWeight:700}}>{sync} {sync==="●"?"LIVE":sync==="⟳"?"SAVING":sync==="✓"?"SAVED":"ERROR"}</div>
            <div style={{fontSize:9,color:"#5a7a5a",marginTop:1}}>22 PTS · 11 TO WIN</div>
          </div>
        </div>

        {/* Score Banner */}
        <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,marginTop:12}}>
          {[TEAM_A,TEAM_B].map((team,i)=>{
            const side=i===0?"A":"B",score=i===0?totals.A:totals.B,isL=leader===side;
            return(<div key={team.name} style={{background:isL?"rgba(255,255,255,0.15)":"rgba(255,255,255,0.05)",borderRadius:12,padding:"10px 8px",textAlign:"center",border:isL?"2px solid rgba(255,255,255,0.3)":"2px solid transparent"}}>

      <div className="content">

                    {res==="A"?"✓ WIN":TEAM_A.emoji+" "+TEAM_A.short}
                  </button>
                  <div style={{textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                    <div style={{fontSize:11,color:C.textSoft,fontWeight:700}}>{m.pts}pt</div>
                    <button onClick={()=>setMR(m.id,"halved")} style={{background:res==="halved"?C.goldBg:"transparent",border:`1px solid ${res==="halved"?C.goldBdr:C.border}`,borderRadius:6,padding:"3px 4px",fontSize:9,color:res==="halved"?C.gold:C.textSoft,fontWeight:700}}>½</button>
                  </div>
                  <button className="btn btn-sm" onClick={()=>setMR(m.id,"B")} style={{background:res==="B"?C.redBg:"#f4f8f4",border:`2px solid ${res==="B"?C.redBdr:C.border}`,color:res==="B"?C.red:C.textMid}}>
                    {res==="B"?"✓ WIN":TEAM_B.emoji+" "+TEAM_B.short}
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      );
    })}
  </>);
}

// ─── ROUND TAB ───────────────────────────────────────────────
function RoundTab({rc,effRes,setMR,hs,pd,onScore,onPutts,r3P,setR3Pair,sb,updateSB,updateSnakeOrder,ledger}){
  const [selMatch,setSelMatch]=useState(null);
  const course=COURSES[rc.course];
  const isR3=rc.key==="r3";

  return(<>
    {/* Course header */}
    <div className="card" style={{margin:0,marginBottom:12}}>
      <div style={{padding:"12px 14px",background:C.hdr}}>
        <div style={{fontSize:11,color:"#8a9a60",fontWeight:600,letterSpacing:2}}>{rc.label.toUpperCase()}</div>
        <div style={{fontSize:18,fontWeight:800,color:C.hdrText,marginTop:2}}>{course.full}</div>
        <div style={{fontSize:11,color:"#5a7a5a",marginTop:1}}>{course.subtitle} · Par {course.par}</div>
      </div>
    </div>

    {isR3&&<R3Setup r3P={r3P} setR3Pair={setR3Pair}/>}

    {rc.matches.map(m=>{
      const p=getP(m.id,r3P);
      const hasP=p&&p.sideA.length>0&&p.sideB.length>0;
      const mhs=hs?.[m.id]||{};
      const mpd=pd?.[m.id]||{};
      const mp=hasP?calcMP(m.id,mhs,rc.course,r3P):null;
      const res=effRes[m.id];
      const msb=sb?.[m.id]||{};
      const r3m=R3M.find(x=>x.id===m.id);
      const isOpen=selMatch===m.id;
      const isBonus=m.id==="r23net";

      // Nassau/Vegas live summary
      let nassLine=null,vegLine=null;
      if(msb.nassauOn&&hasP){
        const n=calcNassau(m.id,mhs,rc.course,r3P,msb.nassau);
        if(n)nassLine=`F:${n.F.s} B:${n.B.s} T:${n.T.s}${n.net!==0?" · "+(n.net>0?"🌵":"🌶️")+" "+$(Math.abs(n.net)):""}`;
      }
      if(msb.vegasOn&&hasP){
        const v=calcVegas(m.id,mhs,rc.course,r3P,msb.vegas?.per);
        if(v)vegLine=`Vegas: ${v.tot>0?"+":""}${v.tot}pts · ${v.net>0?"🌵":"🌶️"} ${$(Math.abs(v.net))}`;
      }

      return(
        <div key={m.id} className="card">
          {/* Match header */}
          <div style={{padding:"12px 14px",background:C.cardAlt,borderBottom:`1px solid ${C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:800,color:C.text}}>{mLabel(m.id,r3P)}</div>
                <div style={{fontSize:10,color:C.textSoft,marginTop:1}}>{r3m?r3m.label:rc.type==="pairs"?"2v2 Match":"Singles"} · {m.pts}pt</div>
                {nassLine&&<div style={{fontSize:10,color:C.gold,fontWeight:700,marginTop:3}}>{nassLine}</div>}
                {vegLine&&<div style={{fontSize:10,color:C.purple,fontWeight:700,marginTop:1}}>{vegLine}</div>}
              </div>
              {mp&&mp.played>0&&(
                <div className="match-pill" style={{background:mp.isDormie?C.goldBg:mp.ud===0?C.goldBg:mp.ud>0?C.greenBg:C.redBg,color:mp.isDormie?C.gold:mp.ud===0?C.gold:mp.ud>0?C.green:C.red,border:`2px solid ${mp.isDormie?C.goldBdr:mp.ud===0?C.goldBdr:mp.ud>0?C.greenBdr:C.redBdr}`,flexShrink:0}}>
                  {mp.status}
                </div>
              )}
            </div>
          </div>

          {/* Auto result */}
          {mp?.winner&&<div style={{padding:"8px 14px",background:mp.winner==="A"?C.greenBg:mp.winner==="B"?C.redBg:C.goldBg,textAlign:"center",fontSize:13,fontWeight:800,color:mp.winner==="A"?C.green:mp.winner==="B"?C.red:C.gold}}>
            {mp.winner==="A"?`✅ ${TEAM_A.name} WINS`:mp.winner==="B"?`✅ ${TEAM_B.name} WINS`:"🤝 HALVED — auto-scored"}
          </div>}

          {/* Result buttons */}
          <div style={{padding:"10px 14px",background:C.card}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 48px 1fr",gap:6}}>
              <button className="btn btn-sm" onClick={()=>setMR(m.id,"A")} style={{background:res==="A"?C.greenBg:C.cardAlt,border:`2px solid ${res==="A"?C.greenBdr:C.border}`,color:res==="A"?C.green:C.textMid}}>
                {TEAM_A.emoji} {res==="A"?"✓ WIN":TEAM_A.short}
              </button>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                <div style={{fontSize:11,fontWeight:700,color:C.textSoft}}>{m.pts}pt</div>
                <button onClick={()=>setMR(m.id,"halved")} style={{padding:"3px 6px",background:res==="halved"?C.goldBg:"transparent",border:`1px solid ${res==="halved"?C.goldBdr:C.border}`,borderRadius:6,fontSize:9,color:res==="halved"?C.gold:C.textSoft,fontWeight:700}}>½</button>
              </div>
              <button className="btn btn-sm" onClick={()=>setMR(m.id,"B")} style={{background:res==="B"?C.redBg:C.cardAlt,border:`2px solid ${res==="B"?C.redBdr:C.border}`,color:res==="B"?C.red:C.textMid}}>
                {TEAM_B.emoji} {res==="B"?"✓ WIN":TEAM_B.short}
              </button>
            </div>
          </div>

          {/* Side bets + scorecard toggle */}
          {!isBonus&&hasP&&(
            <div style={{padding:"8px 14px",borderTop:`1px solid ${C.border}`,display:"flex",gap:8}}>
              <button className="btn-xs btn" onClick={()=>setSelMatch(isOpen?null:m.id)} style={{flex:1,background:isOpen?"#e8f0e8":C.cardAlt,border:`1px solid ${C.border}`,color:C.textMid}}>
                {isOpen?"▲ Close":"📋 Scorecard"}
              </button>
            </div>
          )}
          {!isBonus&&hasP&&<SideBetPanel mid={m.id} type={p.type} sb={sb} updateSB={updateSB}/>}
          {msb.snakeOn&&hasP&&p.type==="pairs"&&(
            <SnakeTracker mid={m.id} allKeys={[...p.sideA,...p.sideB]} sb={sb} mpd={mpd} updateSnakeOrder={updateSnakeOrder}/>
          )}

          {/* Scorecard */}
          {isOpen&&hasP&&(
            <HoleScorecard mid={m.id} courseKey={rc.course} mhs={mhs} mpd={mpd}
              onScore={(pk,hi,v)=>onScore(m.id,pk,hi,v)}
              onPutts={(pk,hi,v)=>onPutts(m.id,pk,hi,v)}
              mp={mp} r3P={r3P} showPutts={msb.snakeOn}
              sb={sb} ledger={ledger}/>
          )}
        </div>
      );
    })}
  </>);
}

// ─── HOLE SCORECARD (mobile-first: hole by hole) ─────────────
function HoleScorecard({mid,courseKey,mhs,mpd,onScore,onPutts,mp,r3P,showPutts,sb,ledger}){
  const course=COURSES[courseKey];
  // Hooks must always be called — move early return AFTER all hook calls
  const [viewMode,setViewMode]=useState("hole"); // "hole" | "card"
  const [curHole,setCurHole]=useState(0); // 0-17 index
  const p=getP(mid,r3P);
  if(!p||!p.sideA.length||!p.sideB.length)return null;
  const allK=[...p.sideA,...p.sideB];
  const pct=p.type==="singles"?1.00:0.90;
  const pops=calcPops(allK,course.holes,pct);

  const getG=(k,h)=>mhs?.[k]?.[h]??"";
  const getP2=(k,h)=>mpd?.[k]?.[h]??"";
  const netOf=(k,h)=>{const g=getG(k,h);if(g===""||isNaN(g))return null;return Number(g)-(pops[k]?.[h]??0);};
  const popStr=allK.map(k=>{const d=Math.round((PLAYERS[k].hcp-Math.min(...allK.map(x=>PLAYERS[x].hcp)))*pct);return`${PLAYERS[k].short}:${d===0?"scratch":"+"+d}`;}).join(" · ");

  // Vegas + Snake
  const msb=sb?.[mid]||{};
  const vegasData=msb.vegasOn?calcVegas(mid,mhs,courseKey,r3P,msb.vegas?.per):null;
  // Snake: fully computed from mpd (match putt data) — reverts automatically when scores deleted
  const snakeState=msb.snakeOn?calcSnakeState(allK,mpd,Number(msb.snake?.bet||0),msb.snake?.multiOrders||{},msb.snake?.mode||'double'):null;
  const snakeOwner=snakeState?.owner||null;
  const snakeBet=snakeState?.amount||Number(msb.snake?.bet||0);
  const snakeTransferCount=snakeState?.transfers?.length||0;

  const hole=course.holes[curHole];
  const hStatus=mp?.hr?.[curHole];

  return(
    <div style={{borderTop:`1px solid ${C.border}`}}>
      {/* Pops + mode toggle */}
      <div style={{padding:"8px 14px",background:"#f0f8f0",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:10,color:C.textSoft}}>🎯 {popStr}</div>
        <div style={{display:"flex",gap:4}}>
          <button onClick={()=>setViewMode("hole")} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:viewMode==="hole"?C.hdr:"transparent",color:viewMode==="hole"?C.hdrText:C.textSoft,fontSize:10,fontWeight:700}}>Hole</button>
          <button onClick={()=>setViewMode("card")} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:viewMode==="card"?C.hdr:"transparent",color:viewMode==="card"?C.hdrText:C.textSoft,fontSize:10,fontWeight:700}}>Card</button>
        </div>
      </div>

      {viewMode==="hole"&&(
        <div style={{padding:"14px"}}>
          {/* Hole navigator */}
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <button className="hole-btn" onClick={()=>setCurHole(h=>Math.max(0,h-1))} disabled={curHole===0}>‹</button>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:28,fontWeight:900,color:C.text}}>Hole {hole.h}</div>
              <div style={{fontSize:13,color:C.textSoft,marginTop:1}}>Par {hole.par} · Hcp {hole.hcp}</div>
              {hStatus!==null&&hStatus!==undefined&&<div style={{marginTop:6,display:"inline-flex",padding:"4px 14px",borderRadius:16,background:hStatus===0?C.goldBg:hStatus>0?C.greenBg:C.redBg,color:hStatus===0?C.gold:hStatus>0?C.green:C.red,fontSize:12,fontWeight:800}}>
                {hStatus===0?"All Square":hStatus>0?`🌵 ${Math.abs(hStatus)} UP`:`🌶️ ${Math.abs(hStatus)} UP`}
              </div>}
            </div>
            <button className="hole-btn" onClick={()=>setCurHole(h=>Math.min(17,h+1))} disabled={curHole===17}>›</button>
          </div>

          {/* Snake status banner */}
          {showPutts&&snakeOwner&&<div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",marginBottom:8,background:C.goldBg,borderRadius:10,border:`2px solid ${C.goldBdr}`}}>
            <span className="snake-icon">🐍</span>
            <div>
              <div style={{fontSize:13,fontWeight:800,color:C.gold}}>{PLAYERS[snakeOwner]?.name} holds the snake</div>
              <div style={{fontSize:11,color:C.textSoft}}>
                Current bet: <strong>${snakeBet.toFixed(2)}</strong>{" · Next 3-putt: "}
                {msb.snake?.mode==="increment"
                  ? `+$${Number(msb.snake?.bet||0).toFixed(2)} → $${(snakeBet+Number(msb.snake?.bet||0)).toFixed(2)}`
                  : `doubles → $${(snakeBet*2).toFixed(2)}`}
              </div>
            </div>
          </div>}
          {showPutts&&!snakeOwner&&msb.snakeOn&&<div style={{padding:"8px 14px",marginBottom:8,background:C.goldBg,borderRadius:10,border:`1px solid ${C.goldBdr}`,textAlign:"center"}}>
            <div style={{fontSize:12,color:C.gold,fontWeight:700}}>🐍 Snake active · Initial bet: ${Number(msb.snake?.bet||0).toFixed(2)} · First 3-putt takes it</div>
          </div>}

          {/* Score inputs for each player */}
          {[{keys:p.sideA,team:TEAM_A},{keys:p.sideB,team:TEAM_B}].map(({keys,team})=>(
            <div key={team.name} style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:800,color:team.color,marginBottom:8,letterSpacing:.5}}>{team.emoji} {team.name}</div>
              {keys.map(k=>{
                const g=getG(k,curHole),net=netOf(k,curHole),par=hole.par;
                const pop=pops[k]?.[curHole]??0;
                const putts=getP2(k,curHole);
                const is3=Number(putts)>=3;
                const col=net!==null?scoreColor(net,par):C.textSoft;
                const bg=net!==null?scoreBg(net,par):C.cardAlt;
                return(
                  <div key={k} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:700}}>{PLAYERS[k].short}</div>
                      {pop>0&&<div style={{fontSize:10,color:team.color}}>+{pop} pop{pop>1?"s":""}</div>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      {/* Gross + pop dot indicator */}
                      <div style={{textAlign:"center"}}>
                        <div style={{fontSize:9,color:C.textSoft,marginBottom:2}}>GROSS</div>
                        <div style={{position:"relative",display:"inline-block"}}>
                          <input className="score-input" type="number" min="1" max="12" value={g}
                            onChange={e=>onScore(k,curHole,e.target.value===""?undefined:e.target.value)}
                            style={{borderColor:net!==null?col:C.border,background:bg,color:col}}/>
                          {/* Pop dots — one dot per stroke received on this hole */}
                          {pop>0&&<div style={{position:"absolute",top:-4,right:-4,display:"flex",gap:2,flexDirection:pop>1?"column":"row",alignItems:"center"}}>
                            {Array.from({length:Math.min(pop,2)}).map((_,di)=>(
                              <div key={di} style={{width:8,height:8,borderRadius:"50%",background:team.color,border:"1.5px solid #fff",boxShadow:"0 1px 3px rgba(0,0,0,0.25)"}}/>
                            ))}
                          </div>}
                        </div>
                      </div>
                      {/* Net */}
                      {net!==null&&<div style={{textAlign:"center"}}>
                        <div style={{fontSize:9,color:C.textSoft,marginBottom:2}}>NET</div>
                        <div style={{width:52,height:52,borderRadius:10,background:bg,border:`2px solid ${col}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:800,color:col}}>{net}</div>
                      </div>}
                      {/* Putts + snake indicator */}
                      {showPutts&&<div style={{textAlign:"center"}}>
                        <div style={{fontSize:9,color:is3?C.gold:C.textSoft,marginBottom:2,fontWeight:is3?800:400}}>PUTTS{is3?" 🐍":""}</div>
                        <input className={`putt-input${is3?" three-putt":""}`} type="number" min="1" max="6" value={putts}
                          onChange={e=>onPutts(k,curHole,e.target.value===""?undefined:e.target.value)}/>
                        {snakeOwner===k&&<div style={{fontSize:10,marginTop:3}} className="snake-icon">🐍</div>}
                      </div>}
                    </div>
                  </div>
                );
              })}
            </div>
          ))}

          {/* Vegas hole display */}
          {vegasData&&(()=>{
            const hd=vegasData.holes[curHole];
            return(
              <div style={{marginTop:10,borderRadius:12,border:`2px solid ${C.purple}`,overflow:"hidden",background:"rgba(106,42,154,0.04)"}}>
                <div style={{padding:"8px 14px",background:"rgba(106,42,154,0.12)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:13,fontWeight:800,color:C.purple}}>🎲 Vegas</div>
                  <div style={{fontSize:11,color:C.purple}}>Hole {hole.h} · ${vegasData.per}/pt</div>
                </div>
                {hd?(
                  <div style={{padding:"10px 14px"}}>
                    {/* Team Vegas numbers */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:8,alignItems:"center",marginBottom:10}}>
                      <div style={{textAlign:"center",padding:"8px",background:C.greenBg,borderRadius:10,border:`1px solid ${C.greenBdr}`}}>
                        <div style={{fontSize:10,color:C.green,fontWeight:700,marginBottom:2}}>{TEAM_A.emoji} {TEAM_A.short}</div>
                        <div style={{fontSize:28,fontWeight:900,color:C.green}}>{hd.a}</div>
                        <div style={{fontSize:9,color:C.textSoft}}>Vegas #</div>
                      </div>
                      <div style={{textAlign:"center"}}>
                        <div style={{fontSize:11,color:C.textSoft}}>vs</div>
                        <div style={{fontSize:13,fontWeight:800,color:hd.d>0?C.green:hd.d<0?C.red:C.textSoft,marginTop:4}}>{hd.d>0?"🌵":hd.d<0?"🌶️":"="} {hd.d>0?"+":""}{hd.d}</div>
                      </div>
                      <div style={{textAlign:"center",padding:"8px",background:C.redBg,borderRadius:10,border:`1px solid ${C.redBdr}`}}>
                        <div style={{fontSize:10,color:C.red,fontWeight:700,marginBottom:2}}>{TEAM_B.emoji} {TEAM_B.short}</div>
                        <div style={{fontSize:28,fontWeight:900,color:C.red}}>{hd.b}</div>
                        <div style={{fontSize:9,color:C.textSoft}}>Vegas #</div>
                      </div>
                    </div>
                    {/* Cumulative */}
                    <div style={{padding:"8px 12px",background:hd.cum>0?C.greenBg:hd.cum<0?C.redBg:C.cardAlt,borderRadius:8,border:`1px solid ${hd.cum>0?C.greenBdr:hd.cum<0?C.redBdr:C.border}`,textAlign:"center"}}>
                      <div style={{fontSize:10,color:C.textSoft,marginBottom:2}}>RUNNING TOTAL</div>
                      <div style={{fontSize:16,fontWeight:800,color:hd.cum>0?C.green:hd.cum<0?C.red:C.textSoft}}>
                        {hd.cum>0?`🌵 ${TEAM_A.short} +${hd.cum}pts`:hd.cum<0?`🌶️ ${TEAM_B.short} +${Math.abs(hd.cum)}pts`:"All Square"}
                      </div>
                      <div style={{fontSize:14,fontWeight:800,color:hd.cum>0?C.green:hd.cum<0?C.red:C.textSoft,marginTop:2}}>
                        {$(Math.abs(hd.cum*vegasData.per))} {hd.cum!==0?(hd.cum>0?`owed to ${TEAM_A.short}`:`owed to ${TEAM_B.short}`):""}
                      </div>
                    </div>
                  </div>
                ):(
                  <div style={{padding:"12px 14px",textAlign:"center",color:C.textSoft,fontSize:12}}>
                    Enter all 4 players scores to see Vegas numbers
                  </div>
                )}
              </div>
            );
          })()}

          {/* Hole nav dots */}
          <div style={{display:"flex",justifyContent:"center",gap:4,marginTop:14,flexWrap:"wrap"}}>
            {course.holes.map((_,i)=>{
              const anyScore=allK.some(k=>getG(k,i)!=="");
              return(<button key={i} onClick={()=>setCurHole(i)} style={{width:24,height:24,borderRadius:12,background:i===curHole?C.hdr:anyScore?"#4a8a4a":C.cardAlt,border:`1px solid ${i===curHole?C.hdr:anyScore?"#4a8a4a":C.border}`,color:i===curHole?C.hdrText:anyScore?"#fff":C.textSoft,fontSize:9,fontWeight:700,padding:0}}>
                {i+1}
              </button>);
            })}
          </div>
        </div>
      )}

      {viewMode==="card"&&(
        <CardView course={course} allK={allK} pops={pops} getG={getG} netOf={netOf} p={p} mp={mp} vegasData={vegasData}/>
      )}
    </div>
  );
}

// ─── COMPACT CARD VIEW (summary table) ───────────────────────
function CardView({course,allK,pops,getG,netOf,p,mp,vegasData}){
  return(
    <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch",padding:"8px 0"}}>
      {[{label:"FRONT",idxs:[0,1,2,3,4,5,6,7,8]},{label:"BACK",idxs:[9,10,11,12,13,14,15,16,17]}].map(({label,idxs})=>(
        <div key={label} style={{marginBottom:8}}>
          <div style={{fontSize:10,fontWeight:700,color:C.textSoft,padding:"0 10px 4px",letterSpacing:2}}>{label} NINE</div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:400}}>
            <thead>
              <tr style={{background:C.hdr}}>
                <td style={{padding:"4px 8px",color:"#8a9a60",fontSize:9,width:64}}>PLAYER</td>
                {idxs.map(i=><td key={i} style={{padding:"4px 2px",textAlign:"center",color:C.hdrText,fontWeight:700,width:26}}>{course.holes[i].h}</td>)}
                <td style={{padding:"4px 6px",textAlign:"center",color:"#8a9a60",fontSize:9,width:36}}>OUT</td>
              </tr>
              <tr style={{background:C.cardAlt}}>
                <td style={{padding:"2px 8px",fontSize:9,color:C.textSoft,fontWeight:700}}>Par</td>
                {idxs.map(i=><td key={i} style={{padding:"2px 2px",textAlign:"center",fontSize:10,fontWeight:700,color:C.textMid}}>{course.holes[i].par}</td>)}
                <td style={{textAlign:"center",fontSize:10,fontWeight:700,color:C.textMid}}>{idxs.reduce((s,i)=>s+course.holes[i].par,0)}</td>
              </tr>
              <tr style={{background:C.goldBg}}>
                <td style={{padding:"2px 8px",fontSize:8,color:C.gold,fontWeight:700}}>Match</td>
