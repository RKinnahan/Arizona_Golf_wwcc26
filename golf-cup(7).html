// ─── SNAKE DRAG LIST ─────────────────────────────────────────
function SnakeDragList({players,onConfirm}){
  const [order,setOrder]=useState([...players]);
  const dragIdx=useRef(null);
  const itemRefs=useRef([]);

  const onDragStart=i=>{dragIdx.current=i;};
  const onDragOver=(e,i)=>{
    e.preventDefault();
    if(dragIdx.current===null||dragIdx.current===i)return;
    const arr=[...order];const item=arr.splice(dragIdx.current,1)[0];arr.splice(i,0,item);
    dragIdx.current=i;setOrder(arr);
  };

  const onTouchMove=e=>{
    e.preventDefault();
    if(dragIdx.current===null)return;
    const y=e.touches[0].clientY;
    itemRefs.current.forEach((el,i)=>{
      if(!el)return;const r=el.getBoundingClientRect();
      if(y>=r.top&&y<=r.bottom&&i!==dragIdx.current){
        const arr=[...order];const item=arr.splice(dragIdx.current,1)[0];arr.splice(i,0,item);
        dragIdx.current=i;setOrder(arr);
      }
    });
  };

  return(
    <div>
      <div style={{fontSize:12,color:C.textSoft,marginBottom:8}}>Drag to reorder — last player gets the 🐍</div>
      {order.map((pk,i)=>(
        <div key={pk} ref={el=>itemRefs.current[i]=el}
          draggable onDragStart={()=>onDragStart(i)} onDragOver={e=>onDragOver(e,i)} onDragEnd={()=>{dragIdx.current=null;}}
          onTouchStart={e=>{e.preventDefault();dragIdx.current=i;}}
          onTouchMove={onTouchMove} onTouchEnd={()=>{dragIdx.current=null;}}
          className="snake-drag-item"
          style={{display:"flex",alignItems:"center",gap:12,padding:"14px",marginBottom:6,background:i===order.length-1?C.goldBg:C.card,border:`2px solid ${i===order.length-1?C.goldBdr:C.border}`,borderRadius:12,fontSize:15,fontWeight:i===order.length-1?800:600,color:i===order.length-1?C.gold:C.text}}>
          <span style={{fontSize:22,cursor:"grab"}}>⠿</span>
          <span>{i+1}. {PLAYERS[pk]?.name}</span>
          {i===order.length-1&&<span className="snake-icon" style={{marginLeft:"auto"}}>🐍</span>}
        </div>
      ))}
      <button className="btn" onClick={()=>onConfirm(order)} style={{width:"100%",background:C.gold,color:"#fff",marginTop:4}}>
        Confirm — 🐍 → {PLAYERS[order[order.length-1]]?.short}
      </button>
    </div>
  );
}

// ─── SNAKE TRACKER ───────────────────────────────────────────
// Fully computed from puttData — deleting a putt score auto-reverts the snake.
// Only multiOrders (tie-break ordering for multi-3-putt holes) is stored.
function SnakeTracker({mid,allKeys,sb,mpd,updateSnakeOrder}){
  const msb=sb?.[mid]||{};
  const snake=msb.snake||{};
  const multiOrders=snake.multiOrders||{};
  const initBet=Number(snake.bet||0);
  const [pending,setPending]=useState(null);

  // Fully computed state from current putt data
  const state=calcSnakeState(allKeys,mpd,initBet,multiOrders,snake.mode||'double');
  const curOwner=state?.owner||null;
  const curAmt=state?.amount||0;
  const transfers=state?.transfers||[];

  // Multi-3-putt holes that need ordering (have >1 player, no stored order)
  // Dedupe by hole — one prompt per hole, not per transfer within a hole
  const multiHoles=[...new Set(transfers.filter(t=>t.multi).map(t=>t.hole))];
  const needsOrder=multiHoles.filter(h=>{
    const stored=multiOrders?.[h];
    const players=transfers.find(t=>t.hole===h)?.players||[];
    return !stored||stored.length<players.length;
  }).map(h=>({hole:h,players:transfers.find(t=>t.hole===h)?.players||[],amount:transfers.find(t=>t.hole===h)?.amount||0}));

  const setOrder=(holeIdx,orderedKeys)=>{
    updateSnakeOrder(mid,holeIdx,orderedKeys);
    setPending(null);
  };

  return(
    <div style={{borderTop:`1px solid ${C.goldBdr}`,background:C.goldBg}}>
      <div style={{padding:"12px 14px",borderBottom:`1px solid ${C.goldBdr}`,display:"flex",alignItems:"center",gap:10}}>
        <span className="snake-icon">🐍</span>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:800,color:C.gold}}>
            🐍 Snake · {snake.mode==="increment"?`+$${initBet.toFixed(2)} per transfer`:`$${initBet.toFixed(2)} doubling`}
          </div>
          {curOwner
            ?<div style={{fontSize:12,color:C.text,marginTop:1}}>🐍 <strong>{PLAYERS[curOwner]?.name}</strong> holds the snake · Bet: <strong>${curAmt.toFixed(2)}</strong></div>
            :<div style={{fontSize:11,color:C.textSoft,marginTop:1}}>No 3-putts yet — snake not in play</div>}
          <div style={{fontSize:10,color:C.textSoft,marginTop:2}}>Deleting a putt score automatically reverts snake ownership</div>
        </div>
      </div>

      {/* Multi-3-putt holes needing tie-break order */}
      {needsOrder.map(({hole:hIdx,players,amount:firstAmt})=>{
        const isPend=pending===hIdx;
        const snakeMode=snake.mode||'double';
        // Show what the bet will be after all transfers on this hole
        const finalAmt=snakeMode==='increment'
          ? firstAmt + (players.length-1)*initBet   // each subsequent adds initBet
          : firstAmt*Math.pow(2,players.length-1); // doubling
        return(
          <div key={hIdx} style={{padding:"12px 14px",borderBottom:`1px solid ${C.goldBdr}`,background:"rgba(200,168,32,0.10)"}}>
            <div style={{fontSize:13,fontWeight:700,color:C.gold,marginBottom:4}}>
              ⚠️ Hole {hIdx+1} — {players.length} players 3-putted
            </div>
            <div style={{fontSize:11,color:C.textSoft,marginBottom:4}}>
              Snake changes hands {players.length} time{players.length>1?"s":""}. Drag to set who 3-putted first → last. Bet doubles each transfer.
            </div>
            <div style={{fontSize:11,color:C.gold,fontWeight:700,marginBottom:8}}>
              Starts at ${firstAmt.toFixed(2)} → ends at ${finalAmt.toFixed(2)} (last player holds it)
            </div>
            {isPend
              ?<SnakeDragList players={players} onConfirm={ord=>setOrder(hIdx,ord)}/>
              :<button className="btn" onClick={()=>setPending(hIdx)} style={{width:"100%",background:C.gold,color:"#fff"}}>
                Set 3-Putt Order for Hole {hIdx+1} — {players.map(k=>PLAYERS[k]?.short).join(", ")}
              </button>}
          </div>
        );
      })}

      {/* Transfer log — auto-computed, updates live */}
      {transfers.length>0&&(
        <div style={{padding:"10px 14px"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.textSoft,letterSpacing:1,marginBottom:6}}>TRANSFER LOG (auto-computed)</div>
          {transfers.map((t,i)=>{
            const prev=transfers[i-1];
            const sameHole=prev&&prev.hole===t.hole;
            return(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${C.goldBdr}`,background:sameHole?"rgba(200,168,32,0.05)":"transparent"}}>
                <div>
                  <div style={{fontSize:12}}>
                    {sameHole
                      ?<span style={{color:C.textSoft}}>  ↳ </span>
                      :<span>H{t.hole+1} </span>}
                    <span>→ <strong style={{color:C.gold}}>{PLAYERS[t.owner]?.short}</strong></span>
                    {t.multi&&<span style={{fontSize:10,color:C.textSoft,marginLeft:4}}>{sameHole?"(multi)":"(1st)"}</span>}
                  </div>
                </div>
                <span style={{fontSize:13,fontWeight:700,color:C.gold}}>${t.amount.toFixed(2)}</span>
              </div>
            );
          })}
          <div style={{marginTop:8,padding:"10px 12px",background:"rgba(200,168,32,0.15)",borderRadius:10,border:`1px solid ${C.goldBdr}`}}>
            <div style={{fontSize:12,fontWeight:800,color:C.gold,textAlign:"center"}}>
              End of round: {PLAYERS[curOwner]?.short} owes ${curAmt.toFixed(2)} to each other player
            </div>
            <div style={{fontSize:11,color:C.textSoft,textAlign:"center",marginTop:2}}>
              Total owed: ${(curAmt*(allKeys.length-1)).toFixed(2)}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── R3 SETUP ────────────────────────────────────────────────
function R3Setup({r3P,setR3Pair}){
  const [open,setOpen]=useState(true);
  const aOpts=A_KEYS.map(k=>({key:k,...PLAYERS[k]}));
  const bOpts=B_KEYS.map(k=>({key:k,...PLAYERS[k]}));
  const get=mid=>{const d=r3P?.[mid]||{};return{sideA:d.sideA||[],sideB:d.sideB||[]};};
  const setSlot=(mid,side,slot,pk)=>{const cur=get(mid);const arr=[...(cur[side]||[])];if(pk==="")arr.splice(slot,1);else arr[slot]=pk;setR3Pair(mid,side,arr);};

  return(
    <div className="card" style={{border:`2px solid ${C.goldBdr}`}}>
      <button onClick={()=>setOpen(!open)} style={{width:"100%",padding:"14px",background:C.goldBg,border:"none",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:15,fontWeight:800,color:C.gold}}>🎯 Set Round 3 Pairings</span>
        <span style={{fontSize:16,color:C.gold}}>{open?"▲":"▼"}</span>
      </button>
      {open&&R3M.map(m=>{
        const isPairs=m.type==="pairs",cur=get(m.id);
        const allK=[...cur.sideA,...cur.sideB].filter(Boolean);
        const pct=isPairs?0.90:1.00;
        const popStr=allK.length>=2?calcPops(allK,COURSES.wekopa.holes,pct)&&allK.map(k=>{const d=Math.round((PLAYERS[k].hcp-Math.min(...allK.map(x=>PLAYERS[x].hcp)))*pct);return`${PLAYERS[k].short}:${d===0?"scratch":"+"+d}`;}).join(" · "):"";
        return(
          <div key={m.id} style={{padding:"14px",borderTop:`1px solid ${C.goldBdr}`}}>
            <div style={{fontSize:13,fontWeight:800,color:C.gold,marginBottom:10}}>{m.label} · {m.pts}pt · {isPairs?"2v2 (90% pops)":"Singles (100% pops)"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {[{team:TEAM_A,side:"sideA",opts:aOpts},{team:TEAM_B,side:"sideB",opts:bOpts}].map(({team,side,opts})=>(
                <div key={team.name} style={{background:team.bg,borderRadius:10,padding:"10px",border:`1px solid ${team.bdr}`}}>
                  <div style={{fontSize:11,fontWeight:800,color:team.color,marginBottom:8}}>{team.emoji} {team.short}</div>
                  {[0,...(isPairs?[1]:[])].map(slot=>{
                    const val=cur[side]?.[slot]||"";
                    const used=(cur[side]||[]).filter((_,i)=>i!==slot);
                    const avail=opts.filter(o=>!used.includes(o.key));
                    return(<select key={slot} className="sel" value={val} onChange={e=>setSlot(m.id,side,slot,e.target.value)} style={{marginBottom:slot===0&&isPairs?6:0,borderColor:val?team.color:C.border,color:val?team.color:C.textSoft}}>
                      <option value="">— Pick player —</option>
                      {avail.map(o=><option key={o.key} value={o.key}>{o.name} ({o.hcp})</option>)}
                      {val&&!avail.find(o=>o.key===val)&&<option value={val}>{PLAYERS[val].name}</option>}
                    </select>);
                  })}
                </div>
              ))}
            </div>
            {popStr&&<div style={{marginTop:8,padding:"6px 10px",background:"rgba(255,255,255,0.7)",borderRadius:8,fontSize:11,color:C.textSoft}}>🎯 {popStr}</div>}
          </div>
        );
      })}
    </div>
  );
}

// ─── SCORES TAB ──────────────────────────────────────────────
// Roster view: each player's gross/net front/back/total by round
function ScoresTab({hs,r3P,courseHcps}){
  const roundsWithCourse=ROUNDS.filter(r=>r.course);

  // For each round, compute per-player gross/net using match-level pops
  // We need to find which match each player is in for each round
  function getPlayerMatchHs(roundKey,playerKey){
    // Search all matches in that round for this player's scores
    const roundHs=hs?.[roundKey]||{};
    for(const [mid,mhs] of Object.entries(roundHs)){
      if(mhs?.[playerKey]) return{mhs,mid};
    }
    return{mhs:{},mid:null};
  }

  function calcPlayerNetPops(roundKey,matchId,playerKey,courseKey,r3P2){
    if(!matchId) return Array(18).fill(0);
    const p=getP(matchId,r3P2);
    if(!p||!p.sideA.length||!p.sideB.length) return Array(18).fill(0);
    const allK=[...p.sideA,...p.sideB];
    if(!allK.includes(playerKey)) return Array(18).fill(0);
    const pct=p.type==="singles"?1.00:0.90;
    const pops=calcPops(allK,COURSES[courseKey].holes,pct);
    return pops[playerKey]||Array(18).fill(0);
  }

  const allPlayerKeys=Object.keys(PLAYERS).sort((a,b)=>PLAYERS[a].team.localeCompare(PLAYERS[b].team)||PLAYERS[a].hcp-PLAYERS[b].hcp);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{padding:"10px 14px",background:C.hdr,borderRadius:12}}>
        <div style={{fontSize:14,fontWeight:800,color:C.hdrText}}>📊 Score Roster</div>
        <div style={{fontSize:11,color:"#5a7a5a",marginTop:2}}>Gross &amp; Net · Front / Back / Total · by round</div>
      </div>

      {roundsWithCourse.map(round=>{
        const course=COURSES[round.course];
        const frontPar=[0,1,2,3,4,5,6,7,8].reduce((s,i)=>s+course.holes[i].par,0);
        const backPar=[9,10,11,12,13,14,15,16,17].reduce((s,i)=>s+course.holes[i].par,0);

        return(
          <div key={round.key} className="card">
            <div style={{padding:"10px 14px",background:C.hdr,borderBottom:`1px solid ${C.border}`}}>
              <div style={{fontSize:12,fontWeight:800,color:C.hdrText}}>{round.label}</div>
              <div style={{fontSize:10,color:"#5a7a5a",marginTop:1}}>{course.full} · Par {course.par}</div>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:300}}>
                <thead>
                  <tr style={{background:C.cardAlt}}>
                    <td style={{padding:"5px 10px",fontSize:9,fontWeight:800,color:C.textSoft,minWidth:70}}>PLAYER</td>
                    <td style={{padding:"5px 8px",textAlign:"center",fontSize:9,fontWeight:800,color:C.textSoft}}>FRONT<br/><span style={{fontWeight:400}}>par {frontPar}</span></td>
                    <td style={{padding:"5px 8px",textAlign:"center",fontSize:9,fontWeight:800,color:C.textSoft}}>BACK<br/><span style={{fontWeight:400}}>par {backPar}</span></td>
                    <td style={{padding:"5px 8px",textAlign:"center",fontSize:9,fontWeight:800,color:C.textSoft}}>TOTAL<br/><span style={{fontWeight:400}}>par {course.par}</span></td>
                    <td style={{padding:"5px 8px",textAlign:"center",fontSize:9,fontWeight:800,color:C.textSoft}}>+/-</td>
                    <td style={{padding:"5px 8px",textAlign:"center",fontSize:9,fontWeight:800,color:C.purple}}>EXP<br/><span style={{fontWeight:400,fontSize:7}}>avg</span></td>
                  </tr>
                </thead>
                <tbody>
                  {[{keys:[...A_KEYS],team:TEAM_A},{keys:[...B_KEYS],team:TEAM_B}].flatMap(({keys,team},ti)=>[
                    // Team header row
                    <tr key={"hdr"+ti}><td colSpan={6} style={{padding:"4px 10px",background:team.bg,fontSize:9,fontWeight:800,color:team.color,letterSpacing:1}}>{team.emoji} {team.name}</td></tr>,
                    ...keys.map((k,ki)=>{
                      const {mhs,mid}=getPlayerMatchHs(round.key,k);
                      const popsArr=calcPlayerNetPops(round.key,mid,k,round.course,r3P);
                      const getG2=h=>mhs?.[k]?.[h]??"";
                      const netOf2=h=>{const g=getG2(h);if(g===""||isNaN(g))return null;return Number(g)-(popsArr[h]??0);};
                      const fG=[0,1,2,3,4,5,6,7,8].reduce((s,i)=>{const g=getG2(i);return g!==""&&!isNaN(g)?s+Number(g):s;},0);
                      const bG=[9,10,11,12,13,14,15,16,17].reduce((s,i)=>{const g=getG2(i);return g!==""&&!isNaN(g)?s+Number(g):s;},0);
                      const fN=[0,1,2,3,4,5,6,7,8].reduce((s,i)=>{const n=netOf2(i);return n!==null?s+n:s;},0);
                      const bN=[9,10,11,12,13,14,15,16,17].reduce((s,i)=>{const n=netOf2(i);return n!==null?s+n:s;},0);
                      const hasF=[0,1,2,3,4,5,6,7,8].some(i=>getG2(i)!=="");
                      const hasB=[9,10,11,12,13,14,15,16,17].some(i=>getG2(i)!=="");
                      const hasAny=hasF||hasB;
                      const tG=fG+bG,tN=fN+bN,diff=tN-course.par;
                      const diffCol=diff<0?C.green:diff===0?C.textMid:C.red;
                      // Expected gross = par + courseHandicap × 1.08 (skewed-normal model)
                      const ch=courseHandicap(k,round.course);
                      const expGross=Math.round(course.par+ch*1.08);
                      const vsExp=hasAny?tG-expGross:null;
                      const vsExpCol=vsExp!==null?(vsExp<0?C.green:vsExp===0?C.textMid:C.red):C.textSoft;
                      return(
                        <tr key={k} style={{borderTop:`1px solid ${C.border}`,background:ki%2===0?C.card:C.cardAlt}}>
                          <td style={{padding:"6px 10px"}}>
                            <div style={{fontSize:12,fontWeight:700}}>{PLAYERS[k].short}</div>
                            <div style={{fontSize:9,color:C.textSoft}}>hcp {PLAYERS[k].hcp} · CH {ch}</div>
                          </td>
                          <td style={{padding:"5px 8px",textAlign:"center"}}>
                            {hasF?<div><div style={{fontSize:12,fontWeight:700}}>{fG}</div><div style={{fontSize:10,color:team.color,fontWeight:700}}>({fN})</div></div>:<span style={{color:C.textSoft,fontSize:11}}>—</span>}
                          </td>
                          <td style={{padding:"5px 8px",textAlign:"center"}}>
                            {hasB?<div><div style={{fontSize:12,fontWeight:700}}>{bG}</div><div style={{fontSize:10,color:team.color,fontWeight:700}}>({bN})</div></div>:<span style={{color:C.textSoft,fontSize:11}}>—</span>}
                          </td>
                          <td style={{padding:"5px 8px",textAlign:"center"}}>
                            {hasAny?<div><div style={{fontSize:13,fontWeight:800}}>{tG}</div><div style={{fontSize:11,color:team.color,fontWeight:800}}>({tN})</div></div>:<span style={{color:C.textSoft,fontSize:11}}>—</span>}
                          </td>
                          <td style={{padding:"5px 8px",textAlign:"center"}}>
                            {hasAny&&<span style={{fontSize:12,fontWeight:800,color:diffCol}}>{diff===0?"E":diff>0?`+${diff}`:diff}</span>}
                          </td>
                          <td style={{padding:"5px 8px",textAlign:"center",background:"rgba(106,42,154,0.04)"}}>
                            <div style={{fontSize:11,fontWeight:700,color:C.purple}}>{expGross}</div>
                            {vsExp!==null&&<div style={{fontSize:9,fontWeight:700,color:vsExpCol}}>{vsExp===0?"E":vsExp>0?`+${vsExp}`:vsExp}</div>}
                          </td>
                        </tr>
                      );
                    })
                  ])}
                </tbody>
              </table>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── DAY 2 BONUS TAB ─────────────────────────────────────────
// Shows R2 best net, R3 best net, and combined best per hole per team.
// Tied best scores show all player names. Running CUM diff tracks 2pt bonus.
function Day2BonusTab({hs,r3P}){
  const course=COURSES.wekopa;
  const allK=Object.keys(PLAYERS);
  const allPops=calcPops(allK,course.holes,0.90);

  // Get gross for a player in a specific round
  function getRoundGross(playerKey,roundKey,holeIdx){
    const roundHs=hs?.[roundKey]||{};
    for(const mhs of Object.values(roundHs)){
      const g=mhs?.[playerKey]?.[holeIdx];
      if(g!=null&&g!=="") return Number(g);
    }
    return null;
  }
  function getRoundNet(playerKey,roundKey,holeIdx){
    const g=getRoundGross(playerKey,roundKey,holeIdx);
    if(g===null) return null;
    return g-(allPops[playerKey]?.[holeIdx]??0);
  }

  // Team best net for a specific round
  function roundBestNet(teamKeys,roundKey,holeIdx){
    const nets=teamKeys.map(k=>getRoundNet(k,roundKey,holeIdx)).filter(v=>v!==null);
    return nets.length?Math.min(...nets):null;
  }
  function roundBestPlayers(teamKeys,roundKey,holeIdx){
    const best=roundBestNet(teamKeys,roundKey,holeIdx);
    if(best===null) return [];
    return teamKeys.filter(k=>getRoundNet(k,roundKey,holeIdx)===best);
  }

  // Per-round cumulative running totals (R2 and R3 separately)
  // cumR2[h].cum = running diff after hole h for R2 (positive = Cactus leads)
  // cumR3[h].cum = same for R3
  const buildCum=(rk)=>{
    let cum=0;const rows=[];
    for(let h=0;h<18;h++){
      const aNet=roundBestNet(A_KEYS,rk,h);
      const bNet=roundBestNet(B_KEYS,rk,h);
      const diff=(aNet!==null&&bNet!==null)?bNet-aNet:null;
      if(diff!==null) cum+=diff;
      rows.push({diff,cum:diff!==null?cum:null});
    }
    return rows;
  };
  const cumR2=buildCum("r2");
  const cumR3=buildCum("r3");

  // Overall bonus: compare cumulative R2 + R3 combined best net totals
  let totalA=0,totalB=0,holesPlayed=0;
  for(let h=0;h<18;h++){
    const aR2=roundBestNet(A_KEYS,"r2",h),aR3=roundBestNet(A_KEYS,"r3",h);
    const bR2=roundBestNet(B_KEYS,"r2",h),bR3=roundBestNet(B_KEYS,"r3",h);
    if(aR2!==null) totalA+=aR2; if(aR3!==null) totalA+=aR3;
    if(bR2!==null) totalB+=bR2; if(bR3!==null) totalB+=bR3;
    if((aR2!==null||aR3!==null)&&(bR2!==null||bR3!==null)) holesPlayed++;
  }
  const bonusWinner=holesPlayed>0?(totalA<totalB?"A":totalB<totalA?"B":null):null;
  const bonusTeam=bonusWinner==="A"?TEAM_A:bonusWinner==="B"?TEAM_B:null;

  const renderNine=(idxs,label)=>{
    const cumByRound={r2:cumR2,r3:cumR3};
    return(
      <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch",marginBottom:8}}>
        <div style={{fontSize:9,fontWeight:800,color:C.textSoft,padding:"4px 10px 2px",letterSpacing:2}}>{label} NINE</div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:10,minWidth:400}}>
          <thead>
            <tr style={{background:C.hdr}}>
              <td style={{padding:"3px 8px",color:"#8a9a60",fontSize:8,minWidth:70}}>Team / Round</td>
              {idxs.map(i=><td key={i} style={{padding:"3px 2px",textAlign:"center",color:C.hdrText,fontWeight:700,width:28}}>{course.holes[i].h}</td>)}
              <td style={{padding:"3px 6px",textAlign:"center",color:"#8a9a60",fontSize:8,width:34}}>{label==="FRONT"?"OUT":"IN"}</td>
            </tr>
            <tr style={{background:C.cardAlt}}>
              <td style={{padding:"2px 8px",fontSize:8,color:C.textSoft,fontWeight:700}}>Par</td>
              {idxs.map(i=><td key={i} style={{padding:"2px 2px",textAlign:"center",fontSize:9,fontWeight:700,color:C.textMid}}>{course.holes[i].par}</td>)}
              <td style={{padding:"2px 6px",textAlign:"center",fontSize:9,fontWeight:700,color:C.textMid}}>{idxs.reduce((s,i)=>s+course.holes[i].par,0)}</td>
            </tr>
          </thead>
          <tbody>
            {["r2","r3"].map((rk,roundIdx)=>{
              const cumRows=cumByRound[rk];
              const lastCum=idxs.reduce((last,i)=>cumRows[i].cum!==null?cumRows[i].cum:last,null);
              return(
                <React.Fragment key={rk}>
                  {/* Cactus row for this round */}
                  {[{team:TEAM_A,keys:A_KEYS},{team:TEAM_B,keys:B_KEYS}].map(({team,keys},ti)=>{
                    const nineNet=idxs.reduce((s,i)=>{const n=roundBestNet(keys,rk,i);return n!==null?s+n:s;},0);
                    const hasAny=idxs.some(i=>roundBestNet(keys,rk,i)!==null);
                    return(
                      <tr key={team.name} style={{borderTop:ti===0&&roundIdx===0?`2px solid ${C.border}`:ti===0?`2px solid ${C.border}`:`1px solid ${C.border}`,background:ti===0?team.bg:team.bg}}>
                        <td style={{padding:"3px 8px"}}>
                          <div style={{fontSize:9,fontWeight:800,color:team.color}}>{team.emoji} {team.short}</div>
                          <div style={{fontSize:7,color:C.textSoft}}>R{rk[1]} best net</div>
                        </td>
                        {idxs.map(i=>{
                          const net=roundBestNet(keys,rk,i);
                          const par=course.holes[i].par;
                          const players=roundBestPlayers(keys,rk,i);
                          const isTied=players.length>1;
                          const col=net!==null?scoreColor(net,par):C.textSoft;
                          const bg=net!==null?scoreBg(net,par):"transparent";
                          return(
                            <td key={i} style={{padding:"1px 1px",textAlign:"center",verticalAlign:"middle",background:isTied?"rgba(200,168,32,0.18)":"transparent"}}>
                              {net!==null?(
                                <div>
                                  <div style={{width:22,height:18,margin:"0 auto",borderRadius:3,background:bg,border:`1px solid ${col}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:col}}>{net}</div>
                                  <div style={{fontSize:6,color:isTied?C.gold:team.color,textAlign:"center",lineHeight:1.1}}>{players.map(k=>PLAYERS[k]?.short).join("/")}</div>
                                </div>
                              ):<div style={{width:22,height:18}}/>}
                            </td>
                          );
                        })}
                        <td style={{padding:"2px 6px",textAlign:"center",background:team.bg}}>
                          {hasAny&&<div style={{fontSize:11,fontWeight:800,color:team.color}}>{nineNet}</div>}
                        </td>
                      </tr>
                    );
                  })}
                  {/* Running CUM for this round */}
                  <tr style={{background:C.goldBg,borderTop:`1px solid ${C.goldBdr}`}}>
                    <td style={{padding:"2px 8px",fontSize:7,fontWeight:800,color:C.gold}}>R{rk[1]} CUM</td>
                    {idxs.map(i=>{
                      const row=cumRows[i];
                      if(row.cum===null) return<td key={i} style={{textAlign:"center",color:C.textSoft,fontSize:7}}>—</td>;
                      const col=row.cum>0?C.green:row.cum<0?C.red:C.gold;
                      return<td key={i} style={{padding:"1px 1px",textAlign:"center",color:col,fontSize:7,fontWeight:800}}>{row.cum===0?"=":row.cum>0?`🌵${row.cum}`:`🌶️${Math.abs(row.cum)}`}</td>;
                    })}
                    <td style={{padding:"2px 6px",textAlign:"center",fontSize:8,fontWeight:800,color:lastCum>0?C.green:lastCum<0?C.red:C.gold}}>
                      {lastCum!==null?(lastCum===0?"TIE":lastCum>0?`🌵${lastCum}`:`🌶️${Math.abs(lastCum)}`):""}
                    </td>
                  </tr>
                  {/* Spacer between rounds */}
                  {roundIdx===0&&<tr><td colSpan={idxs.length+2} style={{height:5,background:C.cardAlt}}></td></tr>}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
      </div>
    );
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div className="card">
        <div style={{padding:"12px 14px",background:C.hdr}}>
          <div style={{fontSize:14,fontWeight:800,color:"#c0a040"}}>🎯 Day 2 Net Bonus — 2 Points</div>
          <div style={{fontSize:11,color:"#5a7a5a",marginTop:1}}>R2 &amp; R3 · We-Ko-Pa Saguaro · Best net per round per team · running match total per round</div>
        </div>
        <div style={{padding:"10px 14px",background:bonusWinner?(bonusWinner==="A"?C.greenBg:C.redBg):C.goldBg,textAlign:"center"}}>
          {holesPlayed===0?<div style={{fontSize:12,color:C.textSoft}}>Enter R2 and R3 scores to track the bonus</div>
          :bonusWinner?<div>
            <div style={{fontSize:16,fontWeight:900,color:bonusTeam.color}}>{bonusTeam.emoji} {bonusTeam.name} leads Day 2</div>
            <div style={{fontSize:11,color:C.textSoft,marginTop:2}}>Net diff: {cumDiff>0?"+":""}{cumDiff} · {holesPlayed} holes played</div>
            {holesPlayed===18&&<div style={{fontSize:14,fontWeight:800,color:bonusTeam.color,marginTop:4}}>🏆 2 pts → {bonusTeam.short}!</div>}
          </div>
          :<div style={{fontSize:14,fontWeight:800,color:C.gold}}>ALL SQUARE · {holesPlayed} holes in</div>}
        </div>
      </div>
      <div className="card" style={{padding:"8px 12px"}}>
        <div style={{fontSize:10,fontWeight:800,color:C.textSoft,marginBottom:4}}>LEGEND</div>
        <div style={{fontSize:10,color:C.textSoft,lineHeight:1.7}}>
          Each team shows R2 best net and R3 best net for 🌵 Cactus and 🌶️ Chili. Tied scores within a round get a gold cell with all names shown. CUM = running hole-by-hole net differential for that round.
        </div>
      </div>
      <div className="card">
        {renderNine([0,1,2,3,4,5,6,7,8],"FRONT")}
        {renderNine([9,10,11,12,13,14,15,16,17],"BACK")}
      </div>
    </div>
  );
}

// ─── ANALYSIS TAB ────────────────────────────────────────────
function AnalysisTab({hs,r3P,courseHcps}){
  // ── Skewed-normal percentile model ───────────────────────────
  // Uses USGA Course Handicap: CH = Idx×(Slope/113)+(Rating-Par)
  // Expected gross = Par + CH × 1.08
  //   (hcp is calibrated to ~40th percentile of rounds; average is ~8% higher than CH)
  // Spread: σ = 2.2 + CH×0.07 (higher hcp = more round-to-round variance)
  // Right-skew α=2.5 via Owen's T approximation for skewed-normal CDF
  //   → scores cluster at 40-60%ile for typical rounds; long bad tail, compressed good tail
  function normalCDF(x){
    const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p2=0.3275911;
    const sign=x<0?-1:1;
    const t=1/(1+p2*Math.abs(x)/Math.sqrt(2));
    const poly=t*(a1+t*(a2+t*(a3+t*(a4+t*a5))));
    return 0.5*(1+sign*(1-poly*Math.exp(-x*x/2)));
  }
  // Owen's T function approximation: T(h,a) ≈ arctan(a)/(2π) × Φ correction
  function owensT(h,a){
    const atan=Math.atan(a)/(2*Math.PI);
    // Series approximation accurate to 4 decimal places for |h|<4, |a|<1
    const h2=h*h;
    const series=atan*(1-0.5*normalCDF(h*Math.sqrt(1+a*a))/normalCDF(h)+0.5*Math.exp(-h2/2));
    return Math.max(0,Math.min(atan,series));
  }
  // Skewed-normal CDF with right-skew (α>0 means right tail longer = bad scores more common)
  function skewNormCDF(x,mu,sigma,alpha){
    const z=(x-mu)/sigma;
    return normalCDF(z)-2*owensT(z,alpha);
  }
  function scorePercentile(gross,playerKey,courseKey){
    if(!gross||!courseKey) return null;
    const ch=courseHandicap(playerKey,courseKey);
    const par=COURSES[courseKey].par;
    const mu=par+ch*1.08;        // expected average gross (slightly above CH)
    const sigma=2.2+ch*0.07;     // spread increases with handicap
    const alpha=2.5;             // right skew: bad rounds have longer tail
    // P(random same-CH player scores ≤ gross) via skewed-normal
    const pBelow=skewNormCDF(gross,mu,sigma,alpha);
    // Impressiveness = P(score ≤ gross) — shooting better than expected is impressive
    // Shooting at mu (~expected) → ~55th pct; much better → 80-95; much worse → 10-30
    return Math.round(Math.max(0,Math.min(100,pBelow*100)));
  }
  function heatColor(pct){
    if(pct===null) return{bg:"transparent",color:C.textSoft};
    if(pct>=80)return{bg:"#c8eec8",color:"#0a4a0a"};
    if(pct>=65)return{bg:"#d8f0d8",color:"#1a5a1a"};
    if(pct>=55)return{bg:"#e8f8e8",color:"#2a6a2a"};
    if(pct>=45)return{bg:"#f4fbf4",color:"#3a5a3a"};
    if(pct>=35)return{bg:"#fdf0ee",color:"#6a2020"};
    if(pct>=20)return{bg:"#f8d8d0",color:"#8a1010"};
    return{bg:"#f0b8b0",color:"#7a0a0a"};
  }

  // Get player gross total for a round
  function playerRoundGross(playerKey,roundKey){
    const roundHs=hs?.[roundKey]||{};
    for(const mhs of Object.values(roundHs)){
      if(!mhs?.[playerKey]) continue;
      const scores=Object.values(mhs[playerKey]).map(Number).filter(v=>!isNaN(v));
      if(scores.length===18) return scores.reduce((s,v)=>s+v,0);
      if(scores.length>0) return scores.reduce((s,v)=>s+v,0); // partial
    }
    return null;
  }

  const roundDefs=[
    {key:"r1",label:"R1",course:"wildfire"},
    {key:"r2",label:"R2",course:"wekopa"},
    {key:"r3",label:"R3",course:"wekopa"},
    {key:"r4",label:"R4",course:"grayhawk"},
    {key:"r5",label:"R5",course:"grayhawk"},
  ];

  // ── Superlatives — fully dynamic, recalculates as rounds come in ────────────
  function getSuperlatives(){
    const allRoundKeys=["r1","r2","r3","r4","r5"];
    const S={};
    const allK=Object.keys(PLAYERS);
    allK.forEach(k=>{S[k]={birdies:0,eagles:0,bogeys:0,doubles:0,pars:0,popSaves:0,
      roundsPlayed:0,roundScores:[],bestOver:null,worstOver:null,
      frontNines:[],backNines:[],pctiles:[]};});

    allRoundKeys.forEach(rk=>{
      const roundHs=hs?.[rk]||{};
      const rd=roundDefs.find(r=>r.key===rk);
      if(!rd) return;
      const course=COURSES[rd.course];
      // Build match pops
      const mPops={};
      ROUNDS.filter(r=>r.key===rk).forEach(round=>{
        round.matches.forEach(m=>{
          const p=getP(m.id,r3P);
          if(!p||!p.sideA.length||!p.sideB.length) return;
          const aK=[...p.sideA,...p.sideB];
          const popsM=calcPops(aK,course.holes,p.type==="singles"?1.00:0.90);
          aK.forEach(k=>{mPops[k]=popsM[k]||Array(18).fill(0);});
        });
      });
      allK.forEach(k=>{
        let mhs=null;
        for(const m of Object.values(roundHs)){if(m?.[k]){mhs=m[k];break;}}
        if(!mhs) return;
        const pops=mPops[k]||Array(18).fill(0);
        S[k].roundsPlayed++;
        let front=0,back=0,fCount=0,bCount=0;
        Object.entries(mhs).forEach(([hi,g])=>{
          const h=Number(hi),gross=Number(g),par=course.holes[h]?.par;
          if(!par||isNaN(gross)) return;
          const net=gross-pops[h];
          if(h<9){front+=gross;fCount++;}else{back+=gross;bCount++;}
          if(gross<=par-2) S[k].eagles++;
          if(gross===par-1) S[k].birdies++;
          if(gross===par) S[k].pars++;
          if(gross===par+1) S[k].bogeys++;
          if(gross>=par+2) S[k].doubles++;
          if(net===par-1&&gross>par-1) S[k].popSaves++;
        });
        const total=front+back;
        if(fCount===9) S[k].frontNines.push(front);
        if(bCount===9) S[k].backNines.push(back);
        const over=total-course.par;
        S[k].roundScores.push({over,rk});
        if(S[k].bestOver===null||over<S[k].bestOver) S[k].bestOver=over;
        if(S[k].worstOver===null||over>S[k].worstOver) S[k].worstOver=over;
        const pct=scorePercentile(total,k,rd.course);
        if(pct!==null) S[k].pctiles.push(pct);
      });
    });

    // Derived stats
    allK.forEach(k=>{
      S[k].avgFront=S[k].frontNines.length?S[k].frontNines.reduce((a,b)=>a+b,0)/S[k].frontNines.length:null;
      S[k].avgBack=S[k].backNines.length?S[k].backNines.reduce((a,b)=>a+b,0)/S[k].backNines.length:null;
      S[k].spread=S[k].worstOver!==null&&S[k].bestOver!==null?S[k].worstOver-S[k].bestOver:null;
      S[k].avgPctile=S[k].pctiles.length?S[k].pctiles.reduce((a,b)=>a+b,0)/S[k].pctiles.length:null;
      const rs=S[k].roundScores;
      S[k].improving=rs.length>=2?rs[rs.length-1].over<rs[0].over:false;
      S[k].declining=rs.length>=2?rs[rs.length-1].over>rs[0].over:false;
    });

    const rank=(fn)=>[...allK].sort((a,b)=>fn(b,S[b])-fn(a,S[a]));
    const top=(fn)=>rank(fn)[0];
    const bot=(fn)=>rank((k,s)=>-fn(k,s))[0];

    const assigned={};
    const used=new Set();
    const give=(k,title,desc,icon)=>{
      if(!assigned[k]&&!used.has(title)){assigned[k]={title,desc,icon};used.add(title);}
    };

    // Priority-ordered candidates — each checked in sequence
    const birdieK=top((k,s)=>s.birdies);
    const eagleK=top((k,s)=>s.eagles);
    const parK=top((k,s)=>s.pars);
    const bogeyK=top((k,s)=>s.bogeys+s.doubles*1.5);
    const doubleK=top((k,s)=>s.doubles);
    const popK=top((k,s)=>s.popSaves);
    const bestRdK=top((k,s)=>s.bestOver!==null?-s.bestOver:-999);
    const worstRdK=top((k,s)=>s.worstOver||0);
    const hotFrontK=top((k,s)=>s.avgFront!==null?-s.avgFront:-999);
    const hotBackK=top((k,s)=>s.avgBack!==null?-s.avgBack:-999);
    const consistK=bot((k,s)=>s.spread!==null?s.spread:999);
    const wildK=top((k,s)=>s.spread||0);
    const grindK=top((k,s)=>s.avgPctile||0);
    const trendUpK=allK.find(k=>S[k].improving&&S[k].roundsPlayed>=2)||null;
    const fadeK=allK.find(k=>S[k].declining&&S[k].roundsPlayed>=2)||null;

    // Eagle Scout ONLY if player actually has eagles
    if(S[eagleK]?.eagles>0) give(eagleK,"🦅 Eagle Scout",`${S[eagleK].eagles} eagle${S[eagleK].eagles>1?"s":""} — soaring above the mortals, apparently`,"eagle");

    give(birdieK,"🐦 Birdie Bandit",`${S[birdieK].birdies} gross birdies — robbing par like it owes him money`,"birdie");
    give(parK,"🤷 Par for the Course",`${S[parK].pars} pars — the living, breathing embodiment of 'fine, I guess'. Not bad. Not good. Statistically inevitable.`,"par");
    give(popK,"💊 Snap Crackle Pop Addict",`${S[popK].popSaves} holes where pops turned disaster into delight — cheerfully dependent on the system`,"pop");
    give(doubleK,"💥 Nuclear Option",`${S[doubleK].doubles} doubles or worse — when it goes bad it goes full Chernobyl. No warning, lots of damage.`,"double");
    give(bogeyK,"⚙️ Bogey Merchant",`${S[bogeyK].bogeys} bogeys — manufacturing bogeys with industrial efficiency since tee time`,"bogey");
    if(bestRdK) give(bestRdK,"🔥 Day Tripper",`Best round at ${S[bestRdK].bestOver>=0?"+":""}${S[bestRdK].bestOver} — showed up on one particular day like he'd been hiding his game all year`,"best");
    if(worstRdK) give(worstRdK,"🌋 Volcano",`Worst round at +${S[worstRdK].worstOver} — one session went full magma. 'I had a thing with my back.'`,"worst");
    if(hotFrontK) give(hotFrontK,"⚡ Hot Start",`Avg front 9: ${S[hotFrontK].avgFront?.toFixed(1)} — charges out of the gate, questions arise on the back`,"front");
    if(hotBackK&&hotBackK!==hotFrontK) give(hotBackK,"🐢 Strong Finish",`Avg back 9: ${S[hotBackK].avgBack?.toFixed(1)} — slow burn, saves the best for last`,"back");
    if(consistK) give(consistK,"🎯 Consistency Machine",`Spread of only ${S[consistK].spread} strokes round-to-round — boring, reliable, devastatingly boring`,"consist");
    if(wildK) give(wildK,"🎪 The Entertainer",`Spread of ${S[wildK].spread} strokes — you never know which version shows up, and honestly neither does he`,"wild");
    if(grindK) give(grindK,"🏆 The Grinder",`Avg ${S[grindK].avgPctile?.toFixed(0)}%ile — grinding out above-expected performances like a scratch golfer in disguise`,"grind");
    if(trendUpK) give(trendUpK,"📈 Trending Up",`Getting better every round — either finding his game or the course is softening, either way take it`,"up");
    if(fadeK) give(fadeK,"📉 Fade to Black",`Started hot, cooling down — the Arizona heat is winning this particular battle`,"fade");

    // Final sweep — ensure every player has a superlative
    const finalPool=[
      ["🏌️ Cart Path Only","Spends more time in the rough than on it — bought premium balls, found premium rough","cart"],
      ["🎰 Vegas Baby","More variance per round than a slot machine — if only the casino paid this well","vegas"],
      ["🌵 Desert Dweller","One with the Arizona landscape — the bunkers know his name, the desert respects him","desert"],
      ["📺 The Commentator","Always has an explanation, never a solution — 'the wind shifted right as I swung'","comment"],
      ["😴 Steady Eddy","Middle of the pack across every metric — safe, dependable, forgettable, loved","eddy"],
      ["🧮 The Mathematician","Scores exactly what the handicap predicts — a human USGA calibration tool","math"],
      ["🎁 Mr. Generosity","Giving back to the field one bogey at a time — truly a team player in every sense","gen"],
      ["🔮 The Enigma","Statistically unexplainable — defies model, defies gravity, defies explanation","enigma"],
    ];
    let fp=0;
    allK.forEach(k=>{
      if(!assigned[k]){
        const[title,desc,icon]=finalPool[fp%finalPool.length];
        assigned[k]={title,desc,icon};fp++;
      }
    });

    return{assigned,playerStats:S};
  }

  const {assigned,playerStats}=getSuperlatives();

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* Heatmap */}
      <div className="card">
        <div style={{padding:"12px 14px",background:C.hdr}}>
          <div style={{fontSize:14,fontWeight:800,color:C.hdrText}}>🔬 Performance Analysis</div>
          <div style={{fontSize:11,color:"#5a7a5a",marginTop:1}}>Skewed-normal model · USGA course handicap · green = outperformed · red = underperformed</div>
          <div style={{fontSize:10,color:"#4a6a4a",marginTop:1}}>exp = expected avg gross · typical rounds cluster 40-65%ile</div>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
            <thead>
              <tr style={{background:C.cardAlt}}>
                <td style={{padding:"6px 10px",fontSize:9,fontWeight:800,color:C.textSoft,minWidth:72}}>Player</td>
                {roundDefs.map(r=>(
                  <td key={r.key} style={{padding:"6px 5px",textAlign:"center",fontSize:9,fontWeight:800,color:C.textSoft}}>{r.label}<br/><span style={{fontWeight:400,fontSize:8}}>par {COURSES[r.course].par}</span></td>
                ))}
              </tr>
            </thead>
            <tbody>
              {[{team:TEAM_A,keys:A_KEYS},{team:TEAM_B,keys:B_KEYS}].flatMap(({team,keys},ti)=>[
                <tr key={"h"+ti}><td colSpan={6} style={{padding:"4px 10px",background:team.bg,fontSize:9,fontWeight:800,color:team.color,letterSpacing:1}}>{team.emoji} {team.name}</td></tr>,
                ...keys.map((k,ki)=>(
                  <tr key={k} style={{borderTop:`1px solid ${C.border}`,background:ki%2===0?C.card:C.cardAlt}}>
                    <td style={{padding:"6px 10px"}}>
                      <div style={{fontSize:12,fontWeight:700}}>{PLAYERS[k].short}</div>
                      <div style={{fontSize:9,color:C.textSoft}}>hcp {PLAYERS[k].hcp}</div>
                    </td>
                    {roundDefs.map(r=>{
                      const gross=playerRoundGross(k,r.key);
                      const pct=gross?scorePercentile(gross,k,r.course):null;
                      const ch=courseHandicap(k,r.course);
                      const expGross=Math.round(COURSES[r.course].par+ch*1.08);
                      const {bg,color}=heatColor(pct);
                      return(
                        <td key={r.key} style={{padding:"4px 5px",textAlign:"center",background:bg,borderRadius:4,minWidth:44}}>
                          {gross?(
                            <>
                              <div style={{fontSize:13,fontWeight:800,color}}>{gross}</div>
                              <div style={{fontSize:8,color,opacity:.85}}>{pct}%ile</div>
                              <div style={{fontSize:7,color,opacity:.65}}>exp {expGross}</div>
                            </>
                          ):<span style={{color:C.textSoft,fontSize:10}}>—</span>}
                        </td>
                      );
                    })}
                  </tr>
                ))
              ])}
            </tbody>
          </table>
        </div>
        <div style={{padding:"8px 12px",background:C.cardAlt,display:"flex",gap:8,flexWrap:"wrap",fontSize:9,color:C.textSoft,borderTop:`1px solid ${C.border}`}}>
          {[{c:"#c8eec8",l:"80-100%ile"},{c:"#d8f0d8",l:"65-79%"},{c:"#e8f8e8",l:"55-64%"},{c:"#f4fbf4",l:"45-54%"},{c:"#fdf0ee",l:"35-44%"},{c:"#f8d8d0",l:"20-34%"},{c:"#f0b8b0",l:"<20%"}].map(({c,l})=>(
            <div key={l} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:12,height:12,borderRadius:2,background:c}}/><span>{l}</span></div>
          ))}
        </div>
      </div>

      {/* Superlatives */}
      <div className="card">
        <div style={{padding:"12px 14px",background:C.hdr,borderBottom:`1px solid ${C.border}`}}>
          <div style={{fontSize:14,fontWeight:800,color:C.hdrText}}>🏆 Superlatives</div>
          <div style={{fontSize:11,color:"#5a7a5a",marginTop:1}}>Statistically relevant. Diplomatically questionable.</div>
        </div>
        {[{team:TEAM_A,keys:A_KEYS},{team:TEAM_B,keys:B_KEYS}].flatMap(({team,keys},ti)=>[
          <div key={"sh"+ti} style={{padding:"5px 14px",background:team.bg,fontSize:9,fontWeight:800,color:team.color,letterSpacing:1,borderTop:`1px solid ${C.border}`}}>{team.emoji} {team.name}</div>,
          ...keys.map((k,ki)=>{
            const sup=assigned[k]||{title:"🏌️ Solid Contributor",desc:"Just happy to be here"};
            return(
              <div key={k} style={{padding:"12px 14px",borderTop:`1px solid ${C.border}`,background:ki%2===0?C.card:C.cardAlt,display:"flex",gap:12,alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <div style={{fontSize:13,fontWeight:800,color:team.color}}>{PLAYERS[k].name}</div>
                    <div style={{fontSize:8,color:C.textSoft}}>hcp {PLAYERS[k].hcp}</div>
                  </div>
                  <div style={{fontSize:13,fontWeight:700,marginTop:4}}>{sup.title}</div>
                  <div style={{fontSize:11,color:C.textSoft,marginTop:3,lineHeight:1.4}}>{sup.desc}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:9,color:C.textSoft}}>birdies</div>
                  <div style={{fontSize:16,fontWeight:800,color:C.green}}>{playerStats[k]?.birdies||0}</div>
                  <div style={{fontSize:9,color:C.textSoft,marginTop:2}}>bogeys</div>
                  <div style={{fontSize:14,fontWeight:700,color:C.red}}>{playerStats[k]?.bogeys||0}</div>
                </div>
              </div>
            );
          })
        ])}
      </div>

      {/* Stat leaders */}
      <div className="card">
        <div style={{padding:"10px 14px",background:C.cardAlt,borderBottom:`1px solid ${C.border}`}}>
          <div style={{fontSize:11,fontWeight:800,color:C.textMid}}>📈 Stat Leaders</div>
        </div>
        {[
          {label:"Most birdies",icon:"🐦",fn:(k,s)=>s.birdies,unit:"birdies"},
          {label:"Most pars",icon:"😑",fn:(k,s)=>s.pars,unit:"pars"},
          {label:"Most bogeys",icon:"💀",fn:(k,s)=>s.bogeys,unit:"bogeys"},
          {label:"Pop saves",icon:"💊",fn:(k,s)=>s.popSaveHoles,unit:"holes flipped"},
        ].map(({label,icon,fn,unit},si)=>{
          const sorted=[...Object.keys(PLAYERS)].sort((a,b)=>fn(b,playerStats[b])-fn(a,playerStats[a]));
          const top=sorted[0];
          const val=fn(top,playerStats[top]);
          const team=PLAYERS[top].team==="A"?TEAM_A:TEAM_B;
          if(!val) return null;
          return(
            <div key={si} style={{padding:"8px 14px",borderTop:si>0?`1px solid ${C.border}`:"none",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:11,color:C.textSoft}}>{icon} {label}</div>
                <div style={{fontSize:13,fontWeight:700,color:team.color}}>{team.emoji} {PLAYERS[top].name}</div>
              </div>
              <div style={{fontSize:18,fontWeight:800,color:team.color}}>{val}<span style={{fontSize:9,color:C.textSoft,fontWeight:400,marginLeft:3}}>{unit}</span></div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── COURSES TAB ─────────────────────────────────────────────
// Editable hole handicap indices per course. Pre-loaded from research.
// Changes persist to Firebase and affect all pop calculations.
function CoursesTab({courseHcps,updateCourseHcp}){
  const [editing,setEditing]=useState(null); // {courseKey,holeIdx}
  const courseList=[
    {key:"wildfire",slope:135,rating:73.8},
    {key:"wekopa",  slope:140,rating:74.1},
    {key:"grayhawk",slope:138,rating:74.5},
  ];

  // Validate: must be 1-18, all unique within course
  function isValid(courseKey,holeIdx,val){
    const v=Number(val);
    if(!v||v<1||v>18||!Number.isInteger(v)) return false;
    const cur=courseHcps[courseKey]||COURSES[courseKey].holes.map(h=>h.hcp);
    return!cur.some((h,i)=>i!==holeIdx&&h===v);
  }

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div className="card">
        <div style={{padding:"12px 14px",background:C.hdr}}>
          <div style={{fontSize:14,fontWeight:800,color:C.hdrText}}>⛳ Course Settings</div>
          <div style={{fontSize:11,color:"#5a7a5a",marginTop:1}}>Tap any handicap index to edit · must be 1-18 and unique per course</div>
        </div>
        <div style={{padding:"8px 14px",background:C.goldBg,borderBottom:`1px solid ${C.goldBdr}`}}>
          <div style={{fontSize:10,fontWeight:700,color:C.gold}}>⚠️ Editing hole HCPs affects pop calculations for all existing scores</div>
        </div>
      </div>

      {courseList.map(({key:ck,slope,rating})=>{
        const course=COURSES[ck];
        const hcps=courseHcps[ck]||course.holes.map(h=>h.hcp);
        // Show which round(s) use this course
        const rds=ROUNDS.filter(r=>r.course===ck).map(r=>r.label).join(", ");
        return(
          <div key={ck} className="card">
            <div style={{padding:"10px 14px",background:C.hdr,borderBottom:`1px solid ${C.border}`}}>
              <div style={{fontSize:13,fontWeight:800,color:C.hdrText}}>{course.full}</div>
              <div style={{fontSize:10,color:"#5a7a5a",marginTop:1}}>{course.subtitle} · Par {course.par} · {rds}</div>
              <div style={{fontSize:10,color:"#4a7a4a",marginTop:1}}>Slope {slope} · Rating {rating}</div>
            </div>
            {/* Course handicap preview per player */}
            <div style={{padding:"6px 12px",background:C.cardAlt,borderBottom:`1px solid ${C.border}`,display:"flex",flexWrap:"wrap",gap:6}}>
              <div style={{fontSize:8,fontWeight:700,color:C.textSoft,width:"100%",marginBottom:2}}>COURSE HANDICAPS (Idx × {slope}/113 + ({rating} - {course.par}))</div>
              {Object.keys(PLAYERS).map(k=>{
                const ch=courseHandicap(k,ck);
                const team=PLAYERS[k].team==="A"?TEAM_A:TEAM_B;
                return(<div key={k} style={{padding:"3px 8px",background:team.bg,border:`1px solid ${team.bdr}`,borderRadius:6,textAlign:"center"}}>
                  <div style={{fontSize:9,fontWeight:700,color:team.color}}>{PLAYERS[k].short}</div>
                  <div style={{fontSize:12,fontWeight:800,color:team.color}}>{ch}</div>
                  <div style={{fontSize:7,color:C.textSoft}}>CH</div>
                </div>);
              })}
            </div>
            {/* Hole handicap grid */}
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:380}}>
                <thead>
                  <tr style={{background:C.hdr}}>
                    <td style={{padding:"4px 8px",color:"#8a9a60",fontSize:8,width:56}}>Hole</td>
                    {course.holes.map(h=><td key={h.h} style={{padding:"4px 2px",textAlign:"center",color:C.hdrText,fontWeight:700,fontSize:10,width:26}}>{h.h}</td>)}
                  </tr>
                  <tr style={{background:C.cardAlt}}>
                    <td style={{padding:"2px 8px",fontSize:8,color:C.textSoft,fontWeight:700}}>Par</td>
                    {course.holes.map(h=><td key={h.h} style={{padding:"2px 2px",textAlign:"center",fontSize:9,fontWeight:700,color:C.textMid}}>{h.par}</td>)}
                  </tr>
                </thead>
                <tbody>
                  <tr style={{borderTop:`1px solid ${C.border}`}}>
                    <td style={{padding:"4px 8px",fontSize:9,fontWeight:700,color:C.textMid}}>Hcp</td>
                    {course.holes.map((h,i)=>{
                      const val=hcps[i]??h.hcp;
                      const isEdit=editing?.courseKey===ck&&editing?.holeIdx===i;
                      return(
                        <td key={h.h} style={{padding:"2px 1px",textAlign:"center"}}>
                          {isEdit?(
                            <input
                              type="number" min="1" max="18" defaultValue={val}
                              autoFocus
                              onBlur={e=>{
                                const v=Number(e.target.value);
                                if(isValid(ck,i,v)) updateCourseHcp(ck,i,v);
                                setEditing(null);
                              }}
                              onKeyDown={e=>{
                                if(e.key==="Enter"){
                                  const v=Number(e.target.value);
                                  if(isValid(ck,i,v)) updateCourseHcp(ck,i,v);
                                  setEditing(null);
                                }
                                if(e.key==="Escape") setEditing(null);
                              }}
                              style={{width:24,height:28,textAlign:"center",fontSize:10,fontWeight:700,border:`2px solid ${C.gold}`,borderRadius:4,background:C.goldBg,color:C.gold,outline:"none",padding:0}}
                            />
                          ):(
                            <div
                              onClick={()=>setEditing({courseKey:ck,holeIdx:i})}
                              style={{width:24,height:28,margin:"0 auto",borderRadius:4,background:C.cardAlt,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:C.textMid,cursor:"pointer"}}
                            >{val}</div>
                          )}
                        </td>
                      );
                    })}
                  </tr>
                </tbody>
              </table>
            </div>
            <div style={{padding:"6px 12px",background:C.cardAlt,fontSize:9,color:C.textSoft,borderTop:`1px solid ${C.border}`}}>
              Tap any Hcp number to edit · press Enter or tap away to save · must be 1-18, no duplicates
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── SKINS TAB ───────────────────────────────────────────────
function SkinsTab({hs}){
  const rSkins=ROUNDS.filter(r=>r.course).map(r=>{
    const skins=calcSkins(hs?.[r.key]||{},r.course);
    const val=skins.length>0?(SKINS_POT/skins.length).toFixed(2):null;
    return{round:r,course:COURSES[r.course],skins,val};
  });
  const pTot={};
  rSkins.forEach(({skins,val})=>skins.forEach(s=>{if(!pTot[s.player])pTot[s.player]={n:0,w:0};pTot[s.player].n++;pTot[s.player].w+=val?parseFloat(val):0;}));
  const sorted=Object.entries(pTot).sort((a,b)=>b[1].w-a[1].w);

  return(<>
    <div className="card">
      <div style={{padding:"12px 14px",background:C.hdr}}>
        <div style={{fontSize:14,fontWeight:800,color:"#c0a040"}}>💰 Skins Leaderboard</div>
        <div style={{fontSize:11,color:"#8a8060",marginTop:2}}>${SKINS_POT}/round · net birdie+ · outright only · $20 buy-in</div>
      </div>
      {sorted.length===0?<div style={{padding:"20px",textAlign:"center",color:C.textSoft}}>No skins yet — enter hole scores</div>
        :sorted.map(([k,d],i)=>{const team=PLAYERS[k].team==="A"?TEAM_A:TEAM_B;return(
          <div key={k} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderTop:i>0?`1px solid ${C.border}`:"none"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:14,color:C.gold,fontWeight:800,minWidth:24}}>#{i+1}</span>
              <span style={{fontSize:18}}>{team.emoji}</span>
              <div><div style={{fontSize:14,fontWeight:700}}>{PLAYERS[k].name}</div><div style={{fontSize:11,color:team.color,fontWeight:700}}>{team.short}</div></div>
            </div>
            <div style={{textAlign:"right"}}><div style={{fontSize:20,fontWeight:900,color:C.gold}}>${d.w.toFixed(0)}</div><div style={{fontSize:10,color:C.textSoft}}>{d.n} skin{d.n!==1?"s":""}</div></div>
          </div>
        );})}
    </div>
    {rSkins.map(({round,course,skins,val})=>(
      <div key={round.key} className="card">
        <div style={{padding:"10px 14px",background:C.hdr,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:12,fontWeight:800,color:"#c0a040"}}>{round.label}</div><div style={{fontSize:10,color:"#8a8060",marginTop:1}}>{course.full}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:12,fontWeight:700,color:"#c0a040"}}>${SKINS_POT}</div>{skins.length>0&&<div style={{fontSize:10,color:"#8a8060"}}>{skins.length} × ${parseFloat(val).toFixed(0)}</div>}</div>
        </div>
        {skins.length===0?<div style={{padding:"14px",textAlign:"center",color:C.textSoft,fontSize:12}}>No skins yet</div>
          :skins.map((s,si)=>{const team=PLAYERS[s.player].team==="A"?TEAM_A:TEAM_B;return(
            <div key={si} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderTop:si>0?`1px solid ${C.border}`:"none"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:15,fontWeight:800,color:C.gold,minWidth:30}}>#{s.hole}</span>
                <div><div style={{fontSize:13,fontWeight:700,color:team.color}}>{team.emoji} {PLAYERS[s.player].short}</div><div style={{fontSize:11,color:C.textSoft}}>Net {s.net} · Par {s.par}</div></div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:18}}>{s.net-s.par<=-2?"🦅":"🐦"}</span>
                <span style={{fontSize:16,fontWeight:800,color:C.gold}}>${parseFloat(val).toFixed(0)}</span>
              </div>
            </div>
          );})}
      </div>
    ))}
  </>);
}

// ─── MONEY TAB ───────────────────────────────────────────────
function MoneyTab({ledger,txns,totals}){
  const [open,setOpen]=useState({});
  const sorted=Object.entries(ledger).sort((a,b)=>b[1].total-a[1].total);
  const rW=totals.A>=11?"A":totals.B>=11?"B":null;

  return(<>
    {/* Ryder Cup */}
    <div className="card">
      <div style={{padding:"14px",background:rW?(rW==="A"?C.greenBg:C.redBg):C.goldBg,borderBottom:`1px solid ${rW?(rW==="A"?C.greenBdr:C.redBdr):C.goldBdr}`,textAlign:"center"}}>
        <div style={{fontSize:13,fontWeight:800,color:C.gold,letterSpacing:1}}>🏆 RYDER CUP TEAM BET</div>
        {rW?<div style={{fontSize:16,fontWeight:900,color:rW==="A"?C.green:C.red,marginTop:4}}>{rW==="A"?TEAM_A.name:TEAM_B.name} wins +$100 each!</div>
          :<div style={{fontSize:13,color:C.textSoft,marginTop:4}}>First team to 11 pts wins $100/player</div>}
      </div>
    </div>

    {/* Player totals */}
    <div className="card">
      <div style={{padding:"12px 14px",background:C.cardAlt,borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontSize:13,fontWeight:800,color:C.textMid}}>💵 Player Money Totals</div>
        <div style={{fontSize:10,color:C.textSoft,marginTop:1}}>Tap to expand breakdown</div>
      </div>
      {sorted.map(([k,data],i)=>{
        const team=PLAYERS[k].team==="A"?TEAM_A:TEAM_B;
        const pos=data.total>=0;
        const isOpen=open[k];
        const byRound={};data.entries.forEach(e=>{if(!byRound[e.rl])byRound[e.rl]=[];byRound[e.rl].push(e);});
        return(
          <div key={k} style={{borderTop:i>0?`1px solid ${C.border}`:"none"}}>
            <div onClick={()=>setOpen(prev=>({...prev,[k]:!prev[k]}))} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px",cursor:"pointer",background:i%2===0?C.card:C.cardAlt}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:16}}>{team.emoji}</span>
                <div><div style={{fontSize:14,fontWeight:700}}>{PLAYERS[k].name}</div><div style={{fontSize:10,color:team.color,fontWeight:700}}>{team.short}</div></div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{fontSize:20,fontWeight:900,color:pos?C.green:C.red}}>{pos?"+":"-"}{$(data.total)}</div>
                <span style={{fontSize:14,color:C.textSoft}}>{isOpen?"▲":"▼"}</span>
              </div>
            </div>
            {isOpen&&<div style={{padding:"0 14px 14px",background:"#f8fcf8"}}>
              {Object.entries(byRound).map(([rl,entries])=>{
                const rTot=entries.reduce((s,e)=>s+e.amount,0);
                return(<div key={rl} style={{marginBottom:10}}>
                  <div style={{fontSize:10,fontWeight:800,color:C.textSoft,letterSpacing:1,padding:"6px 0",borderBottom:`1px solid ${C.border}`}}>{rl.toUpperCase()}</div>
                  {entries.map((e,ei)=>(
                    <div key={ei} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${C.border}`}}>
                      <span style={{fontSize:12,color:C.textMid}}>{e.bet}</span>
                      <span style={{fontSize:13,fontWeight:700,color:e.amount>=0?C.green:C.red}}>{e.amount>=0?"+":"-"}{$(e.amount)}</span>
                    </div>
                  ))}
                  <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0"}}>
                    <span style={{fontSize:11,color:C.textSoft,fontWeight:700}}>Round total</span>
                    <span style={{fontSize:13,fontWeight:800,color:rTot>=0?C.green:C.red}}>{rTot>=0?"+":"-"}{$(rTot)}</span>
                  </div>
                </div>);
              })}
            </div>}
          </div>
        );
      })}
    </div>

    {/* Settlement */}
    <div className="card">
      <div style={{padding:"12px 14px",background:C.hdr}}>
        <div style={{fontSize:14,fontWeight:800,color:"#c0a040"}}>📲 Venmo Settlement</div>
        <div style={{fontSize:11,color:"#8a8060",marginTop:1}}>Minimum transactions to settle all debts</div>
      </div>
      {txns.length===0?<div style={{padding:"20px",textAlign:"center",color:C.textSoft,fontSize:13}}>All even — nothing to settle yet</div>
        :txns.map((t,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px",borderTop:i>0?`1px solid ${C.border}`:"none",background:i%2===0?C.card:C.cardAlt}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:13,fontWeight:800,color:C.red}}>{PLAYERS[t.from]?.short}</div>
                <div style={{fontSize:10,color:C.textSoft}}>pays</div>
              </div>
              <div style={{fontSize:22,color:C.textSoft}}>→</div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:13,fontWeight:800,color:C.green}}>{PLAYERS[t.to]?.short}</div>
                <div style={{fontSize:10,color:C.textSoft}}>receives</div>
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:20,fontWeight:900,color:C.gold}}>${t.amount.toFixed(2)}</div>
              <div style={{fontSize:10,color:C.textSoft}}>Venmo 📲</div>
            </div>
          </div>
        ))}
    </div>

    {/* Team summary */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      {[TEAM_A,TEAM_B].map((team,ti)=>{
        const keys=ti===0?A_KEYS:B_KEYS;
        const tot=keys.reduce((s,k)=>s+(ledger[k]?.total||0),0);
        return(<div key={team.name} className="card" style={{margin:0,padding:"14px",textAlign:"center",border:`2px solid ${team.color}`}}>
          <div style={{fontSize:14,fontWeight:800,color:team.color}}>{team.emoji} {team.short}</div>
          <div style={{fontSize:24,fontWeight:900,color:tot>=0?C.green:C.red,marginTop:4}}>{tot>=0?"+":"-"}{$(tot)}</div>
          <div style={{fontSize:10,color:C.textSoft,marginTop:2}}>team total</div>
        </div>);
      })}
    </div>
  </>);
}

// ─── INFO TAB ────────────────────────────────────────────────
function InfoTab({r3P}){
  const aKeys=A_KEYS,bKeys=B_KEYS;
  const all=Object.entries(PLAYERS).sort((a,b)=>a[1].hcp-b[1].hcp);
  const courses=[
    {r:"Round 1",c:"Wildfire Golf Club — Faldo Course",l:"Phoenix, AZ",p:71},
    {r:"Rounds 2 & 3",c:"We-Ko-Pa Golf Club — Saguaro",l:"Fort McDowell, AZ",p:71},
    {r:"Rounds 4 & 5",c:"Grayhawk Golf Club — Raptor",l:"Scottsdale, AZ",p:72},
  ];
  const pairings=[
    {round:"R1 · Wildfire — 2v2",mids:["r1m1","r1m2"]},
    {round:"R2 · We-Ko-Pa — 2v2",mids:["r2m1","r2m2"]},
    {round:"R4 · Grayhawk — Singles",mids:["r4m1","r4m2","r4m3","r4m4"]},
    {round:"R5 · Grayhawk — Singles",mids:["r5m1","r5m2","r5m3","r5m4"]},
  ];

  return(<>
    {/* Teams */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
      {[{team:TEAM_A,keys:aKeys},{team:TEAM_B,keys:bKeys}].map(({team,keys})=>(
        <div key={team.name} className="card" style={{margin:0,border:`2px solid ${team.color}`}}>
          <div style={{padding:"10px",background:team.bg,borderBottom:`2px solid ${team.color}`,textAlign:"center"}}>
            <div style={{fontSize:24}}>{team.emoji}</div>
            <div style={{fontSize:11,fontWeight:800,color:team.color,marginTop:2}}>{team.name}</div>
            <div style={{fontSize:10,color:C.textSoft}}>avg hcp {(keys.reduce((s,k)=>s+PLAYERS[k].hcp,0)/keys.length).toFixed(1)}</div>
          </div>
          {keys.map(k=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"10px 12px",borderBottom:`1px solid ${C.border}`}}>
              <span style={{fontSize:13,fontWeight:700}}>{PLAYERS[k].name}</span>
              <span style={{fontSize:13,fontWeight:700,color:team.color}}>{PLAYERS[k].hcp}</span>
            </div>
          ))}
        </div>
      ))}
    </div>

    {/* R3 Pairings */}
    <div className="card">
      <div style={{padding:"12px 14px",background:C.goldBg,borderBottom:`1px solid ${C.goldBdr}`}}>
        <div style={{fontSize:13,fontWeight:800,color:C.gold}}>Round 3 Pairings</div>
      </div>
      {R3M.map(m=>{
        const p=getP(m.id,r3P);
        const aStr=p?.sideA?.length?p.sideA.map(k=>`${PLAYERS[k].short}(${PLAYERS[k].hcp})`).join(" & "):"TBD";
        const bStr=p?.sideB?.length?p.sideB.map(k=>`${PLAYERS[k].short}(${PLAYERS[k].hcp})`).join(" & "):"TBD";
        return(<div key={m.id} style={{padding:"12px 14px",borderBottom:`1px solid ${C.border}`}}>
          <div style={{fontSize:11,fontWeight:800,color:C.gold,marginBottom:5}}>{m.label}</div>
          <div style={{fontSize:13,fontWeight:700,color:C.green}}>{TEAM_A.emoji} {aStr}</div>
          <div style={{fontSize:12,color:C.textSoft,margin:"2px 0"}}>vs</div>
          <div style={{fontSize:13,fontWeight:700,color:C.red}}>{TEAM_B.emoji} {bStr}</div>
        </div>);
      })}
    </div>

    {/* Static pairings */}
    <div className="card">
      <div style={{padding:"12px 14px",background:C.cardAlt,borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontSize:13,fontWeight:800,color:C.textMid}}>All Match Pairings</div>
      </div>
      {pairings.map((row,ri)=>(
        <div key={ri} style={{padding:"12px 14px",borderBottom:`1px solid ${C.border}`}}>
          <div style={{fontSize:11,fontWeight:800,color:C.textSoft,letterSpacing:1,marginBottom:6}}>{row.round.toUpperCase()}</div>
          {row.mids.map(mid=>{const p2=STATIC_P[mid];if(!p2||p2.type==="bonus")return null;return(
            <div key={mid} style={{marginBottom:6,padding:"8px 10px",background:C.cardAlt,borderRadius:8}}>
              <div style={{fontSize:12,fontWeight:700,color:C.green}}>{TEAM_A.emoji} {p2.sideA.map(k=>`${PLAYERS[k].short}(${PLAYERS[k].hcp})`).join(" & ")}</div>
              <div style={{fontSize:11,color:C.textSoft,margin:"1px 0"}}>vs</div>
              <div style={{fontSize:12,fontWeight:700,color:C.red}}>{TEAM_B.emoji} {p2.sideB.map(k=>`${PLAYERS[k].short}(${PLAYERS[k].hcp})`).join(" & ")}</div>
            </div>
          );})}
        </div>
      ))}
    </div>

    {/* Courses */}
    <div className="card">
      <div style={{padding:"12px 14px",background:C.hdr,borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontSize:13,fontWeight:800,color:C.hdrText}}>Course Schedule</div>
      </div>
      {courses.map((row,i)=>(
        <div key={i} style={{padding:"12px 14px",borderBottom:i<courses.length-1?`1px solid ${C.border}`:"none",background:i%2===0?C.card:C.cardAlt}}>
          <div style={{fontSize:10,fontWeight:800,color:C.textSoft,marginBottom:2}}>{row.r}</div>
          <div style={{fontSize:14,fontWeight:700}}>{row.c}</div>
          <div style={{fontSize:11,color:C.textSoft,marginTop:1}}>{row.l} · Par {row.p}</div>
        </div>
      ))}
    </div>

    {/* Handicap list */}
    <div className="card">
      <div style={{padding:"12px 14px",background:C.cardAlt,borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontSize:13,fontWeight:800,color:C.textMid}}>All Players by Handicap</div>
      </div>
      {all.map(([k,p],i)=>{const team=p.team==="A"?TEAM_A:TEAM_B;return(
        <div key={k} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderBottom:i<all.length-1?`1px solid ${C.border}`:"none",background:i%2===0?C.card:C.cardAlt}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:11,fontWeight:800,color:C.textSoft,minWidth:22}}>#{i+1}</span>
            <span style={{fontSize:16}}>{team.emoji}</span>
            <span style={{fontSize:14,fontWeight:700}}>{p.name}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:11,fontWeight:700,color:team.color}}>{team.short}</span>
            <span style={{fontSize:15,fontWeight:800,minWidth:30,textAlign:"right"}}>{p.hcp}</span>
          </div>
        </div>
      );})}
    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
